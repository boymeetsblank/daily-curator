<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank — Daily Picks</title>
  <meta name="description" content="Intentionally finite. Culturally relevant.">
  <meta property="og:title" content="Blank — Daily Picks">
  <meta property="og:description" content="Intentionally finite. Culturally relevant.">
  <meta property="og:type" content="website">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1c1917">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #fafaf8;
      --surface:  #ffffff;
      --ink:      #1c1917;
      --ink-2:    #44403c;
      --ink-3:    #78716c;
      --ink-4:    #a8a29e;
      --border:   rgba(0,0,0,0.07);
      --border-s: rgba(0,0,0,0.05);
      --amber:    #d97706;
      --serif:    Georgia, 'Times New Roman', serif;
      --sans:     -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }

    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-block { display: flex; flex-direction: column; gap: 5px; }

    .brand {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1;
    }

    .tagline {
      font-family: var(--serif);
      font-style: italic;
      font-size: 10.5px;
      color: var(--ink-4);
      letter-spacing: 0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       PILL BUTTONS
    ───────────────────────────────────────── */
    .pill-btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid rgba(0,0,0,0.12);
      background: transparent;
      color: var(--ink-3);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      line-height: 1.4;
      white-space: nowrap;
    }

    .pill-btn:hover  { background: var(--bg); color: var(--ink); border-color: rgba(0,0,0,0.22); }
    .pill-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }


    /* ─────────────────────────────────────────
       FILTER BAR
    ───────────────────────────────────────── */
    .filter-bar {
      position: sticky;
      z-index: 90;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      top: 93px; /* CSS fallback */
    }

    .filter-bar-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-date {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      flex-shrink: 0;
    }

    .filter-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .filter-count { font-size: 11px; color: var(--ink-4); }

    .run-meta {
      font-size: 10.5px;
      color: var(--ink-4);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .run-meta-sep { font-size: 11px; color: rgba(0,0,0,0.15); }

    .mobile-timer-row {
      display: none;
      font-size: 10.5px;
      color: var(--ink-4);
      padding: 4px 0 1px;
    }

    /* ─────────────────────────────────────────
       PAGE LAYOUT
    ───────────────────────────────────────── */
    .page-wrapper {
      max-width: 700px;
      margin: 0 auto;
      padding: 28px 24px 100px;
    }

    /* ─────────────────────────────────────────
       PICK CARD — Entry animation
    ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pick-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: transform;
      transition: box-shadow 0.22s ease, transform 0.22s ease;
    }

    /* Staggered entry delays */
    #section-latest .pick-card:nth-child(1)  { animation-delay: 0.00s; }
    #section-latest .pick-card:nth-child(2)  { animation-delay: 0.06s; }
    #section-latest .pick-card:nth-child(3)  { animation-delay: 0.12s; }
    #section-latest .pick-card:nth-child(4)  { animation-delay: 0.18s; }
    #section-latest .pick-card:nth-child(5)  { animation-delay: 0.24s; }
    #section-latest .pick-card:nth-child(6)  { animation-delay: 0.30s; }
    #section-latest .pick-card:nth-child(7)  { animation-delay: 0.36s; }
    #section-latest .pick-card:nth-child(8)  { animation-delay: 0.42s; }
    #section-latest .pick-card:nth-child(9)  { animation-delay: 0.48s; }
    #section-latest .pick-card:nth-child(10) { animation-delay: 0.54s; }

    .pick-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    /* ─────────────────────────────────────────
       CARD — Read state
    ───────────────────────────────────────── */
    .pick-card.read {
      opacity: 0.55;
      transition: opacity 0.3s ease;
    }

    .pick-card.read:hover {
      opacity: 0.8;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .pick-card.read .read-link {
      color: var(--ink-4);
      font-weight: 400;
    }

    .pick-card.read .read-link::after { display: none; }

    /* ─────────────────────────────────────────
       CARD IMAGE
    ───────────────────────────────────────── */
    .card-image-wrap {
      width: 100%;
      /* No fixed height — image sets its own height at natural aspect ratio.
         max-height caps portrait images; overflow:hidden clips any excess. */
      max-height: 360px;
      overflow: hidden;
      background: #e8e3dc;
      position: relative;
    }

    .card-image-wrap.hidden { display: none; }

    /* Subtle bottom fade — softens the transition to card body */
    .card-image-wrap::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 52px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.18));
      pointer-events: none;
      z-index: 1;
    }

    .card-thumbnail {
      width: 100%;
      height: auto;           /* natural aspect ratio — no forced crop */
      max-height: 360px;      /* matches container; object-fit only fires here */
      object-fit: cover;      /* fallback for tall images that hit the cap */
      object-position: center 25%;
      display: block;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pick-card:hover .card-thumbnail { transform: scale(1.04); }

    /* ─────────────────────────────────────────
       CARD BODY
    ───────────────────────────────────────── */
    .card-body { padding: 15px 18px 14px; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
      flex-wrap: wrap;
    }

    .score-badge {
      font-family: var(--sans);
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 100px;
      background: var(--ink);
      color: #fff;
      line-height: 1.55;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    /* .score-badge.score-high is replaced by .score-badge.badge-legendary (see RARITY TIERS) */

    .card-source {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--ink-4);
    }

    .trend-sources-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 100px;
      border: 1px solid rgba(0,0,0,0.1);
      color: var(--ink-4);
      line-height: 1.65;
      flex-shrink: 0;
    }

    .card-timestamp {
      margin-left: auto;
      font-size: 10.5px;
      color: var(--ink-4);
      flex-shrink: 0;
    }

    /* The key typographic choice: Georgia for headlines */
    .card-title {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.42;
      letter-spacing: -0.1px;
      margin-bottom: 10px;
    }

    a.card-title {
      text-decoration: none;
      display: block;
    }

    a.card-title:hover { text-decoration: underline; text-underline-offset: 3px; }

    .card-why {
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.68;
      margin-bottom: 14px;
    }

    /* ─────────────────────────────────────────
       CARD FOOTER
    ───────────────────────────────────────── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border-s);
    }

    /* Growing underline on hover — print-native feel */
    .read-link {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      position: relative;
    }

    .read-link::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 1px;
      background: var(--ink);
      transition: width 0.22s ease;
    }

    .read-link:hover::after { width: 100%; }

    .read-arrow {
      display: inline-block;
      transition: transform 0.15s ease;
    }

    .read-link:hover .read-arrow { transform: translateX(3px); }

    .trend-source-label {
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      color: var(--ink-4);
    }

    .feedback-btns {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .feedback-btn {
      font-family: var(--sans);
      font-size: 12px;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 7px;
      width: 30px;
      height: 28px;
      cursor: pointer;
      color: var(--ink-4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .feedback-btn:hover      { background: var(--bg); color: var(--ink-2); border-color: rgba(0,0,0,0.18); }
    .feedback-btn.voted-up   { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .feedback-btn.voted-down { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    /* ─────────────────────────────────────────
       ARCHIVE
    ───────────────────────────────────────── */
    .archive-section { margin-top: 56px; }

    .archive-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-bottom: 14px;
    }

    .archive-list { border-top: 1px solid var(--border); }

    .archive-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border-s);
      text-decoration: none;
      color: inherit;
    }

    a.archive-row:hover .archive-row-title { color: var(--ink); }

    /* Georgia in the archive too — unified reading surface */
    .archive-row-title {
      font-family: var(--serif);
      font-size: 13.5px;
      color: var(--ink-3);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }

    .archive-row-meta {
      font-size: 11px;
      color: var(--ink-4);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ─────────────────────────────────────────
       SIDEBAR — mobile-first collapsible
    ───────────────────────────────────────── */
    .sidebar {
      margin-top: 40px;
      padding-top: 0;
    }

    /* Collapse/expand body — open by default */
    .sidebar-body {
      display: block;
      overflow: hidden;
    }

    .sidebar-body.closed { display: none; }

    /* At medium widths: 2-column grid for sections */
    @media (min-width: 521px) and (max-width: 1099px) {
      .sidebar-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 40px;
      }

      .sidebar-body.closed { display: none; }
      .sidebar-body .sb-section { break-inside: avoid; }
    }

    .sb-section {
      padding-bottom: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-s);
    }

    .sb-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .sb-title {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-bottom: 12px;
    }

    .sb-stats { display: flex; gap: 20px; }

    .sb-stat { display: flex; flex-direction: column; gap: 2px; }

    /* Georgia numerals in sidebar — editorial stats feel */
    .sb-stat-value {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.05;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }

    .sb-stat-label { font-size: 10px; color: var(--ink-4); }

    .sb-top-pick {
      display: block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      text-decoration: none;
      transition: box-shadow 0.15s;
    }

    .sb-top-pick:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

    .sb-top-pick-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    .sb-top-pick-title {
      font-family: var(--serif);
      font-size: 12.5px;
      color: var(--ink-2);
      line-height: 1.45;
      overflow-wrap: break-word;
    }

    .sb-top-pick-meta { font-size: 10px; color: var(--ink-4); margin-top: 7px; }

    .sb-source-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-s);
    }

    .sb-source-row:last-child { border-bottom: none; }

    .sb-source-name {
      font-size: 12px;
      color: var(--ink-3);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-source-count {
      font-size: 11px;
      color: var(--ink-4);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .sb-empty {
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      color: var(--ink-4);
    }

    /* ─────────────────────────────────────────
       WIDE LAYOUT (≥1100px)
    ───────────────────────────────────────── */
    @media (min-width: 1100px) {
      .header-inner,
      .filter-bar-inner { max-width: 972px; }

      .page-wrapper {
        max-width: 972px;
        display: flex;
        align-items: flex-start;
        gap: 32px;
      }

      .content { flex: 1; min-width: 0; }

      .sidebar {
        width: 244px;
        flex-shrink: 0;
        position: sticky;
        margin-top: 0;
      }

    }

    /* ─────────────────────────────────────────
       X TRENDING MODULE (inline feed panel)
    ───────────────────────────────────────── */
    .trends-module {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      padding: 16px 18px 18px;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .trends-module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 11px;
      border-bottom: 1px solid var(--border);
    }

    .tm-x-logo {
      width: 11px; height: 11px;
      color: var(--ink-4);
      flex-shrink: 0;
      display: block;
    }

    .trends-module-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-4);
    }

    .trends-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 20px;
    }

    a.trend-item {
      text-decoration: none;
      cursor: pointer;
    }

    a.trend-item:hover .trend-item-name { color: var(--ink); text-decoration: underline; }

    .trend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-s);
      min-width: 0;
    }

    .trend-item:last-child,
    .trend-item:nth-last-child(2):nth-child(odd) { border-bottom: none; }

    .trend-item-rank {
      font-family: var(--serif);
      font-style: italic;
      font-size: 10px;
      color: var(--ink-4);
      width: 18px;
      flex-shrink: 0;
      text-align: right;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .trend-item.rank-hot  .trend-item-rank { color: var(--amber); }
    .trend-item.rank-warm .trend-item-rank { color: var(--ink-3); }

    .trend-item-name {
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .trend-item.rank-hot  .trend-item-name { color: var(--ink); font-weight: 500; }
    .trend-item.rank-warm .trend-item-name { color: var(--ink-2); }

    @media (max-width: 520px) {
      /* Keep two columns on mobile — 1-10 left, 11-20 right */
      .trend-item:nth-last-child(2):nth-child(odd) { border-bottom: 1px solid var(--border-s); }
    }

    /* ─────────────────────────────────────────
       X TRENDING — SIDEBAR SECTION
    ───────────────────────────────────────── */
    .sb-trend-list { margin-top: 2px; }

    .sb-trend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4.5px 0;
      border-bottom: 1px solid var(--border-s);
      min-width: 0;
    }

    .sb-trend-row:last-child { border-bottom: none; }

    .sb-trend-rank {
      font-family: var(--serif);
      font-style: italic;
      font-size: 10px;
      color: var(--ink-4);
      width: 16px;
      flex-shrink: 0;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .sb-trend-row.rank-hot  .sb-trend-rank { color: var(--amber); }
    .sb-trend-row.rank-warm .sb-trend-rank { color: var(--ink-3); }

    .sb-trend-name {
      font-size: 11.5px;
      color: var(--ink-4);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .sb-trend-row.rank-hot  .sb-trend-name { color: var(--ink-2); font-weight: 500; }
    .sb-trend-row.rank-warm .sb-trend-name { color: var(--ink-3); }

    a.sb-trend-row { text-decoration: none; cursor: pointer; }
    a.sb-trend-row:hover .sb-trend-name { color: var(--ink); text-decoration: underline; }

    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    .state-msg {
      text-align: center;
      color: var(--ink-4);
      padding: 80px 0;
      font-family: var(--serif);
      font-style: italic;
      font-size: 15px;
      line-height: 1.9;
    }

    /* ─────────────────────────────────────────
       MOBILE (≤520px)
    ───────────────────────────────────────── */
    @media (max-width: 520px) {
      header { padding: 10px 16px; }
      .filter-bar { padding: 7px 16px; }
      .page-wrapper { padding: 14px 14px 80px; }
      .pick-card { border-radius: 10px; }
      .card-title { font-size: 16.5px; }
      .filter-pills .pill-btn { padding: 3px 8px; }
      .filter-count { display: none; }
      #last-updated, .run-meta-sep, #next-run { display: none; }
      .mobile-timer-row { display: block; }
    }

    /* ─────────────────────────────────────────
       READING PROGRESS BAR
    ───────────────────────────────────────── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: var(--amber);
      z-index: 9999;
      transition: width 0.08s linear;
      pointer-events: none;
      border-radius: 0 1px 1px 0;
    }

    /* ─────────────────────────────────────────
       NEW PICKS BANNER
    ───────────────────────────────────────── */
    #new-picks-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--ink);
      color: #fff;
      padding: 11px 24px;
      text-align: center;
      font-size: 12.5px;
      letter-spacing: 0.01em;
      cursor: pointer;
      animation: bannerSlideDown 0.28s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #new-picks-banner:hover { background: #2c2c2c; }

    #new-picks-banner .banner-dismiss {
      margin-left: 10px;
      opacity: 0.45;
      font-size: 11px;
    }

    @keyframes bannerSlideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    /* ─────────────────────────────────────────
       RARITY TIERS
       Score 7 = Common (default)
       Score 8 = Rare (cool blue/silver perimeter glow)
       Score 9-10 = Legendary (amber perimeter glow)
    ───────────────────────────────────────── */

    /* Rare — cool silver-blue perimeter glow */
    .pick-card.card-rare {
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25),
                  0 0 16px rgba(37, 99, 235, 0.18),
                  0 2px 8px rgba(37, 99, 235, 0.10);
    }
    .pick-card.card-rare:hover {
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35),
                  0 0 24px rgba(37, 99, 235, 0.26),
                  0 4px 16px rgba(37, 99, 235, 0.14);
      transform: translateY(-2px);
    }

    /* Legendary — amber perimeter glow, elevated */
    .pick-card.card-legendary {
      border-color: rgba(217, 119, 6, 0.30);
      box-shadow: 0 0 0 1px rgba(217, 119, 6, 0.20),
                  0 0 20px rgba(217, 119, 6, 0.18),
                  0 2px 12px rgba(217, 119, 6, 0.12);
    }
    .pick-card.card-legendary:hover {
      box-shadow: 0 0 0 1px rgba(217, 119, 6, 0.30),
                  0 0 32px rgba(217, 119, 6, 0.26),
                  0 4px 20px rgba(217, 119, 6, 0.16);
      transform: translateY(-2px);
    }

    /* Rarity-aware score badges */
    .score-badge.badge-rare      { background: #2563eb; }
    .score-badge.badge-legendary { background: var(--amber); }

    /* ─────────────────────────────────────────
       SCORE PULSE (legendary cards, score 9-10)
       Pulses the full perimeter glow
    ───────────────────────────────────────── */
    @keyframes scorePulse {
      0%, 100% {
        box-shadow: 0 0 0 1px rgba(217, 119, 6, 0.20),
                    0 0 20px rgba(217, 119, 6, 0.18),
                    0 2px 12px rgba(217, 119, 6, 0.12);
      }
      50% {
        box-shadow: 0 0 0 1.5px rgba(217, 119, 6, 0.36),
                    0 0 36px rgba(217, 119, 6, 0.32),
                    0 4px 24px rgba(217, 119, 6, 0.20);
      }
    }

    .pick-card.pulsing {
      animation: scorePulse 4s ease-in-out infinite;
    }

    /* ─────────────────────────────────────────
       TRENDS UPDATE INDICATOR
    ───────────────────────────────────────── */
    .trends-updated {
      font-size: 9.5px;
      color: var(--ink-4);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .trends-updated.visible { opacity: 1; }

    /* ─────────────────────────────────────────
       ACTIVITY FEED
    ───────────────────────────────────────── */
    .activity-feed { margin-top: 2px; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-s);
      animation: fadeUp 0.35s ease both;
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--ink-4);
      flex-shrink: 0;
      margin-top: 4px;
    }

    .activity-dot.dot-drop { background: var(--amber); }
    .activity-dot.dot-read { background: #a8c5a0; }

    .activity-text {
      font-size: 11px;
      color: var(--ink-4);
      line-height: 1.4;
      flex: 1;
      min-width: 0;
    }

    .activity-time {
      font-size: 10px;
      color: var(--ink-4);
      flex-shrink: 0;
      opacity: 0.6;
      white-space: nowrap;
    }

    /* ─────────────────────────────────────────
       READ STATE — smoother transition
    ───────────────────────────────────────── */
    .pick-card {
      transition: box-shadow 0.22s ease, transform 0.22s ease, opacity 0.35s ease;
    }

    /* ─────────────────────────────────────────
       BREAKING NEWS CARD
    ───────────────────────────────────────── */
    .pick-card.card-breaking {
      background: rgba(254, 242, 242, 0.55);
      border-color: rgba(220, 38, 38, 0.2);
      box-shadow: inset 3px 0 0 0 #dc2626,
                  0 2px 16px rgba(220, 38, 38, 0.08);
    }

    .pick-card.card-breaking:hover {
      box-shadow: inset 3px 0 0 0 #dc2626,
                  0 4px 24px rgba(220, 38, 38, 0.12);
      transform: translateY(-2px);
    }

    .breaking-badge {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
      background: #dc2626;
      color: #fff;
      flex-shrink: 0;
    }

    @keyframes breakingPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.65; }
    }

    .breaking-badge { animation: breakingPulse 2s ease-in-out infinite; }

    /* ─────────────────────────────────────────
       BREAKING NEWS SECTION HEADER
    ───────────────────────────────────────── */
    .breaking-section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #dc2626;
      margin-bottom: 10px;
    }

    .breaking-section-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #dc2626;
      flex-shrink: 0;
      animation: breakingPulse 2s ease-in-out infinite;
    }

    /* ─────────────────────────────────────────
       NOTIFICATION PERMISSION BUTTON
    ───────────────────────────────────────── */
    /* #notif-btn is always visible; initNotifBtn() sets label/title on load */
  </style>
</head>
<body>

<!-- ── Reading Progress Bar ── -->
<div id="progress-bar"></div>

<!-- ── New Picks Banner ── -->
<div id="new-picks-banner" role="status" onclick="dismissBanner()">
  New picks available — click to refresh <span class="banner-dismiss">✕</span>
</div>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <div class="brand-block">
      <div class="brand">Blank</div>
      <div class="tagline">intentionally finite, culturally relevant</div>
    </div>
    <div class="header-actions">
      <button class="pill-btn active" id="btn-today">Today</button>
      <button class="pill-btn" id="btn-archive">Archive</button>
      <button class="pill-btn active" id="btn-stats" aria-expanded="true" aria-controls="sidebar-body">Stats</button>
      <button class="pill-btn" id="notif-btn" title="Enable breaking news notifications" onclick="enableNotifications()">🔔</button>
    </div>
  </div>
</header>


<!-- ── Filter bar ── -->
<div class="filter-bar" id="filter-bar">
  <div class="filter-bar-inner">
    <span class="filter-date" id="filter-date">—</span>
    <div class="filter-right">
      <span class="filter-count" id="filter-count"></span>
      <span class="run-meta" id="last-updated"></span>
      <span class="run-meta-sep">·</span>
      <span class="run-meta" id="next-run">—</span>
    </div>
  </div>
  <div class="mobile-timer-row" id="mobile-timer-row"></div>
</div>

<!-- ── Page ── -->
<div class="page-wrapper">
  <div class="content">
    <div id="feed-container">
      <div class="state-msg">Loading…</div>
    </div>
  </div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-body" id="sidebar-body"></div>
  </aside>
</div>

<script>
  // ── HTML escaping ────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#039;');
  }

  // ── Trend helpers ────────────────────────────────────────────
  function isTrendPick(pick) { return !pick.link; }

  function trendPlatform(pick) {
    const s = (pick.source || '').toLowerCase();
    if (s.includes('twitter') || s.includes('x (twitter)') || s === 'x (twitter) trending') return 'X';
    if (s.includes('google')) return 'Google';
    return null;
  }

  function trendSearchUrl(pick) {
    const q = encodeURIComponent(pick.title || '');
    const platform = trendPlatform(pick);
    if (platform === 'Google') return `https://www.google.com/search?q=${q}`;
    return `https://x.com/search?q=${q}`;
  }

  function trendLabel(pick) {
    const s = (pick.source || '').toLowerCase();
    if (s.includes('twitter') || s.includes(' x ') || s.endsWith(' x') || s.startsWith('x ')) return 'Trending on X right now';
    if (s.includes('google')) return 'Trending on Google right now';
    return 'Trending right now';
  }

  // ── Feedback votes ───────────────────────────────────────────
  const VOTE_TOKEN = '__VOTE_TOKEN__';
  const VOTE_REPO  = 'boymeetsblank/daily-curator';

  async function vote(btn, dir) {
    const btns = btn.parentElement;
    const up   = btns.querySelector(':first-child');
    const dn   = btns.querySelector(':last-child');
    let isVoting = false;

    if (dir === 'up') {
      const was = up.classList.contains('voted-up');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) { up.classList.add('voted-up');   isVoting = true; }
    } else {
      const was = dn.classList.contains('voted-down');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) { dn.classList.add('voted-down'); isVoting = true; }
    }

    if (!isVoting) return;

    if (!VOTE_TOKEN) {
      console.error('[vote] VOTE_TOKEN is empty — secret not set or injection failed');
      return;
    }

    console.log('[vote] direction:', dir, '| token length:', VOTE_TOKEN.length,
                '| starts with:', VOTE_TOKEN.slice(0, 10));

    const ct = new Date().toLocaleString('sv-SE', {
      timeZone: 'America/Chicago',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false,
    }).replace(' ', 'T') + ' CT';

    const record = {
      timestamp: ct,
      direction: dir,
      title:     btns.dataset.title  || '',
      source:    btns.dataset.source || '',
      score:     parseInt(btns.dataset.score) || 0,
      url:       btns.dataset.url    || null,
    };

    console.log('[vote] record:', record);

    const apiUrl = `https://api.github.com/repos/${VOTE_REPO}/contents/votes.json`;
    const headers = {
      'Authorization':        `Bearer ${VOTE_TOKEN}`,
      'Accept':               'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
    };

    let sha   = null;
    let votes = [];
    console.log('[vote] GET', apiUrl);
    try {
      const res = await fetch(apiUrl, { headers });
      console.log('[vote] GET status:', res.status);
      if (res.ok) {
        const data = await res.json();
        sha   = data.sha;
        votes = JSON.parse(new TextDecoder().decode(
          Uint8Array.from(atob(data.content.replace(/\n/g, '')), c => c.charCodeAt(0))
        ));
        console.log('[vote] existing votes:', votes.length, '| sha:', sha);
      } else {
        const errText = await res.text();
        console.error('[vote] GET failed:', res.status, errText);
      }
    } catch (e) {
      console.error('[vote] GET exception:', e);
    }

    votes.push(record);

    const enc = new TextEncoder().encode(JSON.stringify(votes, null, 2) + '\n');
    const binary = Array.from(enc, b => String.fromCharCode(b)).join('');

    const body = { message: `vote: ${dir} — ${record.title.slice(0, 50)}`,
                   content: btoa(binary), branch: 'main' };
    if (sha) body.sha = sha;

    console.log('[vote] PUT', apiUrl, '| sha:', sha || '(creating new)');
    try {
      const putRes = await fetch(apiUrl, {
        method:  'PUT',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      console.log('[vote] PUT status:', putRes.status);
      if (!putRes.ok) {
        const errText = await putRes.text();
        console.error('[vote] PUT failed:', putRes.status, errText);
      } else {
        console.log('[vote] vote saved successfully');
      }
    } catch (e) {
      console.error('[vote] PUT exception:', e);
    }
  }

  // ── Render a single pick card ────────────────────────────────
  function renderPickCard(pick, runDisplayTime, runIsoTs) {
    const tier       = pick.score >= 9 ? 'legendary' : pick.score >= 8 ? 'rare' : 'common';
    const badgeClass = tier !== 'common' ? ` badge-${tier}` : '';
    const scoreBadge = `<span class="score-badge${badgeClass}">${pick.score}</span>`;
    const srcBadge   = pick.trending_across_sources
      ? `<span class="trend-sources-badge">3+ sources</span>` : '';

    const imageWrap  = pick.image
      ? `<div class="card-image-wrap">
           <img class="card-thumbnail" src="${esc(pick.image)}" alt="" loading="lazy"
                onerror="this.closest('.card-image-wrap').classList.add('hidden')">
         </div>` : '';

    const footerLeft = pick.link
      ? `<a class="read-link" href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer" onclick="markRead(this)">
           Read article <span class="read-arrow">→</span>
         </a>`
      : `<span class="trend-source-label">${esc(trendLabel(pick))}</span>`;

    const tsAttr    = runIsoTs ? ` data-run-ts="${esc(runIsoTs)}"` : '';
    const tsDisplay = runIsoTs ? timeAgo(runIsoTs) : esc(runDisplayTime);
    const cardClass  = (tier !== 'common' ? ` card-${tier}` : '') + (tier === 'legendary' ? ' score-elite' : '');
    return `<div class="pick-card${cardClass}" data-score="${pick.score}" data-url="${esc(pick.link || "")}">
      ${imageWrap}
      <div class="card-body">
        <div class="card-meta">
          ${scoreBadge}
          <span class="card-source">${esc(pick.source)}</span>
          ${srcBadge}
          <span class="card-timestamp"${tsAttr}>${tsDisplay}</span>
        </div>
        <a class="card-title" href="${esc(pick.link || trendSearchUrl(pick))}" target="_blank" rel="noopener noreferrer"${pick.link ? ' onclick="markRead(this.closest(\'.pick-card\').querySelector(\'.read-link\'))"' : ''}>${esc(pick.title)}</a>
        ${pick.why ? `<div class="card-why">${esc(pick.why)}</div>` : ''}
        <div class="card-footer">
          ${footerLeft}
          <div class="feedback-btns"
               data-title="${esc(pick.title)}"
               data-source="${esc(pick.source)}"
               data-score="${pick.score}"
               data-url="${esc(pick.link || '')}">
            <button class="feedback-btn" onclick="vote(this,'up')"   title="Good pick">↑</button>
            <button class="feedback-btn" onclick="vote(this,'down')" title="Not for me">↓</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ── Read state (localStorage) ────────────────────────────────
  function getReadUrls() {
    try { return new Set(JSON.parse(localStorage.getItem('blank_read') || '[]')); }
    catch { return new Set(); }
  }

  function setReadUI(card) {
    card.classList.add('read');
    const link = card.querySelector('.read-link');
    if (link) link.innerHTML = '✓ Read';
  }

  // Returns today's date in CT as YYYY-MM-DD
  function ctDateStr() {
    return new Date().toLocaleDateString('sv-SE', { timeZone: 'America/Chicago' });
  }

  function getReadStats() {
    const today = ctDateStr();
    let todayData = { date: '', count: 0 };
    try { todayData = JSON.parse(localStorage.getItem('blank_read_today') || '{}'); } catch {}
    const readToday = todayData.date === today ? (todayData.count || 0) : 0;

    let total = 0;
    try { total = parseInt(localStorage.getItem('blank_read_total') || '0', 10) || 0; } catch {}

    let streakData = { lastDate: '', streak: 0 };
    try { streakData = JSON.parse(localStorage.getItem('blank_read_streak') || '{}'); } catch {}
    const streak = streakData.streak || 0;

    return { readToday, total, streak };
  }

  function incrementReadStats() {
    const today = ctDateStr();

    // Read Today
    let todayData = { date: '', count: 0 };
    try { todayData = JSON.parse(localStorage.getItem('blank_read_today') || '{}'); } catch {}
    if (todayData.date !== today) todayData = { date: today, count: 0 };
    todayData.count++;
    localStorage.setItem('blank_read_today', JSON.stringify(todayData));

    // Total Read
    let total = 0;
    try { total = parseInt(localStorage.getItem('blank_read_total') || '0', 10) || 0; } catch {}
    localStorage.setItem('blank_read_total', String(total + 1));

    // Daily Streak — advance only on the first read of a new day
    let streakData = { lastDate: '', streak: 0 };
    try { streakData = JSON.parse(localStorage.getItem('blank_read_streak') || '{}'); } catch {}
    if (streakData.lastDate !== today) {
      const prev = new Date(today + 'T12:00:00Z');
      prev.setUTCDate(prev.getUTCDate() - 1);
      const yesterday = prev.toISOString().slice(0, 10);
      if (streakData.lastDate === yesterday) {
        streakData.streak = (streakData.streak || 0) + 1;
      } else {
        streakData.streak = 1;
      }
      streakData.lastDate = today;
      localStorage.setItem('blank_read_streak', JSON.stringify(streakData));
    }

    updateReadStatUI();
  }

  function updateReadStatUI() {
    const { readToday, total, streak } = getReadStats();
    const elToday  = document.getElementById('sb-read-today');
    const elTotal  = document.getElementById('sb-read-total');
    const elStreak = document.getElementById('sb-read-streak');
    if (elToday)  elToday.textContent  = readToday;
    if (elTotal)  elTotal.textContent  = total;
    if (elStreak) elStreak.textContent = streak;
  }

  function markRead(linkEl) {
    const card = linkEl.closest('.pick-card');
    if (!card) return;
    const url = linkEl.href;
    const urls = getReadUrls();
    if (urls.has(url)) return;
    setReadUI(card);
    urls.add(url);
    localStorage.setItem('blank_read', JSON.stringify([...urls]));
    incrementReadStats();
    addActivity('read', 'Mo read an article');
  }

  function applyReadState() {
    const urls = getReadUrls();
    if (!urls.size) return;
    document.querySelectorAll('.pick-card[data-url]').forEach(card => {
      if (urls.has(card.dataset.url)) setReadUI(card);
    });
  }

  // ── Pick count display ───────────────────────────────────────
  function updateCount() {
    const n = document.querySelectorAll('#section-latest .pick-card').length;
    document.getElementById('filter-count').textContent = n ? `${n} pick${n !== 1 ? 's' : ''}` : '';
  }

  // ── X Trending full list (inline module + sidebar) ──────────
  function trendRankClass(i) {
    return i < 3 ? 'rank-hot' : i < 7 ? 'rank-warm' : '';
  }

  function buildTrendsModule(topics) {
    if (!topics || !topics.length) return '';
    const rows = topics.map((name, i) => {
      const cls     = trendRankClass(i);
      const rankStr = (i + 1) < 10 ? `0${i + 1}` : `${i + 1}`;
      const encoded = encodeURIComponent(name);
      return `<a class="trend-item${cls ? ' ' + cls : ''}" href="https://x.com/search?q=${encoded}" target="_blank" rel="noopener noreferrer">
        <span class="trend-item-rank">${rankStr}</span>
        <span class="trend-item-name">${esc(name)}</span>
      </a>`;
    }).join('');
    return `<div class="trends-module" id="trends-module">
      <div class="trends-module-header">
        <svg class="tm-x-logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        <span class="trends-module-title">Now Trending</span>
        <span id="trends-updated-at" class="trends-updated"></span>
      </div>
      <div class="trends-grid" id="trends-grid">${rows}</div>
    </div>`;
  }


  // ── Sidebar ──────────────────────────────────────────────────
  function renderSidebar(latestRuns, allRuns) {
    const today = latestRuns.flatMap(r => r.picks);
    const picks = today.length;
    const top   = picks ? Math.max(...today.map(p => p.score)) : '—';
    const runs  = latestRuns.length;

    const statsHtml = `<div class="sb-section">
      <div class="sb-title">Today</div>
      <div class="sb-stats">
        <div class="sb-stat"><span class="sb-stat-value">${picks}</span><span class="sb-stat-label">picks</span></div>
        <div class="sb-stat"><span class="sb-stat-value">${top}</span><span class="sb-stat-label">top score</span></div>
        <div class="sb-stat"><span class="sb-stat-value">${runs}</span><span class="sb-stat-label">runs</span></div>
      </div>
    </div>`;

    const { readToday, total, streak } = getReadStats();
    const readHtml = `<div class="sb-section">
      <div class="sb-title">Reading</div>
      <div class="sb-stats">
        <div class="sb-stat"><span class="sb-stat-value" id="sb-read-today">${readToday}</span><span class="sb-stat-label">read today</span></div>
        <div class="sb-stat"><span class="sb-stat-value" id="sb-read-total">${total}</span><span class="sb-stat-label">all time</span></div>
        <div class="sb-stat"><span class="sb-stat-value" id="sb-read-streak">${streak}</span><span class="sb-stat-label">day streak</span></div>
      </div>
    </div>`;

    const now = new Date(), cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - 7);
    let topPick = null, topMeta = '';
    for (const run of allRuns) {
      if (new Date((run.ct_date || run.date) + 'T00:00:00') < cutoff) continue;
      for (const p of run.picks) {
        if (!topPick || p.score > topPick.score) { topPick = p; topMeta = run.display_date || run.date; }
      }
    }

    let topHtml = `<div class="sb-section"><div class="sb-title">Best this week</div>`;
    if (!topPick) {
      topHtml += '<div class="sb-empty">No picks yet</div>';
    } else {
      const tag  = topPick.link ? 'a' : 'div';
      const href = topPick.link ? ` href="${esc(topPick.link)}" target="_blank" rel="noopener noreferrer"` : '';
      const topTier = topPick.score >= 9 ? ' badge-legendary' : topPick.score >= 8 ? ' badge-rare' : '';
      topHtml += `<${tag} class="sb-top-pick"${href}>
        <div class="sb-top-pick-header"><span class="score-badge${topTier}">${topPick.score}</span></div>
        <div class="sb-top-pick-title">${esc(topPick.title)}</div>
        <div class="sb-top-pick-meta">${esc(topMeta)}</div>
      </${tag}>`;
    }
    topHtml += '</div>';

    const counts = {};
    today.filter(p => !isTrendPick(p)).forEach(p => { counts[p.source] = (counts[p.source] || 0) + 1; });
    const sources = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    let srcHtml = `<div class="sb-section"><div class="sb-title">Sources today</div>`;
    if (!sources.length) {
      srcHtml += '<div class="sb-empty">No sources yet</div>';
    } else {
      sources.forEach(([s, c]) => {
        srcHtml += `<div class="sb-source-row"><span class="sb-source-name">${esc(s)}</span><span class="sb-source-count">${c}</span></div>`;
      });
    }
    srcHtml += '</div>';

    const activityHtml = `<div class="sb-section">
      <div class="sb-title">Live</div>
      <div class="activity-feed" id="sb-activity"></div>
    </div>`;
    document.getElementById('sidebar-body').innerHTML = statsHtml + readHtml + topHtml + srcHtml + activityHtml;
    renderActivitySection();
  }

  // ── Main render ──────────────────────────────────────────────
  function render(runs) {
    if (!runs || !runs.length) {
      document.getElementById('feed-container').innerHTML = '<div class="state-msg">No picks yet.</div>';
      return;
    }

    const latestDate = runs[0].ct_date || runs[0].date;
    const latestRuns = runs.filter(r => (r.ct_date || r.date) === latestDate);
    const cutoff     = new Date(latestDate + 'T12:00:00Z');
    cutoff.setUTCDate(cutoff.getUTCDate() - 7);
    const cutoffStr  = cutoff.toISOString().slice(0, 10);
    const olderRuns  = runs.filter(r => {
      const d = r.ct_date || r.date;
      return d !== latestDate && d > cutoffStr;
    });

    document.getElementById('filter-date').textContent = latestRuns[0].display_date || latestDate;

    // Flatten today's picks in reverse-chronological order (latestRuns is already newest-first)
    let html = buildTrendsModule(latestRuns[0]?.x_trends || []);
    html += '<div id="section-latest">';
    for (const run of latestRuns) {
      const runIsoTs = (run.date && run.time)
        ? `${run.date}T${run.time.slice(0,2)}:${run.time.slice(2,4)}:00Z`
        : null;
      for (const pick of run.picks) html += renderPickCard(pick, run.display_time, runIsoTs);
    }
    html += '</div>';

    if (olderRuns.length) {
      const byDate = {};
      for (const run of olderRuns) {
        const rDate = run.ct_date || run.date;
        (byDate[rDate] = byDate[rDate] || []).push(run);
      }

      html += `<div class="archive-section" id="archive-section">
        <div class="archive-label">Earlier</div>
        <div class="archive-list">`;

      Object.keys(byDate).sort().reverse().forEach(date => {
        byDate[date].forEach(run => {
          run.picks.forEach(pick => {
            const tag  = pick.link ? 'a' : 'div';
            const href = pick.link ? ` href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer"` : '';
            html += `<${tag} class="archive-row" data-label="${esc(run.label)}"${href}>
              <span class="archive-row-title">${esc(pick.title)}</span>
              <span class="archive-row-meta">${pick.score} · ${esc(run.display_date)}</span>
            </${tag}>`;
          });
        });
      });

      html += '</div></div>';
    }

    document.getElementById('feed-container').innerHTML = html;
    applyReadState();
    updateCount();
    renderSidebar(latestRuns, runs);
  }

  // ── Wire buttons ─────────────────────────────────────────────
  function wireButtons() {
    document.getElementById('btn-today').addEventListener('click', () => {
      document.getElementById('section-latest')?.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-today').classList.add('active');
      document.getElementById('btn-archive').classList.remove('active');
    });

    document.getElementById('btn-archive').addEventListener('click', () => {
      document.getElementById('archive-section')?.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-archive').classList.add('active');
      document.getElementById('btn-today').classList.remove('active');
    });

    const statsBtn = document.getElementById('btn-stats');
    const body     = document.getElementById('sidebar-body');
    if (statsBtn && body) {
      statsBtn.addEventListener('click', () => {
        const closed = body.classList.toggle('closed');
        statsBtn.setAttribute('aria-expanded', !closed);
        statsBtn.classList.toggle('active', !closed);
      });
    }
  }

  // ── Sticky positioning ───────────────────────────────────────
  function positionSticky() {
    const headerH = document.querySelector('header').offsetHeight;
    const fb      = document.getElementById('filter-bar');
    const sb      = document.getElementById('sidebar');

    fb.style.top = headerH + 'px';
    if (sb) sb.style.top = (headerH + fb.offsetHeight + 16) + 'px';
  }

  // ── Countdown timer ──────────────────────────────────────────
  // Run times in CT so DST transitions are handled automatically.
  const RUN_TIMES_CT   = [[8, 30], [13, 30], [19, 30]];
  const CT_HM_FORMAT   = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', hour12: false
  });
  let lastRunTime = null;

  function parseRunTime(run) {
    if (!run) return null;
    return new Date(`${run.date}T${run.time.slice(0,2)}:${run.time.slice(2,4)}:00Z`);
  }

  function getNextRunMs() {
    const now   = new Date();
    const parts = CT_HM_FORMAT.formatToParts(now);
    const ctH   = parseInt(parts.find(p => p.type === 'hour').value);
    const ctM   = parseInt(parts.find(p => p.type === 'minute').value);
    const nowCtMin = ctH * 60 + ctM;
    let minDelta = Infinity;
    for (const [h, m] of RUN_TIMES_CT) {
      let delta = h * 60 + m - nowCtMin;
      if (delta <= 0) delta += 24 * 60;
      minDelta = Math.min(minDelta, delta);
    }
    return minDelta * 60 * 1000;
  }

  function fmtNext(ms) {
    if (ms <= 0) return 'updating now';
    const m = Math.ceil(ms / 60000), h = Math.floor(m / 60);
    return h > 0 ? `Next in ${h}h ${m % 60}m` : `Next in ${m}m`;
  }

  function fmtLast(ms) {
    const m = Math.floor(ms / 60000);
    if (m < 1)  return 'Updated just now';
    if (m < 60) return `Updated ${m}m ago`;
    const h = Math.floor(m / 60), rm = m % 60;
    return rm > 0 ? `Updated ${h}h ${rm}m ago` : `Updated ${h}h ago`;
  }

  function tickCountdown() {
    const nextEl   = document.getElementById('next-run');
    const lastEl   = document.getElementById('last-updated');
    const mobileEl = document.getElementById('mobile-timer-row');
    const nextStr  = fmtNext(getNextRunMs());
    const lastStr  = lastRunTime ? fmtLast(Date.now() - lastRunTime.getTime()) : null;
    if (nextEl) nextEl.textContent = nextStr;
    if (lastEl && lastStr) lastEl.textContent = lastStr;
    if (mobileEl) mobileEl.textContent = lastStr ? `${lastStr} · ${nextStr}` : nextStr;
    refreshTimestamps();
    updateTrendsTimestamp();
    refreshActivityTimes();
  }

  // ── Time ago ─────────────────────────────────────────────────
  function timeAgo(isoTs) {
    if (!isoTs) return '';
    const diff = Math.floor((Date.now() - new Date(isoTs).getTime()) / 1000);
    if (diff < 45)   return 'just now';
    if (diff < 90)   return '1 min ago';
    if (diff < 3600) return `${Math.floor(diff / 60)} mins ago`;
    if (diff < 7200) return '1 hour ago';
    if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
    return `${Math.floor(diff / 86400)} days ago`;
  }

  // ── Live timestamp refresh ────────────────────────────────────
  function refreshTimestamps() {
    document.querySelectorAll('.card-timestamp[data-run-ts]').forEach(el => {
      const ts = el.dataset.runTs;
      if (ts) el.textContent = timeAgo(ts);
    });
  }

  // ── Score pulse ───────────────────────────────────────────────
  function initScorePulse() {
    document.querySelectorAll('.pick-card.score-elite').forEach(card => {
      card.addEventListener('animationend', function onEnd(e) {
        if (e.animationName === 'fadeUp') {
          card.removeEventListener('animationend', onEnd);
          card.classList.add('pulsing');
        }
      });
    });
  }

  // ── Reading progress bar ──────────────────────────────────────
  function initProgressBar() {
    const bar = document.getElementById('progress-bar');
    if (!bar) return;
    function update() {
      const latest = document.getElementById('section-latest');
      const archive = document.getElementById('archive-section');
      // Measure progress only through today's picks (section-latest).
      // Use the top of archive-section as the endpoint, or bottom of section-latest if no archive.
      const endpoint = archive
        ? archive.getBoundingClientRect().top + window.scrollY
        : (latest ? latest.getBoundingClientRect().bottom + window.scrollY : document.documentElement.scrollHeight);
      const pct = endpoint > window.innerHeight
        ? Math.min(100, (window.scrollY / (endpoint - window.innerHeight)) * 100)
        : 100;
      bar.style.width = pct + '%';
    }
    window.addEventListener('scroll', update, { passive: true });
  }

  // ── Activity feed ─────────────────────────────────────────────
  const MAX_ACTIVITY = 20;

  function getActivity() {
    try { return JSON.parse(localStorage.getItem('blank_activity') || '[]'); } catch { return []; }
  }

  function addActivity(type, text) {
    const events = getActivity();
    events.unshift({ type, text, ts: Date.now() });
    if (events.length > MAX_ACTIVITY) events.length = MAX_ACTIVITY;
    localStorage.setItem('blank_activity', JSON.stringify(events));
    renderActivitySection();
  }

  function renderActivitySection() {
    const el = document.getElementById('sb-activity');
    if (!el) return;
    const events = getActivity();
    if (!events.length) {
      el.innerHTML = '<div class="sb-empty">No activity yet</div>';
      return;
    }
    el.innerHTML = events.slice(0, 8).map(e => `
      <div class="activity-item">
        <div class="activity-dot dot-${esc(e.type)}"></div>
        <span class="activity-text">${esc(e.text)}</span>
        <span class="activity-time" data-ts="${e.ts}">${timeAgo(new Date(e.ts).toISOString())}</span>
      </div>`).join('');
  }

  function refreshActivityTimes() {
    document.querySelectorAll('#sb-activity .activity-time[data-ts]').forEach(el => {
      const ts = parseInt(el.dataset.ts, 10);
      if (ts) el.textContent = timeAgo(new Date(ts).toISOString());
    });
  }

  // ── New picks banner ──────────────────────────────────────────
  let picksFingerprint = null;
  let bannerDismissed  = false;

  function dismissBanner() {
    bannerDismissed = true;
    const banner = document.getElementById('new-picks-banner');
    if (banner) banner.style.display = 'none';
  }

  async function checkForNewPicksAndTrends() {
    try {
      const res  = await fetch('picks_data.json?_=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return;
      const data = await res.json();
      if (!data.runs?.length) return;

      // Banner check — compare run fingerprint
      const latest     = data.runs[0];
      const fingerprint = (latest.date || '') + (latest.time || '');
      if (!picksFingerprint) {
        picksFingerprint = fingerprint;
      } else if (fingerprint !== picksFingerprint && !bannerDismissed) {
        picksFingerprint = fingerprint;
        const banner = document.getElementById('new-picks-banner');
        if (banner) { banner.style.display = 'block'; }
        const timeStr = new Date().toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Chicago'
        });
        addActivity('drop', `New picks dropped at ${timeStr}`);
      }

      // Trends refresh — update grid every call
      const latestDate = latest.ct_date || latest.date;
      const latestRun  = data.runs.find(r => (r.ct_date || r.date) === latestDate);
      const topics = latestRun?.x_trends || [];
      const grid   = document.getElementById('trends-grid');
      if (grid && topics.length) {
        grid.innerHTML = topics.map((name, i) => {
          const cls     = trendRankClass(i);
          const rankStr = (i + 1) < 10 ? `0${i + 1}` : `${i + 1}`;
          const encoded = encodeURIComponent(name);
          return `<a class="trend-item${cls ? ' ' + cls : ''}" href="https://x.com/search?q=${encoded}" target="_blank" rel="noopener noreferrer">
            <span class="trend-item-rank">${rankStr}</span>
            <span class="trend-item-name">${esc(name)}</span>
          </a>`;
        }).join('');
        trendsUpdatedAt = new Date();
        updateTrendsTimestamp();
      }
    } catch {}
  }

  // ── Trends updated indicator ──────────────────────────────────
  let trendsUpdatedAt = null;

  function updateTrendsTimestamp() {
    const el = document.getElementById('trends-updated-at');
    if (!el || !trendsUpdatedAt) return;
    el.textContent = `updated ${timeAgo(trendsUpdatedAt.toISOString())}`;
    el.classList.add('visible');
  }

  // ── Bootstrap ────────────────────────────────────────────────
  async function loadFeed() {
    try {
      const res  = await fetch('picks_data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.runs?.length) {
        lastRunTime  = parseRunTime(data.runs[0]);
        const latest = data.runs[0];
        picksFingerprint = (latest.date || '') + (latest.time || '');
        trendsUpdatedAt  = lastRunTime || new Date();
      }
      render(data.runs);
      wireButtons();
      tickCountdown();
      positionSticky();
      initScorePulse();
      updateTrendsTimestamp();

      // Log initial activity event (once per run fingerprint)
      if (data.runs?.length) {
        const latest   = data.runs[0];
        const existing = getActivity();
        const recentDrop = existing[0]?.type === 'drop' &&
          (Date.now() - (existing[0]?.ts || 0)) < 5 * 60 * 1000;
        if (!recentDrop) {
          const timeStr = (latest.display_time || '').trim();
          addActivity('drop', timeStr ? `Latest picks: ${timeStr}` : 'Picks loaded');
        } else {
          renderActivitySection();
        }
      }
    } catch {
      document.getElementById('feed-container').innerHTML =
        `<div class="state-msg">Could not load picks.<br>
        <small style="font-family:var(--sans);font-size:11px">If testing locally, serve with a web server.</small></div>`;
    }
  }

  positionSticky();
  window.addEventListener('resize', positionSticky);
  initProgressBar();
  loadFeed();
  tickCountdown();
  setInterval(tickCountdown, 60_000);
  // Poll every 5 min — checks for new picks AND refreshes trends
  setInterval(checkForNewPicksAndTrends, 5 * 60_000);

  initNotifBtn();

  // ── Service Worker ────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── Breaking news: render cards ──────────────────────────────
  function renderBreakingCard(item) {
    const searchUrl = esc(item.search_url || `https://www.google.com/search?q=${encodeURIComponent(item.topic)}`);
    const traffic   = item.traffic ? ` <span style="font-size:10px;color:var(--ink-4);font-weight:400">${esc(item.traffic)} searches</span>` : '';
    const detected  = item.detected_at ? timeAgo(item.detected_at) : '';
    return `<div class="pick-card card-breaking" data-breaking-id="${esc(item.id)}">
      <div class="card-body">
        <div class="card-meta">
          <span class="breaking-badge">Breaking</span>${traffic}
          <span class="card-timestamp">${esc(detected)}</span>
        </div>
        <a class="card-title" href="${searchUrl}" target="_blank" rel="noopener noreferrer">${esc(item.topic)}</a>
        <div class="card-why" style="font-size:12px;color:var(--ink-4);margin-bottom:8px">
          Velocity spike detected — newly trending in the US
        </div>
        <div class="card-footer">
          <a class="read-link" href="${searchUrl}" target="_blank" rel="noopener noreferrer">
            Search Google <span class="read-arrow">→</span>
          </a>
        </div>
      </div>
    </div>`;
  }

  function renderBreakingSection(items) {
    if (!items || !items.length) return;
    const container = document.getElementById('feed-container');
    if (!container) return;

    let existing = document.getElementById('breaking-section');
    if (!existing) {
      existing = document.createElement('div');
      existing.id = 'breaking-section';
      container.prepend(existing);
    }

    existing.innerHTML = `<div class="breaking-section-label">Breaking now</div>` +
      items.map(renderBreakingCard).join('');
  }

  // ── Breaking news: polling ───────────────────────────────────
  let lastBreakingId = null;

  async function checkBreakingNews() {
    try {
      const res = await fetch('breaking_news.json?_=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return;
      const data = await res.json();
      const items = data.items || [];
      if (!items.length) return;

      const latestId = items[0].id;
      if (latestId !== lastBreakingId && lastBreakingId !== null) {
        // New spike since our last check
        showBreakingNotification(items[0]);
        addActivity('drop', `⚡ Breaking: ${items[0].topic}`);
      }
      lastBreakingId = latestId;
      renderBreakingSection(items);
    } catch {}
  }

  // ── Push notifications ───────────────────────────────────────
  async function showBreakingNotification(item) {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    const opts = {
      body: `${item.traffic ? item.traffic + ' searches · ' : ''}Velocity spike detected`,
      tag:       'breaking-news',
      renotify:  true,
      icon:      'icon-192.png',
    };
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification(`⚡ ${item.topic}`, opts);
      } else {
        new Notification(`⚡ ${item.topic}`, opts);
      }
    } catch {}
  }

  function initNotifBtn() {
    const btn = document.getElementById('notif-btn');
    if (!btn) return;
    if (!('Notification' in window)) { btn.style.display = 'none'; return; }
    if (Notification.permission === 'granted') {
      btn.textContent = '🔔'; btn.title = 'Notifications enabled';
    } else if (Notification.permission === 'denied') {
      btn.textContent = '🔕'; btn.title = 'Notifications blocked';
    } else {
      btn.textContent = '🔔'; btn.title = 'Enable breaking news notifications';
    }
  }

  async function enableNotifications() {
    if (!('Notification' in window)) {
      alert('This browser does not support notifications.');
      return;
    }
    const perm = await Notification.requestPermission();
    const btn  = document.getElementById('notif-btn');
    if (perm === 'granted') {
      if (btn) { btn.textContent = '🔔'; btn.title = 'Notifications enabled'; }
    } else {
      if (btn) { btn.textContent = '🔕'; btn.title = 'Notifications blocked'; }
    }
  }

  // Poll breaking news every 2 minutes (more frequent than picks poll)
  checkBreakingNews();
  setInterval(checkBreakingNews, 2 * 60_000);
</script>
</body>
</html>
