<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <title>Blank</title>
  <meta name="description" content="The AI is your editor. The news that's worth your time, ranked.">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E120F" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="Blank">
  <meta property="og:description" content="The AI is your editor. The news worth your time, ranked.">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─────────────────────────────────────────────────────────────
       DESIGN TOKENS — light + dark.
       Canvas: a whisper-warm near-white (NOT cream). Near-black ink.
       Signature: Aimé Leon Dore forest green, used sparingly.
       Type: Schibsted Grotesk (display) + Hanken Grotesk (text/UI).
       ───────────────────────────────────────────────────────────── */
    :root {
      --display: 'Schibsted Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      --text:    'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;

      /* radii / motion */
      --r-card: 16px;
      --r-row:  14px;
      --r-pill: 999px;
      --ease:   cubic-bezier(.22, 1, .36, 1);

      --maxw:   620px;
      --bar-h:  calc(60px + 30px + env(safe-area-inset-bottom)); /* clearance for the floating bar */
    }

    /* LIGHT (default) */
    :root, :root[data-theme="light"] {
      --bg:        #FAF9F6;   /* whisper-warm near-white */
      --surface:   #FFFFFF;
      --raise:     #F3F2EE;   /* subtle raised fill */
      --skeleton:  #EEEDE8;
      --line:      #EAE8E1;   /* hairline */
      --line-2:    #DEDCD3;   /* stronger hairline */

      --ink:       #14160F;   /* near-black, faintly warm */
      --ink-2:     #565848;   /* secondary */
      --ink-3:     #8B8C7F;   /* tertiary / muted */
      --ink-4:     #ABACA0;   /* faint */

      --green:     #21402E;   /* ALD forest — base */
      --green-ink: #1C5236;   /* readable green for text/links */
      --green-soft:#E9EFE9;   /* soft green fill */
      --green-line:#CBDBCB;

      --gold:      #9A7B3F;   /* reserved hairline for the rarest tier */
      --gold-soft: #F2EBDC;

      --shadow:    0 1px 2px rgba(20,22,15,.04), 0 8px 24px -12px rgba(20,22,15,.12);
      --shadow-lead: 0 2px 6px rgba(20,22,15,.06), 0 24px 48px -24px rgba(20,22,15,.28);
      --img-tint:  #E7E5DD;
      --scrim:     linear-gradient(to top, rgba(8,10,6,.92) 0%, rgba(8,10,6,.30) 48%, rgba(8,10,6,0) 100%);

      /* liquid glass */
      --glass-bg:     color-mix(in srgb, var(--bg) 55%, transparent);
      --glass-border: rgba(20,22,15,.10);
      --glass-hi:     rgba(255,255,255,.65);
      --glass-sheen:  rgba(255,255,255,.30);
      --glass-shadow: 0 10px 34px -8px rgba(20,22,15,.30), 0 2px 8px rgba(20,22,15,.10);

      /* rarity tiers — gem colour by score (8 Rare / 9 Epic / 10 Legendary) */
      --rare:      #2E6FD6;
      --epic:      #7B4FD2;
      --legendary: #C0871E;
    }

    /* DARK */
    :root[data-theme="dark"] {
      --bg:        #0E120F;
      --surface:   #161B16;
      --raise:     #1E241F;
      --skeleton:  #1C221D;
      --line:      #242B25;
      --line-2:    #303931;

      --ink:       #ECEDE4;
      --ink-2:     #A6A99B;
      --ink-3:     #767A6C;
      --ink-4:     #565A4F;

      --green:     #6FB387;
      --green-ink: #87C79C;
      --green-soft:#172A1E;
      --green-line:#2A4533;

      --gold:      #C8A765;
      --gold-soft: #2A2417;

      --shadow:    0 1px 2px rgba(0,0,0,.4), 0 10px 30px -16px rgba(0,0,0,.7);
      --shadow-lead: 0 2px 8px rgba(0,0,0,.5), 0 26px 56px -26px rgba(0,0,0,.85);
      --img-tint:  #20271F;
      --scrim:     linear-gradient(to top, rgba(0,0,0,.94) 0%, rgba(0,0,0,.34) 48%, rgba(0,0,0,0) 100%);

      /* liquid glass */
      --glass-bg:     color-mix(in srgb, var(--surface) 48%, transparent);
      --glass-border: rgba(255,255,255,.10);
      --glass-hi:     rgba(255,255,255,.16);
      --glass-sheen:  rgba(255,255,255,.07);
      --glass-shadow: 0 12px 38px -8px rgba(0,0,0,.66), 0 2px 10px rgba(0,0,0,.4);

      /* rarity tiers */
      --rare:      #5E9BFF;
      --epic:      #A98BFF;
      --legendary: #E2B85E;
    }

    /* honour OS when in auto */
    @media (prefers-color-scheme: dark) {
      :root[data-theme="auto"] {
        --bg:#0E120F; --surface:#161B16; --raise:#1E241F; --skeleton:#1C221D;
        --line:#242B25; --line-2:#303931;
        --ink:#ECEDE4; --ink-2:#A6A99B; --ink-3:#767A6C; --ink-4:#565A4F;
        --green:#6FB387; --green-ink:#87C79C; --green-soft:#172A1E; --green-line:#2A4533;
        --gold:#C8A765; --gold-soft:#2A2417;
        --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px -16px rgba(0,0,0,.7);
        --shadow-lead:0 2px 8px rgba(0,0,0,.5), 0 26px 56px -26px rgba(0,0,0,.85);
        --img-tint:#20271F;
        --scrim:linear-gradient(to top, rgba(0,0,0,.94) 0%, rgba(0,0,0,.34) 48%, rgba(0,0,0,0) 100%);
        --glass-bg:color-mix(in srgb, var(--surface) 48%, transparent);
        --glass-border:rgba(255,255,255,.10); --glass-hi:rgba(255,255,255,.16);
        --glass-sheen:rgba(255,255,255,.07);
        --glass-shadow:0 12px 38px -8px rgba(0,0,0,.66), 0 2px 10px rgba(0,0,0,.4);
        --rare:#5E9BFF; --epic:#A98BFF; --legendary:#E2B85E;
      }
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: none;
      overflow-x: hidden;   /* contain full-bleed tint bands */
    }
    body { transition: background .4s var(--ease), color .4s var(--ease); }
    img    { display: block; max-width: 100%; }
    a      { color: inherit; text-decoration: none; }
    button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    ::selection { background: var(--green-soft); color: var(--green-ink); }

    /* ── Top bar ─────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 60;
      height: calc(52px + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: saturate(1.4) blur(18px);
      -webkit-backdrop-filter: saturate(1.4) blur(18px);
      border-bottom: 1px solid transparent;
      transition: transform .32s var(--ease), border-color .3s var(--ease), background .3s var(--ease);
    }
    .topbar.scrolled { border-bottom-color: var(--line); }
    .topbar.hide { transform: translateY(-100%); }
    .topbar-inner {
      max-width: var(--maxw); height: 52px; margin: 0 auto;
      padding: 0 18px; display: flex; align-items: center; gap: 12px;
    }
    .wordmark {
      font-family: var(--display);
      font-weight: 800; font-size: 21px; letter-spacing: -.03em; color: var(--ink);
      display: flex; align-items: baseline; gap: 1px;
    }
    .wordmark .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-ink); transform: translateY(-1px); }
    .topbar-spacer { flex: 1; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 50%;
      display: grid; place-items: center; color: var(--ink-2);
      transition: background .15s, color .15s, transform .12s var(--ease);
    }
    .icon-btn:hover { background: var(--raise); color: var(--ink); }
    .icon-btn:active { transform: scale(.92); }
    .icon-btn svg { width: 21px; height: 21px; }

    /* ── Pull-to-refresh ─────────────────────────────────────── */
    .ptr {
      position: fixed; top: calc(54px + env(safe-area-inset-top)); left: 0; right: 0;
      display: grid; place-items: center; height: 40px; z-index: 40;
      color: var(--ink-3); pointer-events: none; opacity: 0; transition: opacity .2s var(--ease);
    }
    .ptr svg { width: 22px; height: 22px; }
    .ptr.spin svg { animation: spin .8s linear infinite; }
    /* the content rubber-bands down with the pull, then snaps back */
    .views.snap { transition: transform .36s var(--ease); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scroll views ────────────────────────────────────────── */
    .views { max-width: var(--maxw); margin: 0 auto; }
    .view { display: none; padding: 10px 14px var(--bar-h); }
    .view.active { display: block; animation: viewin .34s var(--ease) both; }
    @keyframes viewin { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Section eyebrow ─────────────────────────────────────── */
    .eyebrow {
      display: flex; align-items: center; gap: 9px;
      padding: 18px 4px 11px;
    }
    .eyebrow b {
      font-family: var(--text); font-weight: 700; font-size: 11px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3);
    }
    .eyebrow .rule { flex: 1; height: 1px; background: var(--line); }

    /* ── Rarity gem (quiet, no numbers, no label) ────────────── */
    .row-meta .gem {
      width: 8px; height: 8px; border-radius: 2px; transform: rotate(45deg);
      flex: none; margin-right: 1px;
    }
    .gem-rare      { background: var(--rare); }
    .gem-epic      { background: var(--epic); }
    .gem-legendary { background: var(--legendary); box-shadow: 0 0 0 .5px color-mix(in srgb, var(--legendary) 50%, transparent); }

    /* ── LEAD card ───────────────────────────────────────────── */
    .lead {
      position: relative; display: block; border-radius: var(--r-card);
      overflow: hidden; background: var(--img-tint);
      box-shadow: var(--shadow-lead);
      aspect-ratio: 5 / 4; max-height: 460px;
      transition: transform .3s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 560px) { .lead { aspect-ratio: 16 / 10; } }
    .lead:active { transform: scale(.985); }
    .lead-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 50% 28%; background: var(--img-tint); }
    .lead-tex { position: absolute; inset: 0; background:
      radial-gradient(120% 90% at 18% 8%, color-mix(in srgb, var(--green) 26%, transparent), transparent 60%),
      var(--img-tint); }
    .lead-scrim { position: absolute; inset: 0; background: var(--scrim); }
    .lead-top { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; align-items: center; }
    .glass {
      background: rgba(0,0,0,.34); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.16);
    }
    .lead-mark {
      padding: 6px 11px; border-radius: var(--r-pill); color: #fff;
      font-family: var(--text); font-weight: 700; font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .lead-mark .gem { width: 7px; height: 7px; border-radius: 1.5px; transform: rotate(45deg); background: #fff; }
    .lead-mark .gem.gem-rare      { background: #6BA8FF; }
    .lead-mark .gem.gem-epic      { background: #B49BFF; }
    .lead-mark .gem.gem-legendary { background: #F0C66A; }
    .lead-mark.is-pick { box-shadow: inset 0 0 0 1px rgba(255,255,255,.10); }
    .lead-mark.is-pick .gem { background: #8FE0AD; }
    .lead-body { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 18px 20px; }
    .lead-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; flex-wrap: wrap; }
    .src {
      font-family: var(--text); font-weight: 700; font-size: 10.5px; letter-spacing: .04em;
      text-transform: uppercase;
    }
    .lead-body .src { color: rgba(255,255,255,.92); }
    /* source identity: favicon + name grouped tightly */
    .srcline { display: inline-flex; align-items: center; gap: 5px; min-width: 0; }
    .src-ico { width: 14px; height: 14px; border-radius: 3px; object-fit: contain; flex: none; display: block; }
    .lead-meta .src-ico { width: 15px; height: 15px; background: rgba(255,255,255,.92); padding: 1px; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
    .psrc .src-ico { width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; }
    .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .5; }
    .lead-body .time { font-size: 11.5px; color: rgba(255,255,255,.66); }
    .lead-h {
      font-family: var(--display); font-weight: 700; font-size: 24px; line-height: 1.16;
      letter-spacing: -.02em; color: #fff; text-wrap: balance;
    }
    @media (min-width: 560px) { .lead-h { font-size: 28px; } }

    /* trend chip (Live's quiet home) */
    .trend {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--text); font-weight: 700; font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase;
      color: var(--green-ink); background: var(--green-soft); border: 1px solid var(--green-line);
      padding: 3px 8px; border-radius: var(--r-pill);
    }
    .trend.on-img { color: #9BE7BA; background: rgba(0,0,0,.34); border-color: rgba(255,255,255,.14); }
    .trend .spark { width: 5px; height: 5px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 0 currentColor; animation: pulse 2s var(--ease) infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 color-mix(in srgb,currentColor 60%,transparent);} 70%{box-shadow:0 0 0 6px transparent;} 100%{box-shadow:0 0 0 0 transparent;} }

    /* ── ROW (uniform, thumbnail-right) ──────────────────────── */
    .row {
      position: relative; background: var(--surface);
      border: 1px solid var(--line); border-radius: var(--r-row);
      margin-top: 10px; overflow: hidden;
      transition: border-color .18s, transform .18s var(--ease), box-shadow .25s var(--ease);
    }
    .row:hover { border-color: var(--line-2); box-shadow: var(--shadow); }
    .row-link { display: flex; gap: 13px; padding: 14px; align-items: flex-start; -webkit-tap-highlight-color: transparent; }
    .row.tap { transform: scale(.985); }
    .row-main { flex: 1; min-width: 0; }
    .row-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; color: var(--ink-3); }
    .row-meta .src { color: var(--ink-2); }
    .row-meta .time { font-size: 11px; color: var(--ink-3); }
    .row-h {
      font-family: var(--display); font-weight: 600; font-size: 16px; line-height: 1.28;
      letter-spacing: -.01em; color: var(--ink); text-wrap: pretty;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* text-only rows have no thumbnail — give them a little extra breathing room
       (headline weight/size stays uniform with image rows) */
    .row.no-img .row-link { padding-bottom: 15px; }
    .row-thumb {
      width: 78px; height: 78px; flex: none; border-radius: 10px; overflow: hidden;
      background: var(--img-tint); position: relative;
    }
    .row-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 30%; }
    .row-thumb.placeholder::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(90% 80% at 25% 15%, color-mix(in srgb, var(--green) 18%, transparent), transparent 65%), var(--img-tint);
    }

    /* ── Cluster line (quiet, expandable) ────────────────────── */
    .cluster { border-top: 1px solid var(--line); }
    .cluster-line {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 10px 14px; text-align: left; color: var(--ink-3);
      font-family: var(--text); font-size: 11.5px; font-weight: 500;
      transition: background .15s;
    }
    .cluster-line:hover { background: var(--raise); }
    .cluster-line .stack { display: flex; }
    .cluster-line .chip {
      font-weight: 600; color: var(--ink-2);
    }
    .cluster-line .count { color: var(--green-ink); font-weight: 600; }
    .cluster-line .chev { margin-left: auto; transition: transform .3s var(--ease); width: 15px; height: 15px; flex: none; }
    .cluster.open .chev { transform: rotate(180deg); }
    .cluster-drawer { max-height: 0; overflow: hidden; transition: max-height .34s var(--ease); }
    .cluster.open .cluster-drawer { max-height: 600px; }
    .cluster-drawer-in { padding: 4px 14px 12px; }
    .persp {
      display: flex; flex-direction: column; gap: 2px; padding: 9px 0 9px 12px;
      border-left: 2px solid var(--green-line); margin-bottom: 2px; position: relative;
      transition: border-color .15s;
    }
    .persp:hover { border-color: var(--green-ink); }
    .persp .psrc { display: inline-flex; align-items: center; font-family: var(--text); font-weight: 700; font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--green-ink); }
    .persp .ptitle { font-family: var(--text); font-size: 12.5px; line-height: 1.36; color: var(--ink-2); }

    /* ── Card "⋯" menu (replaces the per-card action bar) ─────── */
    .card-actions { position: relative; padding: 0 6px 6px; }
    .card-more {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 28px; border-radius: 8px; color: var(--ink-4);
      transition: background .15s, color .15s, transform .1s var(--ease);
    }
    .card-more svg { width: 19px; height: 19px; }
    .card-more:hover { background: var(--raise); color: var(--ink-2); }
    .card-more:active { transform: scale(.9); }
    .card-menu {
      position: absolute; bottom: 36px; left: 4px; z-index: 20; min-width: 188px;
      background: var(--surface); border: 1px solid var(--line-2); border-radius: 13px;
      box-shadow: var(--shadow-lead); padding: 5px; display: none;
    }
    .card-menu.open { display: block; animation: menu-in .14s var(--ease) both; }
    @keyframes menu-in { from { opacity: 0; transform: translateY(4px) scale(.98); } to { opacity: 1; transform: none; } }
    .card-menu button { display: flex; align-items: center; gap: 11px; width: 100%; padding: 10px 12px; border-radius: 9px; font: 600 13px var(--text); color: var(--ink); text-align: left; }
    .card-menu button:hover { background: var(--raise); }
    .card-menu button svg { width: 17px; height: 17px; flex: none; color: var(--ink-3); }
    .card-menu .danger { color: #b4513f; }
    .card-menu .danger svg { color: #b4513f; }

    /* dismiss / undo state */
    .row.dismissing { opacity: 0; transform: translateY(-6px) scale(.97); max-height: 0; margin-top: 0; transition: all .42s var(--ease); pointer-events: none; }
    .undo {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      background: var(--raise); border: 1px solid var(--line); border-radius: var(--r-row);
      margin-top: 10px; padding: 13px 16px; color: var(--ink-2); font-size: 12.5px; font-weight: 500;
      animation: viewin .3s var(--ease) both;
    }
    .undo button { color: var(--green-ink); font-weight: 700; font-size: 12.5px; }

    /* ── Skeletons ───────────────────────────────────────────── */
    .sk { background: var(--skeleton); border-radius: var(--r-row); position: relative; overflow: hidden; }
    .sk::after { content:''; position:absolute; inset:0; background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--surface) 60%, transparent), transparent); transform: translateX(-100%); animation: shimmer 1.4s infinite; }
    @keyframes shimmer { to { transform: translateX(100%); } }
    .sk-lead { aspect-ratio: 5/4; max-height: 460px; border-radius: var(--r-card); }
    .sk-row { height: 108px; margin-top: 10px; }

    /* ── Staggered reveal ────────────────────────────────────── */
    .enter { animation: enter .5s var(--ease) both; }
    @keyframes enter { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .end { text-align: center; padding: 34px 0 12px; color: var(--ink-4); font-size: 11px; letter-spacing: .3em; }
    .sentinel { display: grid; place-items: center; padding: 30px 0; }
    .sentinel .dots { display: flex; gap: 5px; }
    .sentinel .dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-4); animation: bob 1.1s var(--ease) infinite; }
    .sentinel .dots i:nth-child(2){ animation-delay: .15s; } .sentinel .dots i:nth-child(3){ animation-delay: .3s; }
    @keyframes bob { 0%,70%,100%{ transform: translateY(0); opacity:.4; } 35%{ transform: translateY(-5px); opacity:1; } }

    /* ── Empty / generic states ──────────────────────────────── */
    .blank-state { text-align: center; padding: 80px 28px; }
    .blank-state .em { font-family: var(--display); font-weight: 700; font-size: 19px; letter-spacing: -.02em; color: var(--ink); margin-bottom: 8px; }
    .blank-state .p { font-size: 13px; color: var(--ink-3); line-height: 1.5; max-width: 280px; margin: 0 auto; }

    /* ── Niches picker ───────────────────────────────────────── */
    .niche-grid { display: flex; flex-wrap: wrap; gap: 9px; padding: 4px 4px 8px; }
    .niche {
      border: 1px solid var(--line-2); border-radius: var(--r-pill);
      padding: 9px 15px; font-size: 13px; font-weight: 600; color: var(--ink-2);
      transition: all .15s var(--ease);
    }
    .niche:active { transform: scale(.94); }
    .niche.on { background: var(--green); border-color: var(--green); color: #fff; }
    :root[data-theme="dark"] .niche.on, :root[data-theme="auto"] .niche.on { color: #0E120F; }
    @media (prefers-color-scheme: dark) { :root[data-theme="auto"] .niche.on { color: #0E120F; } }
    .lede { font-size: 13.5px; line-height: 1.55; color: var(--ink-2); padding: 2px 4px 6px; }

    /* ── Search ──────────────────────────────────────────────── */
    .search-wrap { padding: 6px 4px 4px; }
    .search-field {
      display: flex; align-items: center; gap: 10px; background: var(--surface);
      border: 1px solid var(--line-2); border-radius: var(--r-pill); padding: 12px 16px;
      transition: border-color .15s;
    }
    .search-field:focus-within { border-color: var(--green-ink); }
    .search-field input { flex: 1; border: none; background: none; outline: none; font-family: var(--text); font-size: 15px; color: var(--ink); }
    .search-field svg { width: 18px; height: 18px; color: var(--ink-3); }

    /* ── Profile ─────────────────────────────────────────────── */
    .p-group { margin-top: 14px; }
    .p-label { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); padding: 0 4px 8px; }
    .p-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-row); overflow: hidden; }
    .p-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); font-size: 14px; font-weight: 500; }
    .p-item:last-child { border-bottom: none; }
    .p-item .grow { flex: 1; }
    .seg { display: flex; background: var(--raise); border-radius: 9px; padding: 3px; gap: 3px; }
    .seg button { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--ink-3); transition: all .15s; }
    .seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
    .ghost-btn { padding: 8px 14px; border-radius: var(--r-pill); border: 1px solid var(--green-line); color: var(--green-ink); font-size: 12.5px; font-weight: 700; transition: background .15s; }
    .ghost-btn:hover { background: var(--green-soft); }

    /* ── Bottom tab bar (floating island) ────────────────────── */
    .tabbar {
      position: fixed; left: 0; right: 0; z-index: 70;
      bottom: calc(14px + env(safe-area-inset-bottom));
      display: flex; justify-content: center;
      padding: 0 20px; pointer-events: none;
    }
    .tabbar-inner {
      position: relative;
      pointer-events: auto;
      width: min(420px, 100%); height: 60px; display: flex;
      background: var(--glass-bg);
      backdrop-filter: saturate(1.9) blur(28px); -webkit-backdrop-filter: saturate(1.9) blur(28px);
      border: 1px solid var(--glass-border); border-radius: 26px;
      box-shadow:
        var(--glass-shadow),
        inset 0 1px 0 var(--glass-hi),
        inset 0 0 0 1px rgba(255,255,255,.05);
      overflow: hidden;
    }
    /* specular sheen — the iOS "liquid glass" lens highlight */
    .tabbar-inner::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 1;
      background: linear-gradient(to bottom,
        var(--glass-sheen) 0%, transparent 38%, transparent 72%,
        color-mix(in srgb, var(--glass-sheen) 40%, transparent) 100%);
    }
    .tabbar-inner > .tab { position: relative; z-index: 2; }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      color: var(--ink-3); position: relative; transition: color .18s;
    }
    .tab svg { width: 23px; height: 23px; transition: transform .2s var(--ease); }
    .tab span { font-family: var(--text); font-size: 9.5px; font-weight: 600; letter-spacing: .01em; }
    .tab.on { color: var(--green-ink); }
    .tab.on svg { transform: translateY(-1px); }
    .tab:active svg { transform: scale(.86); }
    .tab .badge { position: absolute; top: 9px; right: calc(50% - 17px); min-width: 7px; height: 7px; border-radius: 999px; background: var(--green-ink); }

    /* ── Cohesive feed — all box-free ──────────────────────────────────────── */
    /* Top Stories zone — distinct via a prominent header + a full-bleed tint
       band (NOT a box: edge-to-edge, no border, soft fade-out at the bottom). */
    .topstories-zone { position: relative; padding-bottom: 16px; margin-bottom: 4px; }
    .topstories-zone::before {
      content: ''; position: absolute; inset: -8px 0 0; left: 50%; width: 100vw;
      transform: translateX(-50%); pointer-events: none;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--green-soft) 85%, transparent) 0%,
        color-mix(in srgb, var(--green-soft) 38%, transparent) 55%,
        transparent 100%);
    }
    .topstories-zone > * { position: relative; }   /* content paints above the tint */
    .ts-head { padding: 6px 4px 12px; }
    .ts-kicker { font-family: var(--text); font-weight: 700; font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--green-ink); }
    .ts-title { font-family: var(--display); font-weight: 800; font-size: 23px; letter-spacing: -.025em; color: var(--ink); margin-top: 5px; line-height: 1.05; }

    /* Top Stories secondary cards — borderless, bigger image + headline (Apple-News list) */
    .ts-card { display: flex; gap: 14px; align-items: flex-start; padding: 15px 2px; border-top: 1px solid var(--line); -webkit-tap-highlight-color: transparent; }
    .ts-card:first-of-type { border-top: none; margin-top: 4px; }
    .ts-card:active { opacity: .65; }
    .ts-main { flex: 1; min-width: 0; }
    .ts-h { font-family: var(--display); font-weight: 700; font-size: 18px; line-height: 1.24; letter-spacing: -.015em; color: var(--ink); margin-top: 6px; text-wrap: pretty; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .ts-card.no-img .ts-h { font-size: 18.5px; }
    .ts-thumb { width: 104px; height: 78px; flex: none; border-radius: 10px; overflow: hidden; background: var(--img-tint); }
    .ts-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 30%; }
    /* runners-up (#2 & #3) — a two-up of borderless image-top feature cards */
    .ts-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin: 8px 0 6px; }
    .pair-card { display: block; -webkit-tap-highlight-color: transparent; }
    .pair-card:active { opacity: .7; }
    .pair-img { aspect-ratio: 4 / 3; border-radius: 12px; overflow: hidden; background: var(--img-tint); margin-bottom: 9px; position: relative; }
    .pair-img img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 30%; }
    .pair-img.ph::after { content: ''; position: absolute; inset: 0; background: radial-gradient(90% 80% at 25% 15%, color-mix(in srgb, var(--green) 16%, transparent), transparent 65%), var(--img-tint); }
    .pair-card .row-meta { margin-bottom: 5px; }
    .pair-h { font-family: var(--display); font-weight: 700; font-size: 14.5px; line-height: 1.26; letter-spacing: -.01em; color: var(--ink); text-wrap: pretty; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    @media (max-width: 380px) { .pair-h { font-size: 13.5px; } }

    /* quiet hairline topic label (niche preview) — a label + rule, never a box */
    .eyebrow.topic { padding-top: 24px; }
    .eyebrow.topic b { color: var(--ink-2); }

    /* "More in {niche}" (variant C) — a text button, no box */
    .read-more { display: inline-flex; align-items: center; gap: 7px; margin: 4px 2px 2px; padding: 9px 2px; font-family: var(--text); font-size: 12.5px; font-weight: 700; color: var(--green-ink); }
    .read-more .rm-arrow { transition: transform .15s var(--ease); }
    .read-more:hover .rm-arrow { transform: translateX(3px); }

    /* Niche page (drill-down) — back button only; the title lives in the zone head */
    .niche-page-head { padding: 6px 2px 0; }
    .np-back { display: inline-flex; align-items: center; gap: 4px; margin-bottom: 6px; padding: 7px 12px 7px 8px; border-radius: var(--r-pill); font-family: var(--text); font-size: 12.5px; font-weight: 600; color: var(--ink-2); background: var(--raise); }
    .np-back:active { opacity: .65; }
    .np-back svg { width: 16px; height: 16px; }

    /* "You're all caught up" beat — centered, calm, no box */
    .caughtup { text-align: center; padding: 44px 24px 6px; }
    .caughtup .cu-rule { width: 36px; height: 2px; border-radius: 2px; background: var(--green-line); margin: 0 auto 20px; }
    .caughtup .cu-check { width: 36px; height: 36px; margin: 0 auto 13px; border-radius: 50%; display: grid; place-items: center; color: var(--green-ink); background: var(--green-soft); }
    .caughtup .cu-check svg { width: 19px; height: 19px; }
    .caughtup .cu-title { font-family: var(--display); font-weight: 700; font-size: 18px; letter-spacing: -.02em; color: var(--ink); }
    .caughtup .cu-sub { font-family: var(--text); font-size: 12.5px; color: var(--ink-3); margin-top: 5px; }
    /* Catch-up empty state — the closure "ritual", centered & prominent */
    .caughtup.catchup-hero { padding: 64px 24px 40px; }
    .caughtup.catchup-hero .cu-check { width: 46px; height: 46px; margin-bottom: 16px; }
    .caughtup.catchup-hero .cu-check svg { width: 24px; height: 24px; }
    .caughtup.catchup-hero .cu-title { font-size: 21px; }

    /* "Keep reading" — quiet centered pill button (the opt-in endless tail) */
    .keep-reading { display: block; margin: 16px auto 30px; padding: 10px 20px; font-family: var(--text); font-size: 12.5px; font-weight: 600; color: var(--ink-3); background: transparent; border: 1px solid var(--line-2); border-radius: var(--r-pill); transition: color .15s, border-color .15s; }
    .keep-reading:hover { color: var(--ink); border-color: var(--ink-3); }

    @media (max-width: 380px) { .lead-h { font-size: 22px; } .row-h { font-size: 15px; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar" id="topbar">
    <div class="topbar-inner">
      <div class="wordmark">Blank<span class="dot"></span></div>
      <div class="topbar-spacer"></div>
      <button class="icon-btn" id="btn-search-top" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
    </div>
  </header>

  <!-- Pull-to-refresh indicator -->
  <div class="ptr" id="ptr">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
  </div>

  <div class="views">
    <!-- FEED -->
    <main class="view active" id="view-feed" data-tab="feed"></main>
    <!-- NICHE PAGE (drill-down from a "More in {niche}" link) -->
    <section class="view" id="view-niche" data-tab="niche"></section>
    <!-- NICHES -->
    <section class="view" id="view-niches" data-tab="niches"></section>
    <!-- CATCH-UP -->
    <section class="view" id="view-catchup" data-tab="catchup"></section>
    <!-- SEARCH -->
    <section class="view" id="view-search" data-tab="search"></section>
    <!-- PROFILE -->
    <section class="view" id="view-profile" data-tab="profile"></section>
  </div>

  <!-- Bottom tab bar -->
  <nav class="tabbar">
    <div class="tabbar-inner">
      <button class="tab on" data-go="feed" aria-label="Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
        <span>Feed</span>
      </button>
      <button class="tab" data-go="niches" aria-label="Niches">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="12" cy="13" r="2.4"/><circle cx="6" cy="19" r="2.4"/><circle cx="18" cy="19" r="2.4"/></svg>
        <span>Niches</span>
      </button>
      <button class="tab" data-go="catchup" aria-label="Catch-up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v5l3 2"/><circle cx="12" cy="12" r="9"/></svg>
        <span>Catch-up</span>
      </button>
      <button class="tab" data-go="search" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>Search</span>
      </button>
      <button class="tab" data-go="profile" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>
        <span>Profile</span>
      </button>
    </div>
  </nav>

  <script>
    /* ── Injected by deploy workflow ───────────────────────── */
    const VAPID_KEY  = '__VAPID_PUBLIC_KEY__';
    const VOTE_TOKEN = '__VOTE_TOKEN__';

    /* ── State ─────────────────────────────────────────────── */
    let allPicks = [];
    let rendered = 0;
    const PAGE = 25;
    let io = null;
    const LS = {
      saved:    'blank.saved',
      hidden:   'blank.hidden',
      niches:   'blank.niches',
      theme:    'blank.theme',
      lastOpen: 'blank.lastOpen',   // Catch-up "since you last opened" timestamp
    };
    const store = {
      get(k, d){ try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
      set(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    /* ── Helpers ───────────────────────────────────────────── */
    const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const cleanSrc = s => (s||'').replace(/^Google\s+News\s*[-–]\s*/i,'').replace(/\s*\+\s*\d+\s+more\s*$/i,'').replace(/\s*[-|–]\s*[^-|–]{1,22}$/,'').trim() || (s||'').trim();

    function ago(p){
      let dt;
      if (p.published_at){ dt = new Date(p.published_at); }
      else if (p.runDate && p.runTime){ dt = new Date(`${p.runDate}T${p.runTime.slice(0,2)}:${p.runTime.slice(2)}:00Z`); }
      if (!dt || isNaN(dt)) return '';
      const m = Math.round((Date.now() - dt)/60000);
      if (m < 2) return 'just now';
      if (m < 60) return `${m}m`;
      const h = Math.floor(m/60); if (h < 24) return `${h}h`;
      const d = Math.floor(h/24); return d < 7 ? `${d}d` : `${Math.floor(d/7)}w`;
    }

    // ── Ranking lives server-side now ───────────────────────────────────────
    // The feed's time-decayed order (score − ageHours / DECAY_HOURS_PER_POINT) is
    // computed once when picks_data.json is built (see deploy-pages.yml and the
    // shared db.DECAY_HOURS_PER_POINT). The page renders the order it's given —
    // no client-side re-sort — so every surface shares one source of truth.

    // Score → rarity gem. Blue=8 (Rare), Purple=9 (Epic), Gold=10 (Legendary).
    // 6–7 get no gem (kept calm). No numbers ever shown.
    function gemClass(score){
      if (score >= 10) return 'gem-legendary';
      if (score >= 9)  return 'gem-epic';
      if (score >= 8)  return 'gem-rare';
      return '';
    }
    function gemTitle(score){
      if (score >= 10) return 'Legendary';
      if (score >= 9)  return 'Epic';
      if (score >= 8)  return 'Rare';
      return '';
    }
    const isTrending = p => !!(p.from_live || p.trend_label);
    function trendName(label){ return (label||'Trending').replace(/Trending on /i,'').replace(/ right now/i,'').trim() || 'Trending'; }

    // Source identity: a small publisher favicon for provenance/trust. Hidden gracefully
    // if it can't resolve, so cards never show a broken icon.
    function favicon(link){
      try {
        const host = new URL(link).hostname.replace(/^www\./, '');
        if (!host) return '';
        return `<img class="src-ico" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=64" alt="" loading="lazy" onerror="this.remove()">`;
      } catch { return ''; }
    }

    /* ── Card builders ─────────────────────────────────────── */
    function leadCard(p){
      const time = ago(p), src = cleanSrc(p.source);
      const gc = gemClass(p.score);
      // Texture is always the base layer; the photo overlays it. A photo that's
      // too small/low-res (logos, thumbnails) is rejected on load and the texture shows through.
      const bg = `<div class="lead-tex"></div>` + (p.image
        ? `<img class="lead-img" src="${esc(p.image)}" alt="" loading="eager" onload="if(this.naturalWidth<420||this.naturalHeight<260)this.remove()" onerror="this.remove()">`
        : '');
      return `
<a class="lead" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer">
  ${bg}<div class="lead-scrim"></div>
  <div class="lead-top">
    <span class="lead-mark glass"><span class="gem ${gc}"></span>Top Story</span>
    ${isTrending(p) ? `<span class="trend on-img" style="margin-left:auto"><span class="spark"></span>${esc(trendName(p.trend_label))}</span>` : ''}
  </div>
  <div class="lead-body">
    <div class="lead-meta">
      <span class="srcline">${favicon(p.link)}<span class="src">${esc(src)}</span></span>
      ${time?`<span class="dot-sep"></span><span class="time">${time} ago</span>`:''}
    </div>
    <h1 class="lead-h">${esc(p.title)}</h1>
  </div>
</a>`;
    }

    function rowCard(p, idx){
      const time = ago(p), src = cleanSrc(p.source);
      const cls = ['row'];
      const gc = gemClass(p.score);
      const gem = gc ? `<span class="gem ${gc}" title="${gemTitle(p.score)}"></span>` : '';
      const dropThumb = "const t=this.closest('.row-thumb'); t&&t.remove(); this.closest('.row')?.classList.add('no-img')";
      const thumb = p.image
        ? `<div class="row-thumb"><img src="${esc(p.image)}" alt="" loading="lazy" onload="if(this.naturalWidth<150||this.naturalHeight<150){${dropThumb}}" onerror="${dropThumb}"></div>`
        : '';
      if (!p.image) cls.push('no-img');
      const saved = isSaved(p);
      return `
<article class="row ${cls.join(' ')} enter" data-id="${esc(rowId(p))}" style="animation-delay:${Math.min(idx,8)*45}ms">
  <a class="row-link" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer">
    <div class="row-main">
      <div class="row-meta">
        ${gem}<span class="srcline">${favicon(p.link)}<span class="src">${esc(src)}</span></span>
        ${isTrending(p) ? `<span class="trend"><span class="spark"></span>${esc(trendName(p.trend_label))}</span>` : ''}
        ${time?`<span class="dot-sep"></span><span class="time">${time}</span>`:''}
      </div>
      <h3 class="row-h">${esc(p.title)}</h3>
    </div>
    ${thumb}
  </a>
  ${clusterBlock(p)}
  ${cardMenu(p, saved)}
</article>`;
    }

    function clusterBlock(p){
      const arts = (p.related_articles || []).filter(a => a && a.url);
      const srcs = (p.cluster_sources || []).filter(Boolean);
      const size = p.cluster_size || (srcs.length || arts.length);
      if (size <= 1 && !arts.length && srcs.length <= 1) return '';
      const names = (arts.length ? arts.map(a=>a.source) : srcs).map(cleanSrc).filter(Boolean);
      if (!names.length) return '';
      const shown = names.slice(0,2);
      const extra = Math.max(0, (size || names.length) - shown.length);
      const label = `<span class="chip">${shown.map(esc).join(', ')}</span>${extra>0?` <span class="count">+${extra} more</span>`:''}`;
      let rows = '';
      if (arts.length){
        rows = arts.slice(0,8).map(a=>`<a class="persp" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer"><span class="psrc">${favicon(a.url)}${esc(cleanSrc(a.source))}</span><span class="ptitle">${esc(a.title||'')}</span></a>`).join('');
      } else {
        rows = srcs.slice(0,10).map(s=>`<div class="persp"><span class="psrc">${esc(cleanSrc(s))}</span><span class="ptitle">Also covering this story</span></div>`).join('');
      }
      return `
<div class="cluster">
  <button class="cluster-line" aria-expanded="false">
    <span>Covered by ${label}</span>
    <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </button>
  <div class="cluster-drawer"><div class="cluster-drawer-in">${rows}</div></div>
</div>`;
    }

    // Card actions collapsed into a single "⋯" menu (bottom-left, off the scroll
    // path) — so a stray tap opens a dismissable menu instead of hiding a story,
    // and the feed stays quiet (one small icon per card, not a 3-button bar).
    function cardMenu(p, saved){
      return `
<div class="card-actions">
  <button type="button" class="card-more" data-act="menu" aria-label="More actions">
    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="19" cy="12" r="1.9"/></svg>
  </button>
  <div class="card-menu" role="menu">
    <button type="button" data-act="save" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4z"/></svg><span class="cm-save">${saved?'Saved':'Save'}</span></button>
    <button type="button" data-act="share" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M8 8l4-4 4 4"/><path d="M5 12v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg><span>Share</span></button>
    <button type="button" data-act="dismiss" role="menuitem" class="danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg><span>Not interested</span></button>
  </div>
</div>`;
    }

    /* ── Identity / saved / hidden ─────────────────────────── */
    const rowId = p => p.link || p.title || '';
    const isSaved  = p => store.get(LS.saved, []).some(s => s.id === rowId(p));
    const isHidden = p => store.get(LS.hidden, []).includes(rowId(p));

    function toggleSave(p){
      const list = store.get(LS.saved, []);
      const id = rowId(p);
      const i = list.findIndex(s => s.id === id);
      if (i >= 0) list.splice(i,1);
      else list.unshift({ id, title: p.title, source: cleanSrc(p.source), link: p.link, image: p.image||null, ts: Date.now() });
      store.set(LS.saved, list);
      return i < 0;
    }

    // Correction loop: "this wasn't noise / not for me" → hide locally + best-effort signal
    function dismiss(p){
      const hidden = store.get(LS.hidden, []);
      const id = rowId(p);
      if (!hidden.includes(id)) hidden.push(id);
      store.set(LS.hidden, hidden);
      sendCorrection(p, 'down');
    }
    function undismiss(p){
      const hidden = store.get(LS.hidden, []).filter(x => x !== rowId(p));
      store.set(LS.hidden, hidden);
    }
    // Best-effort: POST to a votes endpoint if configured; silently no-op otherwise.
    function sendCorrection(p, dir){
      if (!VOTE_TOKEN || VOTE_TOKEN.startsWith('__')) return; // not wired yet
      try {
        fetch('/api/vote', {
          method: 'POST', keepalive: true,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${VOTE_TOKEN}` },
          body: JSON.stringify({ url: p.link, title: p.title, score: p.score, direction: dir, ts: Date.now() }),
        }).catch(()=>{});
      } catch {}
    }

    /* ── Feed render ───────────────────────────────────────── */
    function visiblePicks(){ return allPicks.filter(p => !isHidden(p)); }

    // Preload an image and report whether it's big enough to lead with.
    function usableImage(src){
      return new Promise(res => {
        const im = new Image();
        im.onload  = () => res(im.naturalWidth >= 420 && im.naturalHeight >= 260);
        im.onerror = () => res(false);
        im.src = src;
      });
    }
    // Highest-ranked story whose image is verified good-res; else the #1 story (texture lead).
    async function pickLead(list){
      const candidates = list.filter(p => p.image).slice(0, 10);
      for (const p of candidates){ if (await usableImage(p.image)) return p; }
      return list[0];
    }

    async function renderFeed(){
      const feed = document.getElementById('view-feed');
      const list = visiblePicks();
      if (!list.length){
        feed.innerHTML = `<div class="blank-state"><div class="em">You're all caught up</div><p class="p">The editor hasn't surfaced anything new yet. Pull down to refresh.</p></div>`;
        return;
      }
      rendered = 0;
      // Lead slot = the top-ranked story with a verified good-resolution image, so the
      // hero almost always shows a real photo rather than a flat texture.
      const lead = await pickLead(list);
      const li = list.indexOf(lead);
      if (li > 0){ list.splice(li, 1); list.unshift(lead); }
      const first = list[0];
      let html = leadCard(first);
      html += `<div class="eyebrow"><b>The Feed</b><span class="rule"></span></div>`;
      const batch = list.slice(1, PAGE);
      batch.forEach((p,i)=> html += rowCard(p, i));
      rendered = 1 + batch.length;
      feed.innerHTML = html;
      attachSentinel(feed, list);
    }

    function attachSentinel(feed, list){
      if (io){ io.disconnect(); io = null; }
      const old = feed.querySelector('.sentinel, .end'); if (old) old.remove();
      if (rendered >= list.length){
        feed.insertAdjacentHTML('beforeend', `<div class="end">· · ·</div>`);
        return;
      }
      const s = document.createElement('div');
      s.className = 'sentinel'; s.innerHTML = '<div class="dots"><i></i><i></i><i></i></div>';
      feed.appendChild(s);
      io = new IntersectionObserver(e => { if (e[0].isIntersecting) more(feed, list, s); }, { rootMargin: '0px 0px 420px 0px' });
      io.observe(s);
    }
    function more(feed, list, s){
      if (io){ io.disconnect(); io = null; }
      s.remove();
      const batch = list.slice(rendered, rendered + PAGE);
      batch.forEach((p,i)=> feed.insertAdjacentHTML('beforeend', rowCard(p, i)));
      rendered += batch.length;
      attachSentinel(feed, list);
    }

    function feedSkeleton(){
      const feed = document.getElementById('view-feed');
      let h = '<div class="sk sk-lead"></div>';
      for (let i=0;i<5;i++) h += '<div class="sk sk-row"></div>';
      feed.innerHTML = h;
    }

    /* ── COHESIVE FEED — Top Stories briefing + niche previews ───────────────
       Single calm column, no boxes. A cross-niche "Top Stories" briefing
       (hero + two-up runners-up + a clean list) leads; below it, a preview of
       each well-stocked niche with a "More" link to that niche's own page; the
       feed ends with a bounded "you're all caught up" beat + an opt-in tail. */
    let SECTIONS  = [];          // category rails from the payload (size-ordered)
    let NICHE_MAP = {};          // niche title -> full item list (for niche pages)
    let RENDERED  = new Set();   // ids on screen (so the "Keep reading" tail never repeats)

    const TOP_SPREAD = 6;        // hero + 6 = 7 in the Top Stories block
    const C_PREVIEW  = 4;        // preview rows per niche before "More"
    const MIN_NICHE  = 8;        // a niche needs >= this many items to appear as a feed preview
    const MAX_NICHES = 8;        // how many niche previews the feed shows (busiest first)

    const normTitle = t => (t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(Boolean).slice(0,7).join(' ');
    function emit(p, i){ RENDERED.add(rowId(p)); return rowCard(p, i); }   // render + track

    // Top Stories = hero (#1 overall) + a deduped cross-niche spread: the biggest
    // story from each distinct niche, same event never twice (prototype dedup by
    // normalised title; true cross-source clustering is parked engine work).
    function buildTopStories(flat){
      const block = [], usedId = new Set(), usedCat = new Set(), usedEvent = new Set();
      if (!flat.length) return block;
      const hero = flat[0];
      block.push(hero); usedId.add(rowId(hero)); usedEvent.add(normTitle(hero.title));
      if (hero.primary_category) usedCat.add(hero.primary_category);
      // one biggest story per fresh, tagged niche (the "different corners" spread)
      for (const p of flat){
        if (block.length > TOP_SPREAD) break;
        const cat = p.primary_category;
        if (!cat || cat === 'Other') continue;
        const id = rowId(p), ev = normTitle(p.title);
        if (usedId.has(id) || usedCat.has(cat) || usedEvent.has(ev)) continue;
        block.push(p); usedId.add(id); usedCat.add(cat); usedEvent.add(ev);
      }
      // top up purely by rank if the niches ran short (untagged-heavy feed)
      for (const p of flat){
        if (block.length > TOP_SPREAD) break;
        const id = rowId(p), ev = normTitle(p.title);
        if (usedId.has(id) || usedEvent.has(ev)) continue;
        block.push(p); usedId.add(id); usedEvent.add(ev);
      }
      return block;
    }

    // Category groups for the region below Top Stories (size order from the
    // payload, minus anything already in Top Stories or dismissed).
    function catGroups(topIds){
      return SECTIONS.map(s => ({
        title: s.title,
        items: (s.items || []).filter(p => !topIds.has(rowId(p)) && !isHidden(p)),
      })).filter(g => g.items.length);
    }

    // Niche previews — top few per niche + a "More" link to its page. Driven by the
    // user's chosen niches (Niches tab); falls back to the busiest niches if none picked.
    function belowPreviews(groups){
      const picked = store.get(LS.niches, []);
      const chosen = picked.length
        ? picked.map(t => groups.find(g => g.title === t)).filter(Boolean)        // your niches, in your order
        : groups.filter(g => g.items.length >= MIN_NICHE).slice(0, MAX_NICHES);    // default: busiest
      let html = '';
      chosen.forEach(g => {
        html += `<div class="eyebrow topic"><b>${esc(g.title)}</b><span class="rule"></span></div>`;
        let i = 0;
        g.items.slice(0, C_PREVIEW).forEach(p => { html += emit(p, i++); });
        if (g.items.length > C_PREVIEW){
          html += `<button class="read-more" data-niche="${esc(g.title)}">More in ${esc(g.title)} <span class="rm-arrow">→</span></button>`;
        }
      });
      return html;
    }

    function caughtUpHTML(){
      return `
<div class="caughtup">
  <div class="cu-rule"></div>
  <div class="cu-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
  <div class="cu-title">You're all caught up</div>
  <div class="cu-sub">That's the news worth your time.</div>
</div>
<button class="keep-reading" id="keep-reading">Keep reading — more to explore</button>`;
    }

    // Top Stories secondary card (Apple-News "front page" feel): bigger image +
    // headline, borderless with a hairline divider, no cluster/action chrome —
    // distinct from the denser bordered rows below. Used only in the Top Stories zone.
    function topCard(p, i){
      const time = ago(p), src = cleanSrc(p.source);
      const gc = gemClass(p.score);
      const gem = gc ? `<span class="gem ${gc}" title="${gemTitle(p.score)}"></span>` : '';
      const drop = "const t=this.closest('.ts-thumb'); t&&t.remove(); this.closest('.ts-card')?.classList.add('no-img')";
      const thumb = p.image
        ? `<div class="ts-thumb"><img src="${esc(p.image)}" alt="" loading="${i<3?'eager':'lazy'}" onload="if(this.naturalWidth<150||this.naturalHeight<150){${drop}}" onerror="${drop}"></div>`
        : '';
      return `
<a class="ts-card${p.image?'':' no-img'} enter" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer" style="animation-delay:${Math.min(i,6)*45}ms">
  <div class="ts-main">
    <div class="row-meta">${gem}<span class="srcline">${favicon(p.link)}<span class="src">${esc(src)}</span></span>${time?`<span class="dot-sep"></span><span class="time">${time}</span>`:''}</div>
    <h3 class="ts-h">${esc(p.title)}</h3>
  </div>
  ${thumb}
</a>`;
    }

    // Runners-up (#2 & #3) — a two-up of borderless image-top feature cards: the
    // "1-2-3" tier. Rendered in Blank's own style (no borders/box, rounded photo
    // on top, our meta), so it evokes a front-page pair without copying Apple.
    function pairCard(p, i){
      const time = ago(p), src = cleanSrc(p.source);
      const gc = gemClass(p.score);
      const gem = gc ? `<span class="gem ${gc}" title="${gemTitle(p.score)}"></span>` : '';
      const drop = "this.closest('.pair-img')?.classList.add('ph'); this.remove()";
      const img = p.image
        ? `<div class="pair-img"><img src="${esc(p.image)}" alt="" loading="eager" onload="if(this.naturalWidth<150||this.naturalHeight<150){${drop}}" onerror="${drop}"></div>`
        : `<div class="pair-img ph"></div>`;
      return `
<a class="pair-card enter" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer" style="animation-delay:${i*60}ms">
  ${img}
  <div class="row-meta">${gem}<span class="srcline">${favicon(p.link)}<span class="src">${esc(src)}</span></span>${time?`<span class="dot-sep"></span><span class="time">${time}</span>`:''}</div>
  <h3 class="pair-h">${esc(p.title)}</h3>
</a>`;
    }

    function renderCohesive(){
      const feed = document.getElementById('view-feed');
      RENDERED = new Set();
      const flat = visiblePicks();
      if (!flat.length){
        feed.innerHTML = `<div class="blank-state"><div class="em">You're all caught up</div><p class="p">Nothing to surface right now. Pull down to refresh.</p></div>`;
        return;
      }
      const top = buildTopStories(flat);
      const topIds = new Set(top.map(rowId));
      top.forEach(p => RENDERED.add(rowId(p)));
      const groups = catGroups(topIds);
      NICHE_MAP = {}; groups.forEach(g => NICHE_MAP[g.title] = g.items);

      // Top Stories gets a distinct zone: a prominent editorial header + a subtle
      // full-bleed tint band behind it (no box), so it reads apart from the rest.
      let html = `<section class="topstories-zone">`;
      html += `<div class="ts-head"><span class="ts-kicker">Your briefing</span><h2 class="ts-title">Top Stories</h2></div>`;
      html += leadCard(top[0]);                                            // #1 — hero
      const others = top.slice(1);
      const pair = others.slice(0, 2), rest = others.slice(2);
      if (pair.length) html += `<div class="ts-pair">${pair.map((p,i) => pairCard(p,i)).join('')}</div>`;  // #2 & #3
      rest.forEach((p,i) => html += topCard(p, i));                        // #4+ — the clean list
      html += `</section>`;

      html += belowPreviews(groups);                                       // niche previews + "More"
      html += caughtUpHTML();
      feed.innerHTML = html;
    }

    // "More in {niche}" opens a fresh full-screen niche page (cleaner than
    // expanding inline). A back button returns to the feed at its prior scroll.
    let nicheReturn = 0;
    function openNiche(title){
      const items = (NICHE_MAP[title] || []).filter(p => !isHidden(p));
      if (!items.length) return;
      const v = document.getElementById('view-niche');
      // Mirror the home Top Stories zone exactly, scoped to this niche: a back
      // button, then [zone: title + hero + pair + 4 topCards], then the rowCard feed.
      let html = `<div class="niche-page-head"><button class="np-back" id="np-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back</button></div>`;
      html += `<section class="topstories-zone">`;
      html += `<div class="ts-head"><h2 class="ts-title">${esc(title)}</h2></div>`;
      html += leadCard(items[0]);                                          // #1 — hero
      const pair = items.slice(1, 3);                                      // #2 & #3
      if (pair.length) html += `<div class="ts-pair">${pair.map((p,i) => pairCard(p,i)).join('')}</div>`;
      const tsStart = 1 + pair.length;
      const tsList = items.slice(tsStart, tsStart + 4);                    // #4–7 — clean topCards
      tsList.forEach((p,i) => html += topCard(p,i));
      html += `</section>`;
      const afterStart = tsStart + tsList.length;
      const batch = items.slice(afterStart, afterStart + PAGE);            // the rest — rowCard feed
      batch.forEach((p,i) => html += rowCard(p,i));
      v.innerHTML = html;
      nicheReturn = window.scrollY;
      document.querySelectorAll('.view').forEach(x => x.classList.toggle('active', x.id === 'view-niche'));
      window.scrollTo({ top: 0 });
      rendered = afterStart + batch.length;
      attachSentinel(v, items);   // infinite scroll the rest of the niche
    }
    function closeNiche(){
      if (io){ io.disconnect(); io = null; }
      document.querySelectorAll('.view').forEach(x => x.classList.toggle('active', x.id === 'view-feed'));
      window.scrollTo({ top: nicheReturn || 0 });
    }

    function revealTail(btn){
      const feed = document.getElementById('view-feed');
      const tail = visiblePicks().filter(p => !RENDERED.has(rowId(p)));
      document.querySelector('.caughtup')?.remove();
      btn.remove();
      if (!tail.length) return;
      feed.insertAdjacentHTML('beforeend', `<div class="eyebrow"><b>More to explore</b><span class="rule"></span></div>`);
      const batch = tail.slice(0, PAGE);
      let i = 0; batch.forEach(p => feed.insertAdjacentHTML('beforeend', emit(p, i++)));
      rendered = batch.length;
      attachSentinel(feed, tail);
    }

    /* ── Other tabs ────────────────────────────────────────── */
    // The engine's category taxonomy (primary_category) — these strings must match
    // the section/group titles exactly so a pick filters the feed.
    const NICHES = ['Sports','Entertainment','Technology & AI','Business & Economy','Gaming','Money & Personal Finance','Science','Health & Medicine','Climate & Environment','World / International','Politics & Policy','Lifestyle','Arts, Books & Ideas','Internet Culture','Crime & Justice'];

    function renderNiches(){
      const v = document.getElementById('view-niches');
      const on = store.get(LS.niches, []);
      v.innerHTML = `
<div class="eyebrow"><b>Your Niches</b><span class="rule"></span></div>
<p class="lede">Pick the subjects you care about — the feed's niche sections follow your picks. (Until you choose, it shows the busiest topics.)</p>
<div class="niche-grid">${NICHES.map(n=>`<button class="niche ${on.includes(n)?'on':''}" data-niche="${esc(n)}">${esc(n)}</button>`).join('')}</div>`;
    }

    // Catch-up brief = the most important stories overall (highest decayed rank),
    // windowed to "since you last opened", with a soft per-topic cap so one hot
    // subject can't dominate. Built from the ranked feed (already cluster-deduped).
    const CU_MAX     = 10;   // stories in the brief
    const CU_PER_CAT = 2;    // soft cap per niche so no single topic dominates
    function buildBrief(lastOpen){
      const fresh = visiblePicks().filter(p => !lastOpen || !p.published_at || new Date(p.published_at) > lastOpen);
      const seen = {}, out = [];
      for (const p of fresh){                         // ranked order
        if (out.length >= CU_MAX) break;
        const cat = p.primary_category || '_';
        if ((seen[cat] || 0) >= CU_PER_CAT) continue; // soft per-topic cap
        seen[cat] = (seen[cat] || 0) + 1;
        out.push(p);
      }
      return out;
    }

    function renderCatchup(){
      const v = document.getElementById('view-catchup');
      const today = new Date().toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
      const lastOpen = store.get(LS.lastOpen, 0);
      const brief = buildBrief(lastOpen);

      const head = `<div class="eyebrow"><b>Catch-up · ${esc(today)}</b><span class="rule"></span></div>`;
      const check = `<div class="cu-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>`;

      if (!brief.length){
        v.innerHTML = head + `
<div class="caughtup catchup-hero">
  ${check}
  <div class="cu-title">You're all caught up</div>
  <div class="cu-sub">${lastOpen ? 'Nothing new since you last checked in. Enjoy the quiet.' : 'Your brief will appear here as stories come in.'}</div>
</div>`;
      } else {
        v.innerHTML = head + `
<p class="lede">If you only have a minute — the ${brief.length} ${brief.length === 1 ? 'story' : 'stories'} that matter most since you last checked in.</p>
${brief.map((p,i) => rowCard(p,i)).join('')}
<div class="caughtup">
  <div class="cu-rule"></div>
  ${check}
  <div class="cu-title">You're all caught up</div>
  <div class="cu-sub">That's the important stuff — see you next time.</div>
</div>`;
      }
      store.set(LS.lastOpen, Date.now());   // mark this brief as seen (advance the window)
    }

    function renderSearch(focus){
      const v = document.getElementById('view-search');
      if (!v.dataset.built){
        v.innerHTML = `
<div class="search-wrap"><div class="search-field">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
  <input id="search-input" placeholder="Search headlines, sources…" autocomplete="off">
</div></div>
<div id="search-results"></div>`;
        v.dataset.built = '1';
        const input = v.querySelector('#search-input');
        input.addEventListener('input', () => runSearch(input.value));
        runSearch('');
      }
      if (focus) setTimeout(()=> v.querySelector('#search-input')?.focus(), 80);
    }
    function runSearch(q){
      const out = document.getElementById('search-results');
      q = q.trim().toLowerCase();
      if (!q){ out.innerHTML = `<div class="blank-state"><div class="em">Search the feed</div><p class="p">Find any story by headline or source.</p></div>`; return; }
      const res = visiblePicks().filter(p => (p.title||'').toLowerCase().includes(q) || (p.source||'').toLowerCase().includes(q)).slice(0, 40);
      out.innerHTML = res.length ? res.map((p,i)=>rowCard(p,i)).join('') : `<div class="blank-state"><div class="em">No matches</div><p class="p">Nothing for “${esc(q)}”.</p></div>`;
    }

    function renderProfile(){
      const v = document.getElementById('view-profile');
      const saved = store.get(LS.saved, []);
      const theme = store.get(LS.theme, 'auto');
      const notifSupported = ('Notification' in window) && ('serviceWorker' in navigator);
      v.innerHTML = `
<div class="eyebrow"><b>Profile</b><span class="rule"></span></div>

<div class="p-group">
  <div class="p-label">Appearance</div>
  <div class="p-card"><div class="p-item">
    <span class="grow">Theme</span>
    <div class="seg" id="theme-seg">
      ${['System','Light','Dark'].map(t=>`<button data-theme-val="${t.toLowerCase()==='system'?'auto':t.toLowerCase()}" class="${(t.toLowerCase()==='system'?'auto':t.toLowerCase())===theme?'on':''}">${t}</button>`).join('')}
    </div>
  </div></div>
</div>

<div class="p-group">
  <div class="p-label">Saved${saved.length?` · ${saved.length}`:''}</div>
  <div class="p-card" id="saved-card">
    ${saved.length ? saved.slice(0,12).map(s=>`
      <a class="p-item" href="${esc(s.link||'#')}" target="_blank" rel="noopener noreferrer">
        <span class="grow" style="font-weight:600">${esc(s.title)}</span>
        <span style="color:var(--ink-3);font-size:11px">${esc(s.source||'')}</span>
      </a>`).join('') : `<div class="p-item" style="color:var(--ink-3);font-weight:500">Nothing saved yet — tap Save on any story.</div>`}
  </div>
</div>

<div class="p-group">
  <div class="p-label">Notifications</div>
  <div class="p-card"><div class="p-item">
    <span class="grow">Push for top stories</span>
    ${notifSupported ? `<button class="ghost-btn" id="notif-btn">Enable</button>` : `<span style="color:var(--ink-3);font-size:12px">Unsupported</span>`}
  </div></div>
</div>

<div class="p-group">
  <div class="p-label">About</div>
  <div class="p-card"><div class="p-item" style="color:var(--ink-2);font-weight:500;line-height:1.5;font-size:13px">
    Blank is a reading app where the AI is your editor — it ranks, clusters, and surfaces what's worth your time, using real headlines.
  </div></div>
</div>`;
    }

    /* ── Theme ─────────────────────────────────────────────── */
    function applyTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      store.set(LS.theme, t);
    }

    /* ── Tab switching ─────────────────────────────────────── */
    const renderers = { feed: ()=>{}, niches: renderNiches, catchup: renderCatchup, search: ()=>renderSearch(true), profile: renderProfile };
    function go(tab){
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.tab === tab));
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.go === tab));
      (renderers[tab] || (()=>{}))();
      window.scrollTo({ top: 0 });
    }

    /* ── Global click delegation ───────────────────────────── */
    document.addEventListener('click', e => {
      // close any open card ⋯ menu on an outside click (then keep processing)
      if (!e.target.closest('.card-menu') && !e.target.closest('.card-more')) closeMenus();
      // tab bar
      const tab = e.target.closest('.tab'); if (tab){ go(tab.dataset.go); return; }
      // top search
      if (e.target.closest('#btn-search-top')){ go('search'); return; }
      // niche toggle
      const niche = e.target.closest('.niche');
      if (niche){
        const on = store.get(LS.niches, []);
        const n = niche.dataset.niche; const i = on.indexOf(n);
        if (i>=0) on.splice(i,1); else on.push(n);
        store.set(LS.niches, on); niche.classList.toggle('on');
        if (SECTIONS.length) renderCohesive();   // re-tune the feed to the new picks
        return;
      }
      // theme segment
      const seg = e.target.closest('[data-theme-val]');
      if (seg){ applyTheme(seg.dataset.themeVal); document.querySelectorAll('#theme-seg button').forEach(b=>b.classList.toggle('on', b===seg)); return; }
      // notifications
      if (e.target.closest('#notif-btn')){ enableNotifications(e.target.closest('#notif-btn')); return; }
      // cluster expand
      const cl = e.target.closest('.cluster-line');
      if (cl){ e.preventDefault(); const c = cl.closest('.cluster'); const open = c.classList.toggle('open'); cl.setAttribute('aria-expanded', open); return; }
      // "More in {niche}" → fresh niche page
      const rm = e.target.closest('.read-more');
      if (rm){ e.preventDefault(); openNiche(rm.dataset.niche); return; }
      // niche page → back to feed
      if (e.target.closest('#np-back')){ closeNiche(); return; }
      // experiment: "Keep reading" reveals the opt-in endless tail
      if (e.target.closest('#keep-reading')){ revealTail(e.target.closest('#keep-reading')); return; }
      // card ⋯ menu — open/close
      const more = e.target.closest('.card-more');
      if (more){ e.preventDefault(); toggleMenu(more); return; }
      // card menu item — perform the action
      const mItem = e.target.closest('.card-menu [data-act]');
      if (mItem){ e.preventDefault(); cardAction(mItem); return; }
    });

    function findPick(id){ return allPicks.find(p => rowId(p) === id); }

    function closeMenus(){ document.querySelectorAll('.card-menu.open').forEach(m => m.classList.remove('open')); }
    function toggleMenu(btn){
      const menu = btn.parentElement.querySelector('.card-menu');
      const willOpen = menu && !menu.classList.contains('open');
      closeMenus();
      if (willOpen){
        const p = findPick(btn.closest('.row').dataset.id);
        const sv = menu.querySelector('.cm-save'); if (sv && p) sv.textContent = isSaved(p) ? 'Saved' : 'Save';
        menu.classList.add('open');
      }
    }

    function cardAction(btn){
      const article = btn.closest('.row'); if (!article) return;
      const p = findPick(article.dataset.id); if (!p) return;
      closeMenus();
      const kind = btn.dataset.act;
      if (kind === 'save'){
        const nowSaved = toggleSave(p); haptic(); toast(nowSaved ? 'Saved' : 'Removed from saved');
      } else if (kind === 'share'){
        const data = { title: p.title, text: cleanSrc(p.source), url: p.link };
        if (navigator.share){ navigator.share(data).catch(()=>{}); }
        else if (navigator.clipboard){ navigator.clipboard.writeText(p.link||'').then(()=>toast('Link copied')); }
      } else if (kind === 'dismiss'){
        dismiss(p); haptic(); animateDismiss(article, p);
      }
    }

    function animateDismiss(article, p){
      article.classList.add('dismissing');
      setTimeout(()=>{
        const undo = document.createElement('div');
        undo.className = 'undo';
        undo.innerHTML = `<span>Less like this. Thanks — that sharpens the editor.</span><button>Undo</button>`;
        article.replaceWith(undo);
        let done = false;
        const restore = () => { if (done) return; done = true; undismiss(p); const fresh = document.createElement('div'); fresh.innerHTML = rowCard(p, 0); undo.replaceWith(fresh.firstElementChild); };
        undo.querySelector('button').addEventListener('click', restore);
        setTimeout(()=>{ if (!done){ done = true; undo.remove(); } }, 6000);
      }, 420);
    }

    function haptic(){ try { navigator.vibrate && navigator.vibrate(8); } catch {} }
    function toast(msg){
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = 'position:fixed;left:50%;bottom:calc(var(--bar-h) + 14px);transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;font:600 12.5px var(--text);z-index:90;box-shadow:var(--shadow-lead);animation:viewin .25s var(--ease)';
      document.body.appendChild(el); setTimeout(()=>el.remove(), 1800);
    }

    async function enableNotifications(btn){
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted'){ btn.textContent = 'Blocked'; return; }
        btn.textContent = 'Enabled'; btn.style.opacity = '.6';
      } catch { btn.textContent = 'Error'; }
    }

    /* ── Top-bar scrolled border + pull-to-refresh ─────────── */
    const topbar = document.getElementById('topbar');
    let lastY = 0;
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      topbar.classList.toggle('scrolled', y > 4);
      if (y <= 4)               topbar.classList.remove('hide');   // always show at the top
      else if (y > lastY + 4)   topbar.classList.add('hide');      // scrolling down → hide
      else if (y < lastY - 4)   topbar.classList.remove('hide');   // scrolling up → reveal
      lastY = y;
    }, { passive: true });

    (function pullToRefresh(){
      const ptr   = document.getElementById('ptr');
      const views = document.querySelector('.views');
      const icon  = ptr.querySelector('svg');
      let startY = 0, pulling = false, dist = 0;
      const MAX = 96, TRIGGER = 62, REST = 52;

      function move(d){
        views.style.transform = d ? `translateY(${d}px)` : '';
        ptr.style.opacity = Math.min(1, d / TRIGGER);
        if (!ptr.classList.contains('spin')) icon.style.transform = `rotate(${d * 3.4}deg)`;
      }
      window.addEventListener('touchstart', e => {
        if (window.scrollY <= 0 && !ptr.classList.contains('spin')){
          startY = e.touches[0].clientY; pulling = true; views.classList.remove('snap');
        }
      }, { passive: true });
      window.addEventListener('touchmove', e => {
        if (!pulling) return;
        const raw = e.touches[0].clientY - startY;
        if (raw <= 0){ dist = 0; move(0); return; }
        dist = Math.min(MAX, raw * 0.5);   // resistance
        move(dist);
      }, { passive: true });
      window.addEventListener('touchend', () => {
        if (!pulling) return; pulling = false;
        views.classList.add('snap');
        if (dist >= TRIGGER){
          views.style.transform = `translateY(${REST}px)`;   // hold while refreshing
          ptr.style.opacity = '1'; icon.style.transform = '';
          ptr.classList.add('spin');
          reload();
        } else {
          views.style.transform = ''; ptr.style.opacity = '0';
        }
        dist = 0;
      });
      window._ptrDone = () => {
        ptr.classList.remove('spin');
        views.classList.add('snap');
        views.style.transform = ''; ptr.style.opacity = '0';
      };
    })();

    /* ── Data ──────────────────────────────────────────────── */
    async function load(){
      try {
        const res = await fetch('./picks_data.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        const runs = data.runs || [];
        const sections = data.sections || [];
        const seen = new Set(); allPicks = [];
        for (const run of runs){
          for (const p of (run.picks || [])){
            const id = p.link || p.title;
            if (seen.has(id)) continue; seen.add(id);
            allPicks.push({ ...p, runDate: run.date, runTime: run.time });
          }
        }
        // Order is computed server-side (time-decayed rank in deploy-pages.yml /
        // db.DECAY_HOURS_PER_POINT); render picks_data.json in the order received.
        SECTIONS = sections.filter(s => s.kind === 'category');
        // ensure every section item is also in allPicks so card actions resolve
        for (const rail of sections){
          for (const p of (rail.items || [])){
            const id = p.link || p.title;
            if (seen.has(id)) continue; seen.add(id);
            allPicks.push({ ...p });
          }
        }
        // When the sectioned payload is present, render the cohesive feed; else flat.
        if (sections.length) renderCohesive();
        else                 await renderFeed();
      } catch (err){
        document.getElementById('view-feed').innerHTML = `<div class="blank-state"><div class="em">Feed unavailable</div><p class="p">Couldn't load the latest. Pull down to try again.</p></div>`;
        console.error('Blank: load failed', err);
      }
    }
    async function reload(){ await load(); window._ptrDone && window._ptrDone(); }

    /* ── Boot ──────────────────────────────────────────────── */
    applyTheme(store.get(LS.theme, 'auto'));
    feedSkeleton();
    load();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  </script>
</body>
</html>
