<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@boymeetsblank_ — Daily Picks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 24px;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #fff;
    }

    .tagline {
      font-size: 13px;
      color: #444;
      font-weight: 400;
    }

    .next-run {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #333;
      flex-shrink: 0;
    }

    .next-run-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2a2a2a;
      flex-shrink: 0;
      transition: background 0.4s;
    }

    .next-run-dot.pulse {
      background: #10b981;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .next-run-label { color: #333; }

    .next-run-time {
      font-weight: 600;
      color: #555;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    @media (max-width: 520px) {
      .next-run-label { display: none; }
    }

    /* ── Page layout (sidebar + feed) ── */
    .page-layout {
      display: flex;
      gap: 32px;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 100px;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    aside.sidebar {
      width: 152px;
      flex-shrink: 0;
      position: sticky;
      top: 68px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333;
      padding: 2px 10px 6px;
      display: block;
    }

    .sidebar-label:not(:first-child) {
      margin-top: 6px;
    }

    .sidebar-divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 10px 0;
    }

    .nav-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      font-family: inherit;
      line-height: 1.4;
    }

    .nav-btn:hover { background: #161616; color: #bbb; }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-btn:disabled:hover { background: transparent; color: #555; }

    .nav-btn.active {
      background: #1c1c1c;
      color: #e8e8e8;
    }

    .show-all-btn {
      color: #7c5af2;
      margin-top: 2px;
    }

    .show-all-btn:hover { background: rgba(124, 90, 242, 0.1); color: #9d7ff5; }

    /* ── Main feed ── */
    main {
      flex: 1;
      min-width: 0;
    }

    /* ── Section headers ── */
    .section-header {
      margin-bottom: 24px;
    }

    .section-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 4px;
    }

    .section-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.6px;
    }

    /* ── Run group ── */
    .run-group {
      margin-bottom: 8px;
    }

    .run-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 28px 0 14px;
    }

    .run-time-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    .run-meta {
      font-size: 11px;
      color: #2e2e2e;
      background: #161616;
      padding: 2px 9px;
      border-radius: 100px;
    }

    /* ── Full pick card ── */
    .pick-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    .pick-card:hover { border-color: #2c2c2c; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 11px;
      flex-wrap: wrap;
    }

    .score-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    .score-badge.green { background: rgba(16, 185, 129, 0.14); color: #10b981; }
    .score-badge.amber { background: rgba(245, 158, 11, 0.14);  color: #f59e0b; }

    .card-source {
      font-size: 12px;
      color: #555;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }

    .card-title {
      font-size: 19px;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.35;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }

    .card-why {
      font-size: 14px;
      color: #777;
      line-height: 1.65;
      margin-bottom: 14px;
    }

    /* ── Angle box ── */
    .angle-box {
      background: #0d0d0d;
      border-left: 2px solid #252525;
      border-radius: 0 8px 8px 0;
      padding: 12px 15px;
      margin-bottom: 16px;
    }

    .angle-trigger {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7c5af2;
      margin-bottom: 7px;
    }

    .angle-lines {
      font-size: 15px;
      font-weight: 600;
      color: #ccc;
      line-height: 1.55;
    }

    .angle-line { display: block; }

    .angle-plain {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    /* ── Trend label ── */
    .trend-label {
      display: inline-block;
      font-size: 12px;
      color: #555;
      font-style: italic;
    }

    /* ── Article link ── */
    .article-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #60a5fa;
      text-decoration: none;
      padding: 6px 12px;
      background: rgba(96, 165, 250, 0.07);
      border-radius: 7px;
      transition: background 0.15s;
    }

    .article-link:hover { background: rgba(96, 165, 250, 0.14); }

    /* ── Archive ── */
    .archive-divider {
      border: none;
      border-top: 1px solid #161616;
      margin: 48px 0 32px;
    }

    .archive-day-group { margin-bottom: 28px; }

    .archive-day-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .archive-day-date { font-size: 14px; font-weight: 700; color: #555; }
    .archive-day-count { font-size: 11px; color: #333; }

    .archive-pick-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #141414;
      text-decoration: none;
      color: inherit;
    }

    .archive-pick-row:last-child { border-bottom: none; }
    a.archive-pick-row:hover .archive-title { color: #ccc; }

    .archive-score {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
      flex-shrink: 0;
      line-height: 1.5;
    }

    .archive-score.green { background: rgba(16, 185, 129, 0.12); color: #10b981; }
    .archive-score.amber { background: rgba(245, 158, 11, 0.12);  color: #f59e0b; }

    .archive-title {
      font-size: 13px;
      font-weight: 500;
      color: #777;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }

    .archive-source {
      font-size: 11px;
      color: #333;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    /* ── Filter hidden state ── */
    .filter-hidden { display: none !important; }

    /* ── States ── */
    .state-msg {
      text-align: center;
      color: #444;
      padding: 80px 0;
      font-size: 14px;
      line-height: 1.8;
    }

    /* ── Mobile: sidebar becomes sticky horizontal bar ── */
    @media (max-width: 820px) {
      .page-layout {
        display: block;
        padding: 0 0 80px;
      }

      aside.sidebar {
        width: 100%;
        position: sticky;
        top: 53px;
        z-index: 90;
        background: rgba(10, 10, 10, 0.96);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 3px;
        padding: 8px 16px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      aside.sidebar::-webkit-scrollbar { display: none; }

      /* Flatten section wrappers into the flex row */
      .sidebar-section { display: contents; }

      .sidebar-label { display: none; }

      .sidebar-divider {
        width: 1px;
        height: 18px;
        background: #222;
        border: none;
        margin: 0 4px;
        flex-shrink: 0;
      }

      .nav-btn {
        white-space: nowrap;
        flex-shrink: 0;
        width: auto;
        padding: 5px 10px;
        font-size: 12px;
      }

      main { padding: 20px 16px 80px; }
    }

    @media (max-width: 520px) {
      .card-title { font-size: 17px; }
      .section-title { font-size: 22px; }
      .archive-source { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">@boymeetsblank_</div>
    <div class="tagline">Daily culture picks</div>
    <div class="next-run" id="next-run-widget">
      <span class="next-run-dot" id="next-run-dot"></span>
      <span class="next-run-label">Next run</span>
      <span class="next-run-time" id="next-run-time">–</span>
    </div>
  </div>
</header>

<div class="page-layout">

  <aside class="sidebar">
    <div class="sidebar-section">
      <span class="sidebar-label">Navigate</span>
      <button class="nav-btn" id="btn-today">↑ Today</button>
      <button class="nav-btn" id="btn-yesterday" disabled>Yesterday</button>
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-section">
      <span class="sidebar-label">Time of Day</span>
      <button class="nav-btn filter-btn" data-filter="label" data-value="Morning"   id="btn-morning">Morning</button>
      <button class="nav-btn filter-btn" data-filter="label" data-value="Afternoon" id="btn-afternoon">Afternoon</button>
      <button class="nav-btn filter-btn" data-filter="label" data-value="Evening"   id="btn-evening">Evening</button>
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-section">
      <span class="sidebar-label">Score</span>
      <button class="nav-btn filter-btn" data-filter="score" data-value="9" id="btn-9plus">9+ only</button>
      <button class="nav-btn filter-btn" data-filter="score" data-value="7" id="btn-7plus">7+ only</button>
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-section">
      <button class="nav-btn show-all-btn" id="btn-show-all">Show All</button>
    </div>
  </aside>

  <main>
    <div id="feed-container">
      <div class="state-msg">Loading picks…</div>
    </div>
  </main>

</div>

<script>
  // ── Filter state ──────────────────────────────────────────
  let filterLabel = null;  // null | 'Morning' | 'Afternoon' | 'Evening'
  let filterScore = null;  // null | 7 | 9
  let secondDate  = null;  // date string for the "Yesterday" jump target

  // ── Helpers ───────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function scoreClass(score) { return score >= 9 ? 'green' : 'amber'; }

  // ── Angle formatting ──────────────────────────────────────
  function formatAngle(angle) {
    if (!angle) return '';
    const m = angle.match(/^\[TRIGGER:\s*([^\]]+)\]\s*([\s\S]*)/);
    if (m) {
      const trigger = m[1].trim();
      const lines = m[2].split('/').map(l => l.trim()).filter(Boolean);
      return `<div class="angle-box">
        <div class="angle-trigger">${esc(trigger)}</div>
        <div class="angle-lines">${lines.map(l => `<span class="angle-line">${esc(l)}</span>`).join('')}</div>
      </div>`;
    }
    return `<div class="angle-box"><div class="angle-plain">${esc(angle)}</div></div>`;
  }

  // ── Card rendering ────────────────────────────────────────
  function renderPickCard(pick) {
    const cls = scoreClass(pick.score);
    const linkHtml = pick.link
      ? `<a class="article-link" href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer">Read the full article →</a>`
      : pick.trend_label
        ? `<span class="trend-label">${esc(pick.trend_label)}</span>`
        : '';

    return `<div class="pick-card" data-score="${pick.score}">
      <div class="card-meta">
        <span class="score-badge ${cls}">${pick.score}/10</span>
        <span class="card-source">${esc(pick.source)}</span>
      </div>
      <div class="card-title">${esc(pick.title)}</div>
      ${pick.why ? `<div class="card-why">${esc(pick.why)}</div>` : ''}
      ${formatAngle(pick.angle)}
      ${linkHtml}
    </div>`;
  }

  function renderRunGroup(run) {
    const pickCount = run.picks.length;
    const countLabel = `${pickCount} pick${pickCount !== 1 ? 's' : ''} · ${run.display_time}`;
    let html = `<div class="run-group" data-label="${esc(run.label)}" data-date="${esc(run.date)}">
      <div class="run-header">
        <span class="run-time-label">${esc(run.label)}</span>
        <span class="run-meta">${esc(countLabel)}</span>
      </div>`;
    for (const pick of run.picks) html += renderPickCard(pick);
    html += `</div>`;
    return html;
  }

  function renderArchiveDayGroup(date, displayDate, runs) {
    const allPicks = runs.flatMap(r => r.picks.map(p => ({ ...p, runLabel: r.label })));
    let rows = '';
    for (const pick of allPicks) {
      const cls = scoreClass(pick.score);
      const tag  = pick.link ? 'a' : 'div';
      const href = pick.link ? ` href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer"` : '';
      rows += `<${tag} class="archive-pick-row" data-score="${pick.score}" data-label="${esc(pick.runLabel)}"${href}>
        <span class="archive-score ${cls}">${pick.score}</span>
        <span class="archive-title">${esc(pick.title)}</span>
        <span class="archive-source">${esc(pick.source)}</span>
      </${tag}>`;
    }
    const total = allPicks.length;
    return `<div class="archive-day-group" id="section-${esc(date)}" data-date="${esc(date)}">
      <div class="archive-day-header">
        <span class="archive-day-date">${esc(displayDate)}</span>
        <span class="archive-day-count">${total} pick${total !== 1 ? 's' : ''}</span>
      </div>
      ${rows}
    </div>`;
  }

  // ── Main render ───────────────────────────────────────────
  function render(runs) {
    if (!runs || runs.length === 0) {
      document.getElementById('feed-container').innerHTML = '<div class="state-msg">No picks yet.</div>';
      return;
    }

    const latestDate = runs[0].date;
    const latestRuns = runs.filter(r => r.date === latestDate);
    const olderRuns  = runs.filter(r => r.date !== latestDate);

    // Identify the second most-recent date for the "Yesterday" jump button
    if (olderRuns.length > 0) {
      secondDate = olderRuns[0].date;
      const btn = document.getElementById('btn-yesterday');
      btn.disabled = false;
    }

    let html = '';

    // ── Latest section ──
    html += `<div id="section-latest">
      <div class="section-header">
        <div class="section-eyebrow">Latest</div>
        <div class="section-title">${esc(latestRuns[0].display_date)}</div>
      </div>`;
    for (const run of latestRuns) html += renderRunGroup(run);
    html += `</div>`;

    // ── Archive section ──
    if (olderRuns.length > 0) {
      const byDate = {};
      for (const run of olderRuns) {
        if (!byDate[run.date]) byDate[run.date] = [];
        byDate[run.date].push(run);
      }
      const sortedDates = Object.keys(byDate).sort().reverse();

      html += `<hr class="archive-divider" id="archive-divider">
        <div id="archive-section-header" class="section-header">
          <div class="section-eyebrow">Archive</div>
        </div>`;

      for (const date of sortedDates) {
        const dateRuns = byDate[date];
        html += renderArchiveDayGroup(date, dateRuns[0].display_date, dateRuns);
      }
    }

    document.getElementById('feed-container').innerHTML = html;
  }

  // ── Filtering ─────────────────────────────────────────────
  function applyFilters() {
    // Run groups in the latest section
    document.querySelectorAll('.run-group').forEach(group => {
      const labelOk = !filterLabel || group.dataset.label === filterLabel;
      group.classList.toggle('filter-hidden', !labelOk);

      if (labelOk) {
        // Score-filter individual cards within this run group
        let visibleCards = 0;
        group.querySelectorAll('.pick-card').forEach(card => {
          const scoreOk = !filterScore || parseInt(card.dataset.score) >= filterScore;
          card.classList.toggle('filter-hidden', !scoreOk);
          if (scoreOk) visibleCards++;
        });
        // Hide the whole run group if score filter removed all its cards
        if (filterScore && visibleCards === 0) group.classList.add('filter-hidden');
      }
    });

    // Archive pick rows
    document.querySelectorAll('.archive-pick-row').forEach(row => {
      const labelOk = !filterLabel || row.dataset.label === filterLabel;
      const scoreOk = !filterScore || parseInt(row.dataset.score) >= filterScore;
      row.classList.toggle('filter-hidden', !labelOk || !scoreOk);
    });

    // Hide archive day groups where every row is now hidden
    document.querySelectorAll('.archive-day-group').forEach(group => {
      const visible = group.querySelectorAll('.archive-pick-row:not(.filter-hidden)').length;
      group.classList.toggle('filter-hidden', visible === 0);
    });

    // Hide archive divider + header if every day group is hidden
    const visibleDayGroups = document.querySelectorAll('.archive-day-group:not(.filter-hidden)').length;
    document.getElementById('archive-divider')?.classList.toggle('filter-hidden', visibleDayGroups === 0);
    document.getElementById('archive-section-header')?.classList.toggle('filter-hidden', visibleDayGroups === 0);
  }

  function updateActiveButtons() {
    document.querySelectorAll('[data-filter="label"]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.value === filterLabel);
    });
    document.querySelectorAll('[data-filter="score"]').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.value) === filterScore);
    });
  }

  // ── Button wiring (runs after render populates the DOM) ───
  function wireButtons() {
    // Jump: Today
    document.getElementById('btn-today').addEventListener('click', () => {
      document.getElementById('section-latest')?.scrollIntoView({ behavior: 'smooth' });
    });

    // Jump: Yesterday (second most-recent date)
    document.getElementById('btn-yesterday').addEventListener('click', () => {
      if (secondDate) {
        document.getElementById(`section-${secondDate}`)?.scrollIntoView({ behavior: 'smooth' });
      }
    });

    // Filter buttons (toggle within their group; clicking active = deactivate)
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const filter = btn.dataset.filter;
        const value  = btn.dataset.value;

        if (filter === 'label') {
          filterLabel = (filterLabel === value) ? null : value;
        } else if (filter === 'score') {
          const num = parseInt(value);
          filterScore = (filterScore === num) ? null : num;
        }

        updateActiveButtons();
        applyFilters();
      });
    });

    // Show All
    document.getElementById('btn-show-all').addEventListener('click', () => {
      filterLabel = null;
      filterScore = null;
      updateActiveButtons();
      applyFilters();
    });
  }

  // ── Bootstrap ─────────────────────────────────────────────
  async function loadFeed() {
    try {
      const res = await fetch('picks_data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data.runs);
      wireButtons();
    } catch (e) {
      document.getElementById('feed-container').innerHTML =
        `<div class="state-msg">Could not load picks.<br>
        <small style="color:#333">If testing locally, serve with a web server (not file://).</small></div>`;
    }
  }

  loadFeed();

  // ── Next-run countdown ────────────────────────────────────
  // Scheduled UTC run times (hour, minute)
  const RUN_TIMES_UTC = [[14, 30], [21, 30], [2, 30]];

  function getNextRunMs() {
    const now = new Date();
    const candidates = RUN_TIMES_UTC.map(([h, m]) => {
      const t = new Date(Date.UTC(
        now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, m, 0, 0
      ));
      if (t <= now) t.setUTCDate(t.getUTCDate() + 1);
      return t;
    });
    return Math.min(...candidates.map(t => t.getTime())) - now.getTime();
  }

  function formatCountdown(ms) {
    if (ms <= 0) return 'running now';
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
    if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
    return `${s}s`;
  }

  function tickCountdown() {
    const ms = getNextRunMs();
    const el = document.getElementById('next-run-time');
    const dot = document.getElementById('next-run-dot');
    if (!el) return;
    el.textContent = formatCountdown(ms);
    // Pulse the dot green when under 5 minutes
    dot.classList.toggle('pulse', ms < 5 * 60 * 1000);
  }

  tickCountdown();
  setInterval(tickCountdown, 1000);
</script>

</body>
</html>
