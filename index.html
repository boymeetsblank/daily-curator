<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank — Daily Picks</title>
  <meta name="description" content="Intentionally finite. Culturally relevant.">
  <meta property="og:title" content="Blank — Daily Picks">
  <meta property="og:description" content="Intentionally finite. Culturally relevant.">
  <meta property="og:type" content="website">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8E8E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    @font-face {
      font-family: 'sohne-var';
      src: url('/fonts/Sohne.woff2') format('woff2-variations');
      font-weight: 1 10000;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #E8E8E8;
      --ink:      #1E1E1E;
      --muted:    #7A7A7A;
      --faint:    #ABABAB;
      --border:   #C8C8C8;
      --surface:  #DCDCDC;
      --accent:   #C4E817;
      --red:      #dc2626;
      --sans:     'sohne-var', 'Helvetica Neue', Arial, sans-serif;
      --side-w:   210px;
      --page-pad: 32px;
    }

    [data-theme="dark"] {
      --bg:      #111111;
      --ink:     #EBEBEB;
      --muted:   #777777;
      --faint:   #444444;
      --border:  #2A2A2A;
      --surface: #1A1A1A;
      --accent:  #C4E817;
      color-scheme: dark;
    }

    ::selection { background: #C4E817; color: #1E1E1E; }

    html, body { min-height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────
       TOPBAR  (very thin, stays out of the way)
    ───────────────────────────────────────── */
    #topbar {
      height: 38px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--page-pad);
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--bg);
    }

    .tb-inner {
      max-width: 1140px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .tb-brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      margin-right: 24px;
      flex-shrink: 0;
    }

    .tb-nav {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
    }

    .tb-link {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      padding: 0 10px;
      height: 38px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.1s;
      white-space: nowrap;
    }

    .tb-link:hover { color: var(--ink); }
    .tb-link.active { color: var(--ink); }

    .tb-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-btn {
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .tb-btn:hover { color: var(--ink); border-color: var(--muted); }

    /* ─────────────────────────────────────────
       PAGE OUTER WRAPPER
    ───────────────────────────────────────── */
    .page-outer {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 var(--page-pad) 120px;
    }

    /* ─────────────────────────────────────────
       BIG HEADING  ("Blog" equivalent)
    ───────────────────────────────────────── */
    .page-heading {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.92;
      color: var(--ink);
      padding: 44px 0 36px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .heading-count {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--muted);
      position: relative;
      top: -2px;
    }

    /* ─────────────────────────────────────────
       TWO-COLUMN LAYOUT
    ───────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: var(--side-w) 1fr;
      gap: 0 48px;
      align-items: start;
    }

    /* ─────────────────────────────────────────
       SIDEBAR
    ───────────────────────────────────────── */
    .sidebar {
      position: sticky;
      top: 38px;
      padding-top: 4px;
      max-height: calc(100vh - 38px);
      overflow-y: auto;
    }

    .sb-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 0 10px;
      display: block;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .sb-label:first-child { padding-top: 0; }

    .sb-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 6px 0 6px 8px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      border-radius: 3px;
      transition: color 0.1s, background 0.1s;
      gap: 8px;
    }

    .sb-item:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
    [data-theme="dark"] .sb-item:hover { background: rgba(255,255,255,0.05); }

    .sb-item.active {
      color: var(--ink);
      font-weight: 600;
    }

    .sb-count {
      font-size: 11px;
      color: var(--faint);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .sb-item.active .sb-count { color: var(--muted); }

    /* Trending in sidebar */
    .sb-trend {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0 5px 8px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.1s;
      border-radius: 3px;
    }

    .sb-trend:hover { color: var(--ink); }

    .sb-trend-num {
      font-size: 10px;
      color: var(--faint);
      width: 16px;
      flex-shrink: 0;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .sb-trend-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    /* ─────────────────────────────────────────
       CONTENT AREA
    ───────────────────────────────────────── */
    .content { min-width: 0; }

    /* Column header row */
    .list-header {
      display: grid;
      grid-template-columns: 130px 1fr 32px;
      gap: 0 20px;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
    }

    .lh-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─────────────────────────────────────────
       ARTICLE ROWS
    ───────────────────────────────────────── */
    .art-row {
      display: grid;
      grid-template-columns: 130px 1fr 32px;
      grid-template-rows: auto auto;
      gap: 0 20px;
      border-bottom: 1px solid var(--border);
      padding: 0;
      position: relative;
    }

    .art-row[data-hidden="1"] { display: none; }

    /* Date cell */
    .art-date {
      grid-column: 1;
      grid-row: 1;
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      padding: 13px 0;
      white-space: nowrap;
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .art-score {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: inline-block;
      padding: 1px 5px;
      border-radius: 2px;
      border: 1px solid var(--border);
      width: fit-content;
    }
    .art-score.score-legendary { color: #1E1E1E; background: var(--accent); border-color: var(--accent); }
    .art-score.score-rare      { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* Title cell */
    .art-title-cell {
      grid-column: 2;
      grid-row: 1;
      padding: 13px 0;
      min-width: 0;
      align-self: start;
    }

    .art-title-link {
      font-size: 14.5px;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      line-height: 1.4;
    }

    .art-title-link:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* Trend badge inline */
    .art-trend-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 5px;
      margin-left: 7px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Expand toggle button */
    .expand-btn {
      grid-column: 3;
      grid-row: 1;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      margin-top: 13px;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      font-family: var(--sans);
      padding: 0;
      user-select: none;
    }

    .expand-btn:hover { background: var(--surface); color: var(--ink); border-color: var(--muted); }
    .art-row.expanded .expand-btn { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ─────────────────────────────────────────
       EXPAND DETAIL  (spans all 3 columns)
    ───────────────────────────────────────── */
    .art-expand {
      grid-column: 1 / -1;
      grid-row: 2;
      padding: 0 0 18px;
      display: none;
    }

    .art-row.expanded .art-expand { display: block; }

    .exp-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
    }

    /* Two-panel grid inside expand */
    .exp-main-row {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 16px 32px;
      margin-bottom: 16px;
    }

    .exp-field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }

    .exp-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .exp-why {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
    }

    .exp-angle {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.65;
      font-style: italic;
    }

    .angle-trigger {
      display: inline-block;
      font-style: normal;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: var(--accent);
      color: #1E1E1E;
      padding: 1px 5px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
      top: -1px;
      position: relative;
    }

    .exp-source-val {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
    }

    .exp-score-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }

    .exp-score-val.score-legendary { color: #1E1E1E; background: var(--accent); display: inline-block; padding: 1px 8px; border-radius: 2px; }
    .exp-score-val.score-rare      { background: var(--ink); color: var(--bg); display: inline-block; padding: 1px 8px; border-radius: 2px; }

    /* Footer row: vote + read */
    .exp-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .exp-read-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 5px 16px;
      border-radius: 3px;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
    }

    .exp-read-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .vote-btns { display: flex; gap: 4px; margin-left: auto; }

    .vote-btn {
      font-size: 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      width: 30px;
      height: 26px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      font-family: var(--sans);
    }

    .vote-btn:hover      { border-color: var(--muted); color: var(--ink); }
    .vote-btn.voted-up   { background: rgba(196,232,23,0.2); color: #3a6e00; border-color: #C4E817; }
    .vote-btn.voted-down { background: rgba(220,38,38,0.07); color: #dc2626; border-color: rgba(220,38,38,0.3); }

    /* Read state */
    .art-row.read .art-date,
    .art-row.read .art-title-link { opacity: 0.38; }

    /* ─────────────────────────────────────────
       X TRENDS MODULE  (above article list)
    ───────────────────────────────────────── */
    #trends-module { margin-bottom: 0; }

    .trends-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px 18px;
      margin-bottom: 20px;
      display: none;   /* shown when trends exist */
    }

    .trends-panel.has-trends { display: block; }

    .trends-panel-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .tp-x-logo { width: 10px; height: 10px; color: var(--muted); }

    .tp-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tp-updated {
      font-size: 9.5px;
      color: var(--faint);
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tp-updated.visible { opacity: 1; }

    .trends-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 32px;
    }

    a.trend-item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 0 8px;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    a.trend-item:last-child { border-bottom: none; }
    a.trend-item:hover .ti-name { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }

    .ti-num  { font-size: 10px; color: var(--faint); text-align: right; font-variant-numeric: tabular-nums; }
    .ti-name { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    a.trend-item:nth-child(-n+3) .ti-num  { color: var(--accent); }
    a.trend-item:nth-child(-n+3) .ti-name { color: var(--ink); font-weight: 500; }

    /* ─────────────────────────────────────────
       BREAKING NEWS
    ───────────────────────────────────────── */
    #breaking-section { margin-bottom: 12px; }

    .breaking-label-row {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 0 6px;
    }

    .breaking-label-row::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .breaking-art-row {
      display: grid;
      grid-template-columns: 130px 1fr 32px;
      grid-template-rows: auto auto;
      gap: 0 20px;
      border-bottom: 1px solid rgba(220,38,38,0.2);
      border-left: 2px solid var(--red);
      padding-left: 10px;
      background: rgba(220,38,38,0.025);
    }

    /* ─────────────────────────────────────────
       PROGRESS BAR
    ───────────────────────────────────────── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: var(--accent);
      z-index: 9999;
      transition: width 0.08s linear;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────
       NEW PICKS BANNER
    ───────────────────────────────────────── */
    #new-picks-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      background: var(--ink);
      color: var(--bg);
      padding: 10px 24px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      animation: slideDown 0.22s ease both;
    }

    #new-picks-banner:hover { opacity: 0.88; }
    .banner-x { margin-left: 10px; opacity: 0.45; }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }

    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    .state-msg {
      padding: 80px 0;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      font-style: italic;
    }

    /* ─────────────────────────────────────────
       MOBILE  ≤ 680px
    ───────────────────────────────────────── */
    @media (max-width: 680px) {
      :root { --page-pad: 16px; --side-w: 0px; }

      .layout        { grid-template-columns: 1fr; }
      .sidebar       { display: none; }
      .page-heading  { font-size: 48px; padding: 28px 0 24px; }

      .list-header   { grid-template-columns: 80px 1fr 32px; }
      .art-row       { grid-template-columns: 80px 1fr 32px; }
      .breaking-art-row { grid-template-columns: 80px 1fr 32px; }
      .art-date      { font-size: 10.5px; }
      .art-title-link { font-size: 13.5px; }

      .exp-main-row  { grid-template-columns: 1fr; }
      .trends-cols   { grid-template-columns: 1fr; }
    }

    /* ─────────────────────────────────────────
       TABLET  681px – 900px
    ───────────────────────────────────────── */
    @media (min-width: 681px) and (max-width: 900px) {
      :root { --side-w: 160px; }
      .page-heading { font-size: 56px; }
    }
  </style>
  <script>
    (function(){
      var t = localStorage.getItem('blank_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<div id="progress-bar"></div>
<div id="new-picks-banner" role="status" onclick="dismissBanner()">
  New picks available — click to refresh <span class="banner-x">✕</span>
</div>

<!-- ── Topbar ── -->
<div id="topbar">
  <div class="tb-inner">
    <span class="tb-brand">Blank</span>
    <div class="tb-nav">
      <button class="tb-link active" id="tb-today"   onclick="scrollToToday()">Today</button>
      <button class="tb-link"        id="tb-archive" onclick="scrollToArchive()">Archive</button>
      <button class="tb-link"        id="tb-trends"  onclick="scrollToTrends()">Trends</button>
    </div>
    <div class="tb-actions">
      <button class="tb-btn" id="notif-btn" onclick="enableNotifications()">🔔</button>
      <button class="tb-btn" id="theme-toggle" onclick="toggleTheme()"></button>
    </div>
  </div>
</div>

<!-- ── Page ── -->
<div class="page-outer">

  <!-- Big heading -->
  <h1 class="page-heading">
    Blank
    <span class="heading-count" id="pick-total"></span>
  </h1>

  <!-- Two-column layout -->
  <div class="layout">

    <!-- LEFT: Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Score filters (injected by JS) -->
      <span class="sb-label">/ Scores</span>
      <div id="sb-score-filters"></div>

      <!-- Sources (injected by JS) -->
      <span class="sb-label" style="margin-top:8px">/ Sources</span>
      <div id="sb-sources"></div>

      <!-- Trending topics -->
      <span class="sb-label" style="margin-top:8px">/ Trending</span>
      <div id="sb-trends"></div>
    </aside>

    <!-- RIGHT: Content -->
    <div class="content">

      <!-- Trends panel (inline, above list) -->
      <div id="trends-module">
        <div class="trends-panel" id="trends-panel">
          <div class="trends-panel-header">
            <svg class="tp-x-logo" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span class="tp-label">Now Trending on X</span>
            <span id="tp-updated" class="tp-updated"></span>
          </div>
          <div class="trends-cols" id="trends-grid"></div>
        </div>
      </div>

      <!-- Breaking news (injected before list) -->
      <div id="breaking-section"></div>

      <!-- Column header -->
      <div class="list-header">
        <span class="lh-label">/ Date</span>
        <span class="lh-label">/ Title</span>
        <span></span>
      </div>

      <!-- Article list -->
      <div id="feed-container">
        <div class="state-msg">Loading…</div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Theme ────────────────────────────────────────────────────
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const b = document.getElementById('theme-toggle');
    if (b) b.textContent = t === 'dark' ? '☀' : '☽';
  }
  function toggleTheme() {
    const cur = localStorage.getItem('blank_theme') || 'light';
    const nxt = cur === 'dark' ? 'light' : 'dark';
    localStorage.setItem('blank_theme', nxt);
    applyTheme(nxt);
  }

  // ── Escape ───────────────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ── Trend helpers ────────────────────────────────────────────
  function isTrendPick(p) { return !p.link; }
  function trendPlatform(p) {
    const s = (p.source||'').toLowerCase();
    if (s.includes('twitter') || s.includes('x (twitter)')) return 'X';
    if (s.includes('google')) return 'Google';
    return null;
  }
  function trendSearchUrl(p) {
    const q = encodeURIComponent(p.title||'');
    return trendPlatform(p) === 'Google'
      ? `https://www.google.com/search?q=${q}`
      : `https://x.com/search?q=${q}`;
  }

  // ── Vote ─────────────────────────────────────────────────────
  const VOTE_TOKEN       = '__VOTE_TOKEN__';
  const VOTE_REPO        = 'boymeetsblank/daily-curator';
  const VAPID_PUBLIC_KEY = '__VAPID_PUBLIC_KEY__';
  let   cachedRuns       = null;

  async function vote(btn, dir) {
    const btns = btn.parentElement;
    const up   = btns.querySelector(':first-child');
    const dn   = btns.querySelector(':last-child');
    let voting = false;
    if (dir === 'up') {
      const was = up.classList.contains('voted-up');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) { up.classList.add('voted-up'); voting = true; }
    } else {
      const was = dn.classList.contains('voted-down');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) { dn.classList.add('voted-down'); voting = true; }
    }
    if (!voting || !VOTE_TOKEN || VOTE_TOKEN.startsWith('__')) return;
    const ct = new Date().toLocaleString('sv-SE',{timeZone:'America/Chicago',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).replace(' ','T')+' CT';
    const record = {timestamp:ct,direction:dir,title:btns.dataset.title||'',source:btns.dataset.source||'',score:parseInt(btns.dataset.score)||0,url:btns.dataset.url||null};
    const api = `https://api.github.com/repos/${VOTE_REPO}/contents/votes.json`;
    const hdr = {'Authorization':`Bearer ${VOTE_TOKEN}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
    let sha=null,votes=[];
    try{const r=await fetch(api,{headers:hdr});if(r.ok){const d=await r.json();sha=d.sha;votes=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(d.content.replace(/\n/g,'')),c=>c.charCodeAt(0))))}}catch{}
    votes.push(record);
    const enc=new TextEncoder().encode(JSON.stringify(votes,null,2)+'\n');
    const bin=Array.from(enc,b=>String.fromCharCode(b)).join('');
    const body={message:`vote: ${dir} — ${record.title.slice(0,50)}`,content:btoa(bin),branch:'main'};
    if(sha)body.sha=sha;
    try{await fetch(api,{method:'PUT',headers:{...hdr,'Content-Type':'application/json'},body:JSON.stringify(body)})}catch{}
  }

  // ── Angle parser ─────────────────────────────────────────────
  function parseAngle(s) {
    if (!s) return null;
    const m = s.match(/^\[TRIGGER:\s*([^\]]+)\]\s*([\s\S]*)/);
    return m ? {trigger:m[1].trim(),text:m[2].trim()} : {trigger:null,text:s};
  }

  // ── Date formatter  → "2026 · 04 · 07" ──────────────────────
  function fmtDate(ctDate) {
    if (!ctDate) return '';
    const [y, m, d] = ctDate.split('-');
    return `${y} · ${m} · ${d}`;
  }

  // ── Render a single article row ───────────────────────────────
  function renderRow(pick, ctDate, runIsoTs, extraClass) {
    const href     = esc(pick.link || trendSearchUrl(pick));
    const tsAttr   = runIsoTs ? ` data-run-ts="${esc(runIsoTs)}"` : '';
    const score    = pick.score;
    const scoreCls = score >= 9 ? 'score-legendary' : score >= 8 ? 'score-rare' : '';
    const scoreLabel = score >= 9 ? `${score}/10` : score >= 8 ? `${score}/10` : `${score}/10`;

    const trendBadge = !pick.link
      ? `<span class="art-trend-tag">${esc(trendPlatform(pick)||'Trending')}</span>` : '';
    const multiSrc   = pick.trending_across_sources
      ? `<span class="art-trend-tag" style="color:var(--accent);border-color:var(--accent)">3+ SRC</span>` : '';

    // Build expand panel
    let whyHtml = '';
    if (pick.why) whyHtml = `<p class="exp-why">${esc(pick.why)}</p>`;

    let angleHtml = '';
    if (pick.angle) {
      const pa = parseAngle(pick.angle);
      if (pa && pa.text) {
        const lines   = pa.text.split(' / ').map(l => esc(l.trim())).join('<br>');
        const trigger = pa.trigger ? `<span class="angle-trigger">${esc(pa.trigger)}</span>` : '';
        angleHtml = `<div class="exp-angle">${trigger}${lines}</div>`;
      }
    }

    const readBtn = pick.link
      ? `<a class="exp-read-btn" href="${href}" target="_blank" rel="noopener noreferrer"
             onclick="markRead(this.closest('.art-row')); event.stopPropagation()">Read →</a>`
      : `<a class="exp-read-btn" href="${href}" target="_blank" rel="noopener noreferrer"
             onclick="event.stopPropagation()">Search →</a>`;

    const expandHtml = `
      <div class="art-expand">
        <div class="exp-inner">
          <div class="exp-main-row">
            <div class="exp-field">
              <span class="exp-label">Summary</span>
              ${whyHtml || '<p class="exp-why" style="color:var(--faint);font-style:italic">No summary available</p>'}
            </div>
            <div class="exp-field">
              <span class="exp-label">Source</span>
              <span class="exp-source-val">${esc(pick.source)}</span>
            </div>
          </div>
          ${angleHtml ? `<div class="exp-main-row">
            <div class="exp-field">
              <span class="exp-label">Hook</span>
              ${angleHtml}
            </div>
            <div class="exp-field">
              <span class="exp-label">Score</span>
              <span class="exp-score-val ${scoreCls}"${tsAttr}>${scoreLabel}</span>
            </div>
          </div>` : `<div style="margin-bottom:10px"><span class="exp-label">Score</span> <span class="exp-score-val ${scoreCls}" style="margin-left:8px"${tsAttr}>${scoreLabel}</span></div>`}
          <div class="exp-footer">
            ${readBtn}
            <div class="vote-btns"
                 data-title="${esc(pick.title)}"
                 data-source="${esc(pick.source)}"
                 data-score="${score}"
                 data-url="${esc(pick.link||'')}">
              <button class="vote-btn" onclick="vote(this,'up');   event.stopPropagation()" title="Good pick">↑</button>
              <button class="vote-btn" onclick="vote(this,'down'); event.stopPropagation()" title="Not for me">↓</button>
            </div>
          </div>
        </div>
      </div>`;

    const titleClick = pick.link
      ? `onclick="markRead(this.closest('.art-row')); event.stopPropagation()"`
      : `onclick="event.stopPropagation()"`;

    return `<div class="art-row${extraClass||''}" data-score="${score}" data-url="${esc(pick.link||'')}" data-date="${esc(ctDate||'')}">
      <div class="art-date">${esc(fmtDate(ctDate))}<span class="art-score ${scoreCls}">${score}</span></div>
      <div class="art-title-cell">
        <a class="art-title-link" href="${href}" target="_blank" rel="noopener noreferrer" ${titleClick}>${esc(pick.title)}</a>${trendBadge}${multiSrc}
      </div>
      <button class="expand-btn" onclick="toggleExpand(this.closest('.art-row'))" aria-label="Expand">+</button>
      ${expandHtml}
    </div>`;
  }

  // ── Toggle expand / collapse ──────────────────────────────────
  function toggleExpand(row) {
    if (!row) return;
    const isOpen = row.classList.contains('expanded');
    row.classList.toggle('expanded', !isOpen);
    const btn = row.querySelector('.expand-btn');
    if (btn) btn.textContent = isOpen ? '+' : '−';
  }

  // ── Active score filter ───────────────────────────────────────
  let activeFilter = 'all';

  function applyFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.sb-item[data-filter]').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === filter);
    });
    document.querySelectorAll('.art-row[data-score]').forEach(row => {
      let show = true;
      if (filter === '9') show = parseInt(row.dataset.score) >= 9;
      else if (filter === '8') show = parseInt(row.dataset.score) === 8;
      else if (filter === '7') show = parseInt(row.dataset.score) === 7;
      row.dataset.hidden = show ? '0' : '1';
    });
  }

  // ── Build sidebar content ─────────────────────────────────────
  function buildSidebar(runs) {
    const allPicks = runs.flatMap(r => r.picks);
    const counts   = { all:0, 9:0, 8:0, 7:0 };
    const srcMap   = {};
    allPicks.forEach(p => {
      counts.all++;
      const s = p.score;
      if (s >= 9) counts[9]++;
      else if (s === 8) counts[8]++;
      else counts[7]++;
      if (!isTrendPick(p)) srcMap[p.source] = (srcMap[p.source]||0)+1;
    });

    // Score filters
    const filterEl = document.getElementById('sb-score-filters');
    if (filterEl) {
      const scoreItems = [
        ['all', `All picks`, counts.all],
        ['9',   `Score 9–10`,  counts[9]],
        ['8',   `Score 8`,     counts[8]],
        ['7',   `Score 7`,     counts[7]],
      ];
      filterEl.innerHTML = scoreItems.map(([f,label,cnt]) =>
        `<button class="sb-item${f==='all'?' active':''}" data-filter="${f}" onclick="applyFilter('${f}')">
          <span>${label}</span>
          <span class="sb-count">(${cnt})</span>
        </button>`
      ).join('');
    }

    // Sources
    const srcEl = document.getElementById('sb-sources');
    if (srcEl) {
      const sorted = Object.entries(srcMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
      srcEl.innerHTML = sorted.map(([src,cnt]) =>
        `<div class="sb-item" style="cursor:default">
          <span>${esc(src)}</span>
          <span class="sb-count">(${cnt})</span>
        </div>`
      ).join('') || '<div class="sb-item" style="cursor:default;color:var(--faint)">No sources yet</div>';
    }

    // Total heading count
    const totalEl = document.getElementById('pick-total');
    if (totalEl) totalEl.textContent = `(${counts.all})`;
  }

  // ── Build sidebar trending list ───────────────────────────────
  function buildSbTrends(topics) {
    const el = document.getElementById('sb-trends');
    if (!el || !topics?.length) return;
    el.innerHTML = topics.slice(0, 12).map((name, i) => {
      const enc = encodeURIComponent(name);
      return `<a class="sb-trend" href="https://x.com/search?q=${enc}" target="_blank" rel="noopener noreferrer">
        <span class="sb-trend-num">${String(i+1).padStart(2,'0')}</span>
        <span class="sb-trend-name">${esc(name)}</span>
      </a>`;
    }).join('');
  }

  // ── Build inline trends panel ─────────────────────────────────
  function buildTrendsPanel(topics) {
    const panel = document.getElementById('trends-panel');
    const grid  = document.getElementById('trends-grid');
    if (!panel || !grid || !topics?.length) return;

    const half     = Math.ceil(topics.length / 2);
    const mkCol    = (arr, offset) => arr.map((name, i) => {
      const enc = encodeURIComponent(name);
      return `<a class="trend-item" href="https://x.com/search?q=${enc}" target="_blank" rel="noopener noreferrer">
        <span class="ti-num">${String(offset+i+1).padStart(2,'0')}</span>
        <span class="ti-name">${esc(name)}</span>
      </a>`;
    }).join('');

    grid.innerHTML = `<div>${mkCol(topics.slice(0,half),0)}</div><div>${mkCol(topics.slice(half),half)}</div>`;
    panel.classList.add('has-trends');
    buildSbTrends(topics);
  }

  // ── Main render ──────────────────────────────────────────────
  function render(runs) {
    if (!runs?.length) {
      document.getElementById('feed-container').innerHTML = '<div class="state-msg">No picks yet.</div>';
      return;
    }

    cachedRuns = runs;

    // Group by ct_date
    const dateMap = new Map();
    for (const run of runs) {
      const d = run.ct_date || run.date;
      if (!dateMap.has(d)) dateMap.set(d, []);
      dateMap.get(d).push(run);
    }

    let html = '';
    let isFirst = true;

    for (const [date, dateRuns] of dateMap) {
      if (!isFirst) {
        // Archive date divider
        html += `<div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:24px 0 10px;border-bottom:1px solid var(--border)" id="section-${esc(date)}">${esc(fmtDate(date))}</div>`;
      }

      if (isFirst) html = `<div id="section-today">`;
      else          html += `<div>`;

      for (const run of dateRuns) {
        const runIsoTs = (run.date && run.time)
          ? `${run.date}T${run.time.slice(0,2)}:${run.time.slice(2,4)}:00Z` : null;
        for (const pick of run.picks) {
          html += renderRow(pick, date, runIsoTs, '');
        }
      }

      html += '</div>';
      isFirst = false;
    }

    document.getElementById('feed-container').innerHTML = html;
    applyReadState();
    buildSidebar(runs);

    // Trends panel
    const latestDate = runs[0].ct_date || runs[0].date;
    const latestRun  = runs.find(r => (r.ct_date||r.date) === latestDate);
    buildTrendsPanel(latestRun?.x_trends || []);
  }

  // ── Read state ───────────────────────────────────────────────
  function getReadUrls() {
    try { return new Set(JSON.parse(localStorage.getItem('blank_read')||'[]')); }
    catch { return new Set(); }
  }

  function setReadUI(row) { if (row) row.classList.add('read'); }

  function ctDateStr() {
    return new Date().toLocaleDateString('sv-SE', { timeZone:'America/Chicago' });
  }

  function getReadStats() {
    const today = ctDateStr();
    let td={date:'',count:0}; try{td=JSON.parse(localStorage.getItem('blank_read_today')||'{}')}catch{}
    const readToday = td.date===today ? (td.count||0) : 0;
    let total=0; try{total=parseInt(localStorage.getItem('blank_read_total')||'0',10)||0}catch{}
    return { readToday, total };
  }

  function incrementReadStats() {
    const today = ctDateStr();
    let td={date:'',count:0}; try{td=JSON.parse(localStorage.getItem('blank_read_today')||'{}')}catch{}
    if(td.date!==today) td={date:today,count:0};
    td.count++; localStorage.setItem('blank_read_today',JSON.stringify(td));
    let total=0; try{total=parseInt(localStorage.getItem('blank_read_total')||'0',10)||0}catch{}
    localStorage.setItem('blank_read_total',String(total+1));
  }

  function markRead(row) {
    if (!row) return;
    const link = row.querySelector('.art-title-link');
    const url  = link ? link.href : '';
    if (!url) return;
    const urls = getReadUrls();
    if (urls.has(url)) return;
    setReadUI(row);
    urls.add(url);
    localStorage.setItem('blank_read', JSON.stringify([...urls]));
    incrementReadStats();
  }

  function applyReadState() {
    const urls = getReadUrls();
    if (!urls.size) return;
    document.querySelectorAll('.art-row').forEach(row => {
      const link = row.querySelector('.art-title-link');
      if (link && urls.has(link.href)) setReadUI(row);
    });
  }

  // ── Scroll helpers ───────────────────────────────────────────
  function setTbActive(id) {
    ['tb-today','tb-archive','tb-trends'].forEach(i => {
      const el = document.getElementById(i);
      if (el) el.classList.toggle('active', i === id);
    });
  }

  function scrollToToday()   { document.getElementById('section-today')?.scrollIntoView({behavior:'smooth'}); setTbActive('tb-today'); }
  function scrollToArchive() {
    const secs = document.querySelectorAll('[id^="section-"]');
    if (secs.length > 1) secs[1].scrollIntoView({behavior:'smooth'});
    setTbActive('tb-archive');
  }
  function scrollToTrends()  { document.getElementById('trends-module')?.scrollIntoView({behavior:'smooth'}); setTbActive('tb-trends'); }

  // ── Time ago ─────────────────────────────────────────────────
  function timeAgo(iso) {
    if (!iso) return '';
    const d = Math.floor((Date.now()-new Date(iso).getTime())/1000);
    if (d<45)    return 'just now';
    if (d<3600)  return `${Math.floor(d/60)}m ago`;
    if (d<86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }

  function refreshTimestamps() {
    document.querySelectorAll('[data-run-ts]').forEach(el => {
      el.textContent = timeAgo(el.dataset.runTs) || el.textContent;
    });
  }

  let trendsUpdatedAt = null;
  function updateTrendsTs() {
    const el = document.getElementById('tp-updated');
    if (!el || !trendsUpdatedAt) return;
    el.textContent = `updated ${timeAgo(trendsUpdatedAt.toISOString())}`;
    el.classList.add('visible');
  }

  function tick() { refreshTimestamps(); updateTrendsTs(); }

  // ── Progress bar ─────────────────────────────────────────────
  function initProgressBar() {
    const bar = document.getElementById('progress-bar');
    if (!bar) return;
    window.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = (h > 0 ? Math.min(100,(window.scrollY/h)*100) : 100)+'%';
    }, {passive:true});
  }

  // ── New picks banner ──────────────────────────────────────────
  let picksFingerprint=null, bannerDismissed=false;

  function dismissBanner() {
    bannerDismissed = true;
    document.getElementById('new-picks-banner').style.display='none';
  }

  async function checkForNewPicksAndTrends() {
    try {
      const res  = await fetch('picks_data.json?_='+Date.now(), {cache:'no-store'});
      if (!res.ok) return;
      const data = await res.json();
      if (!data.runs?.length) return;

      const latest = data.runs[0];
      const fp     = (latest.date||'')+(latest.time||'');
      if (!picksFingerprint) { picksFingerprint = fp; }
      else if (fp !== picksFingerprint && !bannerDismissed) {
        picksFingerprint = fp;
        document.getElementById('new-picks-banner').style.display = 'block';
      }

      // Update trends
      const latestDate = latest.ct_date||latest.date;
      const latestRun  = data.runs.find(r=>(r.ct_date||r.date)===latestDate);
      const topics     = latestRun?.x_trends||[];
      const grid       = document.getElementById('trends-grid');
      if (grid && topics.length) {
        const half  = Math.ceil(topics.length/2);
        const mkCol = (arr,off) => arr.map((n,i)=>{
          const enc=encodeURIComponent(n);
          return `<a class="trend-item" href="https://x.com/search?q=${enc}" target="_blank" rel="noopener noreferrer">
            <span class="ti-num">${String(off+i+1).padStart(2,'0')}</span>
            <span class="ti-name">${esc(n)}</span>
          </a>`;
        }).join('');
        grid.innerHTML = `<div>${mkCol(topics.slice(0,half),0)}</div><div>${mkCol(topics.slice(half),half)}</div>`;
        trendsUpdatedAt = new Date(); updateTrendsTs();
        buildSbTrends(topics);
      }
    } catch {}
  }

  // ── Load ─────────────────────────────────────────────────────
  let lastRunTime = null;

  function parseRunTime(run) {
    if (!run) return null;
    return new Date(`${run.date}T${run.time.slice(0,2)}:${run.time.slice(2,4)}:00Z`);
  }

  async function loadFeed() {
    try {
      const res  = await fetch('picks_data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.runs?.length) {
        lastRunTime      = parseRunTime(data.runs[0]);
        picksFingerprint = (data.runs[0].date||'')+(data.runs[0].time||'');
        trendsUpdatedAt  = lastRunTime||new Date();
      }
      render(data.runs);
      tick();
      updateTrendsTs();
    } catch {
      document.getElementById('feed-container').innerHTML =
        `<div class="state-msg">Could not load picks.<br><small style="font-size:11px">Serve with a web server for local testing.</small></div>`;
    }
  }

  initProgressBar();
  loadFeed();
  setInterval(tick, 60_000);
  setInterval(checkForNewPicksAndTrends, 5*60_000);
  applyTheme(localStorage.getItem('blank_theme')||'light');
  initNotifBtn();
  ensurePushSubscription();

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  // ── Breaking news ─────────────────────────────────────────────
  function renderBreakingCard(item) {
    const url = esc(item.search_url||`https://www.google.com/search?q=${encodeURIComponent(item.topic)}`);
    const det = item.detected_at ? timeAgo(item.detected_at) : '';
    return `<div class="breaking-art-row">
      <div class="art-date" style="color:var(--red)">${det}</div>
      <div class="art-title-cell">
        <a class="art-title-link" href="${url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${esc(item.topic)}</a>
        <span class="art-trend-tag" style="color:var(--red);border-color:rgba(220,38,38,0.3)">Breaking</span>
      </div>
      <button class="expand-btn" onclick="toggleExpand(this.closest('.breaking-art-row'))">+</button>
      <div class="art-expand">
        <div class="exp-inner">
          <div class="exp-main-row">
            <div class="exp-field">
              <span class="exp-label">Summary</span>
              <p class="exp-why">Velocity spike detected — newly trending in the US${item.traffic?'. '+esc(item.traffic)+' searches.':''}</p>
            </div>
          </div>
          <div class="exp-footer">
            <a class="exp-read-btn" href="${url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Search Google →</a>
          </div>
        </div>
      </div>
    </div>`;
  }

  function renderBreakingSection(items) {
    if (!items?.length) return;
    const c = document.getElementById('breaking-section');
    if (!c) return;
    c.innerHTML = `<div class="breaking-label-row">Breaking now</div>`+items.map(renderBreakingCard).join('');
  }

  let lastBreakingId = null;
  async function checkBreakingNews() {
    try {
      const res = await fetch('breaking_news.json?_='+Date.now(),{cache:'no-store'});
      if (!res.ok) return;
      const {items=[]} = await res.json();
      if (!items.length) return;
      if (items[0].id!==lastBreakingId && lastBreakingId!==null) showBreakingNotif(items[0]);
      lastBreakingId = items[0].id;
      renderBreakingSection(items);
    } catch {}
  }

  async function showBreakingNotif(item) {
    if (!('Notification' in window)||Notification.permission!=='granted') return;
    try {
      const reg=await navigator.serviceWorker?.ready;
      if(reg) reg.showNotification(`⚡ ${item.topic}`,{body:'Velocity spike detected',tag:'breaking',renotify:true});
    } catch {}
  }

  function initNotifBtn() {
    const b=document.getElementById('notif-btn');
    if(!b) return;
    if(!('Notification' in window)){b.style.display='none';return;}
    b.textContent=Notification.permission==='denied'?'🔕':'🔔';
    b.title=Notification.permission==='granted'?'Notifications enabled':Notification.permission==='denied'?'Notifications blocked':'Enable breaking news notifications';
  }

  function urlBase64ToUint8Array(b64){const p='='.repeat((4-b64.length%4)%4);const r=atob((b64+p).replace(/-/g,'+').replace(/_/g,'/'));return Uint8Array.from(r,c=>c.charCodeAt(0));}

  async function saveSubscription(sub){
    if(!VOTE_TOKEN||VOTE_TOKEN.startsWith('__')) return;
    const api=`https://api.github.com/repos/${VOTE_REPO}/contents/subscriptions.json`;
    const hdr={'Authorization':`Bearer ${VOTE_TOKEN}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
    let sha=null,subs=[];
    try{const r=await fetch(api,{headers:hdr});if(r.ok){const d=await r.json();sha=d.sha;subs=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(d.content.replace(/\n/g,'')),c=>c.charCodeAt(0))))}}catch{}
    if(subs.some(s=>s.endpoint===sub.endpoint))return;
    subs.push(sub);
    const enc=new TextEncoder().encode(JSON.stringify(subs,null,2)+'\n');
    const bin=Array.from(enc,b=>String.fromCharCode(b)).join('');
    const body={message:'Add push subscription',content:btoa(bin),branch:'main'};
    if(sha)body.sha=sha;
    try{await fetch(api,{method:'PUT',headers:{...hdr,'Content-Type':'application/json'},body:JSON.stringify(body)})}catch{}
  }

  async function subscribeToPush(){
    if(!('serviceWorker'in navigator)||!('PushManager'in window))return;
    if(!VAPID_PUBLIC_KEY||VAPID_PUBLIC_KEY.startsWith('__'))return;
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
    await saveSubscription(sub.toJSON());
  }

  async function ensurePushSubscription(){
    if(!('Notification'in window)||Notification.permission!=='granted')return;
    try{await subscribeToPush()}catch{}
  }

  async function enableNotifications(){
    if(!('Notification'in window)){alert('Notifications not supported.');return;}
    const perm=await Notification.requestPermission();
    const b=document.getElementById('notif-btn');
    if(perm==='granted'){if(b){b.textContent='🔔';b.title='Notifications enabled';}try{await subscribeToPush()}catch{}}
    else{if(b){b.textContent='🔕';b.title='Notifications blocked';}}
  }

  checkBreakingNews();
  setInterval(checkBreakingNews, 2*60_000);
</script>
