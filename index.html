<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@boymeetsblank_ — Daily Picks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 0.5px solid #e0e0e0;
      padding: 12px 20px;
    }

    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-brand-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      letter-spacing: -0.2px;
    }

    .tagline {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    /* ── Pill buttons (shared) ── */
    .pill-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 100px;
      border: 0.5px solid #ddd;
      background: transparent;
      color: #777;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      line-height: 1.4;
      white-space: nowrap;
    }

    .pill-btn:hover { background: #f5f5f5; color: #111; }

    .pill-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* ── Filter bar ── */
    .filter-bar {
      position: sticky;
      z-index: 90;
      background: #fff;
      border-bottom: 0.5px solid #e0e0e0;
      padding: 8px 20px;
    }

    .filter-bar-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-date {
      font-size: 13px;
      font-weight: 500;
      color: #111;
      flex-shrink: 0;
    }

    .filter-pills {
      display: flex;
      gap: 5px;
      margin-left: 2px;
    }

    .filter-pills .pill-btn {
      font-size: 11px;
      padding: 3px 10px;
    }

    .filter-count {
      margin-left: auto;
      font-size: 12px;
      color: #bbb;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 20px 80px;
    }

    /* ── Pick card ── */
    .pick-card {
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 8px;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .score-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      background: #111;
      color: #fff;
      line-height: 1.5;
      flex-shrink: 0;
    }

    .card-source {
      font-size: 12px;
      color: #aaa;
      font-weight: 400;
    }

    .trend-sources-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 100px;
      border: 0.5px solid #ddd;
      color: #999;
      line-height: 1.6;
      flex-shrink: 0;
    }

    .card-timestamp {
      margin-left: auto;
      font-size: 11px;
      color: #ccc;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 500;
      color: #111;
      line-height: 1.4;
      letter-spacing: -0.2px;
      margin-bottom: 8px;
    }

    .card-why {
      font-size: 13px;
      color: #999;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* ── Angle / carousel hook box ── */
    .angle-box {
      border-left: 2px solid #111;
      padding: 8px 12px;
      margin-bottom: 14px;
    }

    .angle-trigger {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 5px;
    }

    .angle-text {
      font-size: 13px;
      color: #111;
      line-height: 1.65;
    }

    /* ── Card bottom row ── */
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .read-link {
      font-size: 13px;
      color: #111;
      text-decoration: none;
    }

    .read-link:hover { text-decoration: underline; }

    .trend-source-label {
      font-size: 13px;
      color: #bbb;
      font-style: italic;
    }

    .feedback-btns {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .feedback-btn {
      font-family: inherit;
      font-size: 13px;
      background: transparent;
      border: 0.5px solid #e0e0e0;
      border-radius: 6px;
      width: 28px;
      height: 26px;
      cursor: pointer;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .feedback-btn:hover { background: #f5f5f5; color: #111; }
    .feedback-btn.voted-up   { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
    .feedback-btn.voted-down { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    /* ── Archive section ── */
    .archive-section { margin-top: 40px; }

    .archive-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 12px;
    }

    .archive-list { border-top: 0.5px solid #e8e8e8; }

    .archive-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid #e8e8e8;
      text-decoration: none;
      color: inherit;
    }

    a.archive-row:hover .archive-row-title { color: #111; }

    .archive-row-title {
      font-size: 13px;
      color: #aaa;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }

    .archive-row-meta {
      font-size: 12px;
      color: #ccc;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── Filter hidden ── */
    .filter-hidden { display: none !important; }

    /* ── States ── */
    .state-msg {
      text-align: center;
      color: #bbb;
      padding: 80px 0;
      font-size: 14px;
      line-height: 1.8;
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      header { padding: 10px 16px; }
      .filter-bar { padding: 7px 16px; }
      .content { padding: 16px 16px 80px; }
      .card-title { font-size: 15px; }
      .filter-pills .pill-btn { padding: 3px 8px; font-size: 11px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand-group">
      <div class="brand">@boymeetsblank_</div>
      <div class="tagline">intentionally finite, culturally relevant</div>
    </div>
    <div class="header-actions">
      <button class="pill-btn active" id="btn-today">Today</button>
      <button class="pill-btn" id="btn-archive">Archive</button>
    </div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <div class="filter-bar-inner">
    <span class="filter-date" id="filter-date">—</span>
    <div class="filter-pills">
      <button class="pill-btn filter-btn" data-value="Morning">Morning</button>
      <button class="pill-btn filter-btn" data-value="Afternoon">Afternoon</button>
      <button class="pill-btn filter-btn" data-value="Evening">Evening</button>
    </div>
    <span class="filter-count" id="filter-count"></span>
  </div>
</div>

<div class="content">
  <div id="feed-container">
    <div class="state-msg">Loading picks…</div>
  </div>
</div>

<script>
  let filterLabel = null;
  let allRunsData  = [];

  // ── HTML escaping ──────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ── Angle / carousel hook formatting ──────────────────────
  function formatAngle(angle) {
    if (!angle) return '';
    const m = angle.match(/^\[TRIGGER:\s*([^\]]+)\]\s*([\s\S]*)/);
    if (m) {
      const trigger = esc(m[1].trim());
      const lines   = m[2].split('/').map(l => l.trim()).filter(Boolean);
      return `<div class="angle-box">
        <div class="angle-trigger">${trigger}</div>
        <div class="angle-text">${lines.map(l => esc(l)).join('<br>')}</div>
      </div>`;
    }
    return `<div class="angle-box"><div class="angle-text">${esc(angle)}</div></div>`;
  }

  // ── Trending source label ──────────────────────────────────
  function trendLabel(pick) {
    const src = (pick.source || '').toLowerCase();
    if (src.includes('twitter') || src.includes(' x ') || src.endsWith(' x') || src.startsWith('x ')) {
      return 'Trending on X right now';
    }
    if (src.includes('google')) return 'Trending on Google right now';
    return 'Trending right now';
  }

  // ── Feedback vote toggle ───────────────────────────────────
  function vote(btn, dir) {
    const btns = btn.parentElement;
    const up   = btns.querySelector(':first-child');
    const dn   = btns.querySelector(':last-child');
    if (dir === 'up') {
      const was = up.classList.contains('voted-up');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) up.classList.add('voted-up');
    } else {
      const was = dn.classList.contains('voted-down');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) dn.classList.add('voted-down');
    }
  }

  // ── Render a single pick card ──────────────────────────────
  function renderPickCard(pick, runDisplayTime) {
    const sourceBadge = pick.trending_across_sources
      ? `<span class="trend-sources-badge">3+ sources</span>`
      : '';

    const bottomLeft = pick.link
      ? `<a class="read-link" href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer">Read article →</a>`
      : `<span class="trend-source-label">${esc(trendLabel(pick))}</span>`;

    return `<div class="pick-card" data-score="${pick.score}">
      <div class="card-top">
        <span class="score-badge">${pick.score}</span>
        <span class="card-source">${esc(pick.source)}</span>
        ${sourceBadge}
        <span class="card-timestamp">${esc(runDisplayTime)}</span>
      </div>
      <div class="card-title">${esc(pick.title)}</div>
      ${pick.why    ? `<div class="card-why">${esc(pick.why)}</div>` : ''}
      ${formatAngle(pick.angle)}
      <div class="card-bottom">
        ${bottomLeft}
        <div class="feedback-btns">
          <button class="feedback-btn" onclick="vote(this,'up')" title="Good pick">↑</button>
          <button class="feedback-btn" onclick="vote(this,'down')" title="Not for me">↓</button>
        </div>
      </div>
    </div>`;
  }

  // ── Render a run group (Morning / Afternoon / Evening) ────
  function renderRunGroup(run) {
    let html = `<div class="run-group" data-label="${esc(run.label)}" data-date="${esc(run.date)}">`;
    for (const pick of run.picks) html += renderPickCard(pick, run.display_time);
    html += `</div>`;
    return html;
  }

  // ── Update the pick count in the filter bar ───────────────
  function updateCount() {
    const visible = document.querySelectorAll('.run-group:not(.filter-hidden) .pick-card').length;
    document.getElementById('filter-count').textContent =
      visible ? `${visible} pick${visible !== 1 ? 's' : ''}` : '';
  }

  // ── Main render ───────────────────────────────────────────
  function render(runs) {
    allRunsData = runs;

    if (!runs || runs.length === 0) {
      document.getElementById('feed-container').innerHTML = '<div class="state-msg">No picks yet.</div>';
      return;
    }

    const latestDate = runs[0].date;
    const latestRuns = runs.filter(r => r.date === latestDate);
    const olderRuns  = runs.filter(r => r.date !== latestDate);

    // Filter bar: show the latest date label
    document.getElementById('filter-date').textContent = latestRuns[0].display_date || latestDate;

    // Latest section
    let html = `<div id="section-latest">`;
    for (const run of latestRuns) html += renderRunGroup(run);
    html += `</div>`;

    // Archive section
    if (olderRuns.length > 0) {
      const byDate = {};
      for (const run of olderRuns) {
        if (!byDate[run.date]) byDate[run.date] = [];
        byDate[run.date].push(run);
      }
      const sortedDates = Object.keys(byDate).sort().reverse();

      html += `<div class="archive-section" id="archive-section">
        <div class="archive-label">Earlier</div>
        <div class="archive-list">`;

      for (const date of sortedDates) {
        for (const run of byDate[date]) {
          for (const pick of run.picks) {
            const tag  = pick.link ? 'a' : 'div';
            const href = pick.link ? ` href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer"` : '';
            html += `<${tag} class="archive-row" data-label="${esc(run.label)}"${href}>
              <span class="archive-row-title">${esc(pick.title)}</span>
              <span class="archive-row-meta">${pick.score} · ${esc(run.display_date)}</span>
            </${tag}>`;
          }
        }
      }

      html += `</div></div>`;
    }

    document.getElementById('feed-container').innerHTML = html;
    updateCount();
  }

  // ── Apply time-of-day filter ──────────────────────────────
  function applyFilters() {
    document.querySelectorAll('.run-group').forEach(group => {
      const ok = !filterLabel || group.dataset.label === filterLabel;
      group.classList.toggle('filter-hidden', !ok);
    });
    document.querySelectorAll('.archive-row').forEach(row => {
      const ok = !filterLabel || row.dataset.label === filterLabel;
      row.classList.toggle('filter-hidden', !ok);
    });
    updateCount();
  }

  // ── Wire interactive controls ─────────────────────────────
  function wireButtons() {
    document.getElementById('btn-today').addEventListener('click', () => {
      document.getElementById('section-latest')?.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-today').classList.add('active');
      document.getElementById('btn-archive').classList.remove('active');
    });

    document.getElementById('btn-archive').addEventListener('click', () => {
      document.getElementById('archive-section')?.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-archive').classList.add('active');
      document.getElementById('btn-today').classList.remove('active');
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const value = btn.dataset.value;
        filterLabel = (filterLabel === value) ? null : value;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (filterLabel) btn.classList.add('active');
        applyFilters();
      });
    });
  }

  // ── Position filter bar below sticky header ───────────────
  function positionFilterBar() {
    const h = document.querySelector('header').offsetHeight;
    document.getElementById('filter-bar').style.top = h + 'px';
  }

  // ── Bootstrap ─────────────────────────────────────────────
  async function loadFeed() {
    try {
      const res = await fetch('picks_data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data.runs);
      wireButtons();
    } catch (e) {
      document.getElementById('feed-container').innerHTML =
        `<div class="state-msg">Could not load picks.<br>
        <small style="color:#ccc">If testing locally, serve with a web server (not file://).</small></div>`;
    }
  }

  positionFilterBar();
  window.addEventListener('resize', positionFilterBar);
  loadFeed();
</script>

</body>
</html>
