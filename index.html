<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Blank — The Feed</title>
  <meta name="description" content="Culturally relevant. Editorially scored.">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta property="og:title" content="Blank — The Feed">
  <meta property="og:description" content="Culturally relevant. Editorially scored.">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface:       #FFFFFF;
      --surface-2:     #F9F8F5;
      --border:        #F2F0EC;
      --border-strong: #E5E2DC;
      --ink:           #1A1A18;
      --ink-2:         #9E9A96;
      --ink-3:         #B0ACA6;
      --ink-4:         #C0BCB8;
      --accent:        #C47B2D;
      --accent-bg:     #FEF8EF;
      --accent-border: #E8C98A;
      --accent-text:   #A86820;
      --max-w:         760px;
      --mono:          'DM Mono', 'Courier New', monospace;
      --sans:          'DM Sans', -apple-system, sans-serif;
      --serif:         'Newsreader', Georgia, serif;
    }

    html, body {
      min-height: 100%;
      background: var(--surface);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img    { display: block; max-width: 100%; }
    a      { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ── App bar ─────────────────────────────────────────────── */
    .app-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
    }

    .app-bar-inner {
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    .app-meta {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-4);
      white-space: nowrap;
    }

    /* ── Filter pills ────────────────────────────────────────── */
    .pill-row-wrap {
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .pill-row-wrap::-webkit-scrollbar { display: none; }

    .pill-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .pill {
      flex-shrink: 0;
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      background: transparent;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-2);
      padding: 5px 13px;
      line-height: 1;
      white-space: nowrap;
      transition: background .12s, color .12s, border-color .12s;
    }
    .pill.active, .pill:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: #FFF;
      font-weight: 500;
    }
    .pill-live {
      border-color: var(--accent-border);
      color: var(--accent-text);
    }
    .pill-live.active, .pill-live:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #FFF;
    }

    /* ── Feed container ──────────────────────────────────────── */
    .feed {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 12px 10px 80px;
    }

    /* ── Hero card ───────────────────────────────────────────── */
    .hero-card {
      position: relative;
      display: block;
      border-radius: 8px;
      overflow: hidden;
      height: 268px;
      margin-bottom: 8px;
      background: #2C2822;
      transition: opacity .18s;
    }
    .hero-card:hover { opacity: .95; }

    @media (min-width: 520px) { .hero-card { height: 334px; } }

    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-color-bg {
      position: absolute;
      inset: 0;
    }
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(8,7,5,.9)  0%,
        rgba(8,7,5,.28) 52%,
        transparent     100%
      );
    }

    .hero-badges {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .hero-score-pill {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      color: #FFF;
      background: rgba(0,0,0,.52);
      padding: 3px 10px;
      border-radius: 100px;
    }
    .hero-top-badge {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #FFF;
      background: rgba(196,123,45,.92);
      padding: 3px 9px;
      border-radius: 100px;
    }

    .hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 18px 18px;
    }
    .hero-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .source-badge {
      font-family: var(--sans);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.95);
      background: rgba(255,255,255,.18);
      padding: 3px 7px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .hero-time {
      font-family: var(--sans);
      font-size: 10px;
      color: rgba(255,255,255,.5);
    }
    .hero-headline {
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 700;
      line-height: 1.24;
      color: #FFF;
      margin-bottom: 7px;
    }
    @media (min-width: 520px) { .hero-headline { font-size: 22px; } }
    .hero-why {
      font-family: var(--sans);
      font-size: 11px;
      font-style: italic;
      line-height: 1.45;
      color: rgba(255,255,255,.56);
    }

    /* ── Section header ──────────────────────────────────────── */
    .section-header {
      padding: 14px 2px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-family: var(--sans);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
    }

    /* ── Mini grid (2-up) ────────────────────────────────────── */
    .mini-grid {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .mini-card {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      display: block;
      background: var(--surface);
      transition: border-color .15s;
    }
    .mini-card:hover { border-color: var(--border-strong); }

    .mini-img {
      position: relative;
      height: 80px;
      overflow: hidden;
    }
    .mini-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .mini-score-pill {
      position: absolute;
      top: 6px;
      right: 7px;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      color: #FFF;
      background: rgba(0,0,0,.52);
      padding: 2px 7px;
      border-radius: 100px;
    }
    .mini-body {
      padding: 8px 10px 11px;
    }
    .mini-source {
      font-family: var(--sans);
      font-size: 9px;
      color: var(--ink-3);
      margin-bottom: 5px;
    }
    .mini-headline {
      font-family: var(--serif);
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
    }

    /* ── List cards ──────────────────────────────────────────── */
    .list-card-outer {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
      background: var(--surface);
      transition: border-color .15s;
    }
    .list-card-outer:hover { border-color: var(--border-strong); }
    .list-card {
      display: block;
      background: var(--surface);
    }

    .list-main {
      padding: 11px 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .list-body { flex: 1; min-width: 0; }

    .list-meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .score-pill {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 700;
      color: #FFF;
      padding: 2px 6px;
      border-radius: 100px;
      flex-shrink: 0;
    }
    .score-hi { background: var(--accent); }
    .score-lo { background: var(--ink-3); }

    .list-source {
      font-family: var(--sans);
      font-size: 9.5px;
      color: var(--ink-3);
    }
    .list-time {
      font-family: var(--sans);
      font-size: 9px;
      color: var(--ink-4);
      margin-left: auto;
      white-space: nowrap;
    }
    .list-headline {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 5px;
    }
    .list-why {
      font-family: var(--sans);
      font-size: 11px;
      font-style: italic;
      line-height: 1.45;
      color: var(--ink-2);
    }
    .list-thumb {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      border-radius: 4px;
      overflow: hidden;
    }
    .list-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Cluster section ─────────────────────────────────────── */
    .cluster-strip {
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      cursor: pointer;
      user-select: none;
    }
    .cluster-strip:hover { background: var(--border); }
    .cluster-pill {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 500;
      color: #6B6760;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .cluster-more {
      font-family: var(--sans);
      font-size: 9.5px;
      color: var(--ink-3);
    }
    .cluster-pill-extra { display: none; }
    .cluster-total      { display: none; font-family: var(--mono); font-size: 9px; color: var(--ink-3); }
    .cluster-section.expanded .cluster-pill-extra { display: inline-flex; }
    .cluster-section.expanded .cluster-more        { display: none; }
    .cluster-section.expanded .cluster-total       { display: inline; }
    .cluster-expand {
      margin-left: auto;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: none;
      border: none;
      padding: 0 2px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: opacity .12s;
    }
    .cluster-expand:hover { opacity: .7; }

    /* perspectives drawer */
    .cluster-perspectives {
      max-height: 0;
      overflow: hidden;
      transition: max-height .32s cubic-bezier(.4, 0, .2, 1);
    }
    .cluster-section.expanded .cluster-perspectives {
      max-height: 900px;
    }
    .cluster-perspectives-inner {
      padding: 10px 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .cluster-perspectives-label {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: .1em;
      color: var(--ink-4);
      text-transform: uppercase;
      margin-bottom: 9px;
    }
    .perspective-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 9px 0 9px 10px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: background .08s;
    }
    .perspective-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 9px;
      bottom: 9px;
      width: 2px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0;
      transition: opacity .12s;
    }
    .perspective-row:hover { background: var(--surface-2); }
    .perspective-row:hover::before { opacity: 1; }
    .perspective-row:last-child { border-bottom: none; }
    .perspective-source {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .perspective-title {
      font-family: var(--serif);
      font-size: 12.5px;
      font-style: italic;
      color: var(--ink);
      line-height: 1.4;
    }
    .perspective-row--static { cursor: default; }
    .perspective-row--static:hover { background: none; }
    .perspective-row--static::before { display: none; }
    .perspective-hint {
      font-family: var(--sans);
      font-size: 10px;
      color: var(--ink-3);
    }
    .cluster-perspectives-more {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--ink-4);
      padding-top: 8px;
    }

    /* ── Trend badge ─────────────────────────────────────────── */
    .trend-badge {
      font-family: var(--sans);
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: .03em;
      color: var(--accent-text);
      background: var(--accent-bg);
      border: .5px solid var(--accent-border);
      padding: 2px 7px;
      border-radius: 100px;
      flex-shrink: 0;
    }

    /* ── Loading / empty states ──────────────────────────────── */
    .state-center {
      text-align: center;
      padding: 72px 24px;
    }
    .state-wordmark {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 14px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .22; }
    }
    .state-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-4);
    }
    .state-h2 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .state-p {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--ink-2);
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .site-footer {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 20px 16px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .footer-credit, .footer-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-4);
    }

    /* ── Card enter animation ───────────────────────────────── */
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-entering {
      animation: card-enter 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── Infinite scroll sentinel ────────────────────────────── */
    .feed-sentinel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 44px 0;
    }
    .sentinel-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ink-4);
      animation: dot-bounce 1.1s ease-in-out infinite;
    }
    .sentinel-dot:nth-child(2) { animation-delay: 0.18s; }
    .sentinel-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.3; }
      30%            { transform: translateY(-4px); opacity: 1;   }
    }

    /* ── End of feed ─────────────────────────────────────────── */
    .feed-end {
      text-align: center;
      padding: 36px 0 72px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--ink-4);
    }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 400px) {
      .hero-card    { height: 248px; }
      .hero-headline { font-size: 17px; }
      .list-headline { font-size: 13.5px; }
      .list-thumb   { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>

  <!-- App bar -->
  <header class="app-bar">
    <div class="app-bar-inner">
      <span class="wordmark">blank.</span>
      <span class="app-meta" id="js-meta"></span>
    </div>
  </header>

  <!-- Filter pills -->
  <nav class="pill-row-wrap" aria-label="Feed filters">
    <div class="pill-row">
      <button class="pill active" data-f="all">All</button>
      <button class="pill" data-f="top">Top Picks</button>
      <button class="pill pill-live" data-f="live">⚡ Live</button>
    </div>
  </nav>

  <!-- Feed -->
  <main class="feed" id="js-feed">
    <div class="state-center">
      <div class="state-wordmark">blank.</div>
      <div class="state-sub">Loading the feed…</div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="footer-credit">Scored and curated by the Blank engine · min score 6/10</span>
    <span class="footer-date" id="js-date"></span>
  </footer>

  <script>
    /* ── Secrets (injected by deploy workflow) ─────────────── */
    const VAPID_KEY  = '__VAPID_PUBLIC_KEY__';
    const VOTE_TOKEN = '__VOTE_TOKEN__';

    /* ── State ─────────────────────────────────────────────── */
    let allPicks      = [];
    let activeFilter  = 'all';
    let renderedCount = 0;
    const PAGE_SIZE   = 50;
    let iObserver     = null;

    /* ── Helpers ───────────────────────────────────────────── */

    // Safe HTML escape
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Strip "Google News - " prefix and " + N more" suffix from source names
    function cleanSrc(s) {
      return (s || '')
        .replace(/^Google\s+News\s*[-–]\s*/i, '')
        .replace(/\s*\+\s*\d+\s+more\s*$/i, '')
        .trim();
    }

    // Extract first hook line from the angle field.
    // Handles both " / " and " /> " separators and "Hook: '" prefix.
    function firstHook(angle) {
      if (!angle) return '';
      const s = angle.replace(/^Hook:\s*/i, '').replace(/^['"]/, '').trim();
      return s.split(/\s+\/>\s+|\s+\/\s+/)[0].replace(/['"]$/, '').trim();
    }

    // Truncate to last full word within max length
    function trunc(text, max) {
      if (!text || text.length <= max) return text || '';
      const cut = text.lastIndexOf(' ', max);
      return text.slice(0, cut > 0 ? cut : max) + '…';
    }

    // Deterministic warm-neutral placeholder color from a string
    const WARM = ['#C8BFB2','#D4CAB8','#BFCAB8','#B8C3C8','#CCC4B8','#C0CCBC','#C4BBC4','#D0C8B4'];
    function warm(seed) {
      let h = 0;
      for (let i = 0; i < (seed||'').length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) >>> 0;
      return WARM[h % WARM.length];
    }

    // Relative time from a UTC date ("2026-06-24") + time ("2241") pair
    function ago(date, time) {
      try {
        const dt  = new Date(`${date}T${time.slice(0,2)}:${time.slice(2)}:00Z`);
        const min = Math.round((Date.now() - dt) / 60000);
        if (min <  2)  return 'just now';
        if (min < 60)  return `${min}m ago`;
        const hr = Math.floor(min / 60);
        if (hr  < 24)  return `${hr}h ago`;
        return `${Math.floor(hr/24)}d ago`;
      } catch { return ''; }
    }

    // Render the trend badge (X or Google), or empty string
    function trendBadge(label) {
      if (!label) return '';
      const name = label.replace(/Trending on /i, '').replace(/ right now/i, '').trim();
      return `<span class="trend-badge">⚡ ${esc(name)}</span>`;
    }

    /* ── Card builders ─────────────────────────────────────── */

    function heroCard(p) {
      const hook  = firstHook(p.angle) || p.title;
      const color = warm(p.title);
      const t     = ago(p.runDate, p.runTime);

      const bgEl = p.image
        ? `<img class="hero-bg" src="${esc(p.image)}" alt="" loading="eager" onerror="this.remove()">`
        : '';

      return `
<a class="hero-card" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer" aria-label="${esc(hook)}">
  <div class="hero-color-bg" style="background:${color}"></div>
  ${bgEl}
  <div class="hero-gradient"></div>
  <div class="hero-badges">
    <span class="hero-score-pill">${p.score}</span>
    <span class="hero-top-badge">Top Story</span>
  </div>
  <div class="hero-content">
    <div class="hero-meta-row">
      <span class="source-badge">${esc(cleanSrc(p.source))}</span>
      ${t ? `<span class="hero-time">${esc(t)}</span>` : ''}
      ${trendBadge(p.trend_label)}
    </div>
    <h2 class="hero-headline">${esc(hook)}</h2>
    ${p.why ? `<p class="hero-why">${esc(trunc(p.why, 130))}</p>` : ''}
  </div>
</a>`;
    }

    function miniCard(p) {
      const hook  = firstHook(p.angle) || p.title;
      const color = warm(p.title);

      const imgEl = p.image
        ? `<img src="${esc(p.image)}" alt="" loading="lazy" onerror="this.parentElement.style.background='${color}';this.remove()">`
        : '';

      return `
<a class="mini-card" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer" aria-label="${esc(hook)}">
  <div class="mini-img" style="background:${color}">
    ${imgEl}
    <span class="mini-score-pill">${p.score}</span>
  </div>
  <div class="mini-body">
    <div class="mini-source">${esc(cleanSrc(p.source))}</div>
    <h3 class="mini-headline">${esc(hook)}</h3>
  </div>
</a>`;
    }

    function listCard(p, entering, delay) {
      const hook   = firstHook(p.angle) || p.title;
      const color  = warm(p.title);
      const scoreC = p.score >= 7 ? 'score-hi' : 'score-lo';
      const t      = ago(p.runDate, p.runTime);
      const aClass = entering ? ' card-entering' : '';
      const aStyle = (entering && delay) ? ` style="animation-delay:${delay}ms"` : '';

      const thumbEl = `
<div class="list-thumb" style="background:${color}">
  ${p.image ? `<img src="${esc(p.image)}" alt="" loading="lazy" onerror="this.parentElement.style.background='${color}';this.remove()">` : ''}
</div>`;

      const showCluster = (p.cluster_size > 1 && p.cluster_sources?.length) || (p.related_articles?.length > 0);
      const clusterEl = showCluster ? clusterStrip(p) : '';

      return `
<div class="list-card-outer${aClass}"${aStyle}>
  <a class="list-card" href="${esc(p.link||'#')}" target="_blank" rel="noopener noreferrer" aria-label="${esc(hook)}">
    <div class="list-main">
      <div class="list-body">
        <div class="list-meta-row">
          <span class="score-pill ${scoreC}">${p.score}</span>
          <span class="list-source">${esc(cleanSrc(p.source))}</span>
          ${trendBadge(p.trend_label)}
          ${t ? `<span class="list-time">${esc(t)}</span>` : ''}
        </div>
        <h3 class="list-headline">${esc(hook)}</h3>
        ${p.why ? `<p class="list-why">${esc(trunc(p.why, 150))}</p>` : ''}
      </div>
      ${thumbEl}
    </div>
  </a>
  ${clusterEl}
</div>`;
    }

    function clusterStrip(p) {
      const sources   = p.cluster_sources || [];
      const clusterSz = p.cluster_size || sources.length;
      const extra     = Math.max(0, sources.length - 3);
      const pills     = sources.map((s, i) =>
        `<span class="cluster-pill${i >= 3 ? ' cluster-pill-extra' : ''}">${esc(cleanSrc(s))}</span>`
      ).join('');
      const more  = extra > 0 ? `<span class="cluster-more">+${extra} more</span>` : '';
      const total = clusterSz > sources.length
        ? `<span class="cluster-total">${clusterSz} sources total</span>`
        : '';

      const articles = (p.related_articles || []).filter(a => a.url);
      let perspectivesRows = '';
      if (articles.length) {
        // Full article links with titles
        perspectivesRows = articles.map(a => `
<a class="perspective-row" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
  <span class="perspective-source">${esc(cleanSrc(a.source))}</span>
  <span class="perspective-title">${esc(a.title)}</span>
</a>`).join('');
      } else if (sources.length) {
        // Source names only — no article URL available
        perspectivesRows = sources.map(s => `
<div class="perspective-row perspective-row--static">
  <span class="perspective-source">${esc(cleanSrc(s))}</span>
  <span class="perspective-hint">Also covering this story</span>
</div>`).join('');
      }
      const extraSources = clusterSz > sources.length
        ? `<div class="cluster-perspectives-more">+${clusterSz - sources.length} additional sources</div>`
        : '';
      const perspectivesEl = (perspectivesRows || extraSources) ? `
<div class="cluster-perspectives">
  <div class="cluster-perspectives-inner">
    <div class="cluster-perspectives-label">Also covering this story</div>
    ${perspectivesRows}
    ${extraSources}
  </div>
</div>` : '';

      return `
<div class="cluster-section">
  <div class="cluster-strip">
    ${pills}${more}${total}
    <button class="cluster-expand" aria-label="Show perspectives" aria-expanded="false">↓</button>
  </div>
  ${perspectivesEl}
</div>`;
    }

    /* ── Filter ─────────────────────────────────────────────── */
    function picks() {
      switch (activeFilter) {
        case 'top':  return allPicks.filter(p => p.score >= 8);
        case 'live': return allPicks.filter(p => p.from_live || !!p.trend_label);
        default:     return allPicks;
      }
    }

    /* ── Infinite scroll ────────────────────────────────────── */
    function attachSentinel() {
      const feed = document.getElementById('js-feed');
      const el   = document.createElement('div');
      el.id        = 'js-sentinel';
      el.className = 'feed-sentinel';
      el.innerHTML = '<div class="sentinel-dot"></div><div class="sentinel-dot"></div><div class="sentinel-dot"></div>';
      feed.appendChild(el);

      iObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) appendNextPage();
      }, { rootMargin: '0px 0px 240px 0px' });
      iObserver.observe(el);
    }

    function appendNextPage() {
      if (iObserver) { iObserver.disconnect(); iObserver = null; }

      const sentinel = document.getElementById('js-sentinel');
      if (sentinel) sentinel.remove();

      const list  = picks();
      const batch = list.slice(renderedCount, renderedCount + PAGE_SIZE);
      if (!batch.length) return;

      const STAGGER = 7;
      const feed    = document.getElementById('js-feed');
      batch.forEach((p, i) => {
        feed.insertAdjacentHTML('beforeend', listCard(p, i < STAGGER, i < STAGGER ? i * 42 : 0));
      });
      renderedCount += batch.length;

      if (renderedCount < list.length) {
        attachSentinel();
      } else {
        feed.insertAdjacentHTML('beforeend', '<div class="feed-end">· · ·</div>');
      }
    }

    /* ── Render ─────────────────────────────────────────────── */
    function render() {
      if (iObserver) { iObserver.disconnect(); iObserver = null; }
      renderedCount = 0;

      const feed = document.getElementById('js-feed');
      const list = picks();

      if (!list.length) {
        feed.innerHTML = `<div class="state-center"><h2 class="state-h2">Nothing here</h2><p class="state-p">Try a different filter.</p></div>`;
        return;
      }

      document.getElementById('js-meta').textContent = `${list.length} picks`;

      const batch = list.slice(0, PAGE_SIZE);
      let html = heroCard(batch[0]);

      if (batch.length > 1) {
        html += `<div class="section-header"><span class="section-title">More Stories</span></div>`;

        // 2-up mini grid (picks 1 & 2)
        html += `<div class="mini-grid">`;
        batch.slice(1, 3).forEach(p => { html += miniCard(p); });
        html += `</div>`;

        // List cards (picks 3+)
        batch.slice(3).forEach(p => { html += listCard(p); });
      }

      renderedCount = batch.length;
      feed.innerHTML = html;

      if (renderedCount < list.length) {
        attachSentinel();
      } else {
        feed.insertAdjacentHTML('beforeend', '<div class="feed-end">· · ·</div>');
      }
    }

    /* ── Data loading ───────────────────────────────────────── */
    async function load() {
      try {
        const res = await fetch('./picks_data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Flatten all runs into a single picks list, newest-first
        const runs = data.runs || [];
        allPicks = [];
        for (const run of runs) {
          for (const pick of (run.picks || [])) {
            allPicks.push({ ...pick, runDate: run.date, runTime: run.time });
          }
        }

        if (runs[0]) {
          document.getElementById('js-date').textContent = runs[0].display_date;
          document.title = `Blank — ${runs[0].display_date}`;
        }

        render();
      } catch (err) {
        document.getElementById('js-feed').innerHTML = `
<div class="state-center">
  <h2 class="state-h2">Feed unavailable</h2>
  <p class="state-p">Unable to load picks. Check back shortly.</p>
</div>`;
        console.error('Blank: feed load failed:', err);
      }
    }

    /* ── Cluster expand/collapse ───────────────────────────── */
    document.getElementById('js-feed').addEventListener('click', e => {
      const strip = e.target.closest('.cluster-strip');
      if (!strip) return;
      if (e.target.closest('a')) return; // let real links through
      e.preventDefault();
      e.stopPropagation();
      const section  = strip.closest('.cluster-section');
      const expanded = section.classList.toggle('expanded');
      const btn = strip.querySelector('.cluster-expand');
      if (btn) {
        btn.textContent = expanded ? '↑' : '↓';
        btn.setAttribute('aria-expanded', String(expanded));
        btn.setAttribute('aria-label', expanded ? 'Collapse' : 'Expand');
      }
    });

    /* ── Filter pill interaction ────────────────────────────── */
    document.querySelectorAll('.pill[data-f]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill[data-f]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.f;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    /* ── Service worker ─────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    /* ── Boot ───────────────────────────────────────────────── */
    load();
  </script>
</body>
</html>
