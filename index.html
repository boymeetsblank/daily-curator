<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@boymeetsblank_ — Daily Picks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0a0a0a;
      border-bottom: 0.5px solid #1a1a1a;
      padding: 12px 20px;
    }

    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-brand-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .tagline {
      font-size: 11px;
      color: #3a3a3a;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .filter-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .run-meta {
      font-size: 11px;
      color: #444;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .run-meta-sep {
      font-size: 11px;
      color: #2a2a2a;
    }

    /* ── Pill buttons (shared) ── */
    .pill-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 100px;
      border: 0.5px solid #272727;
      background: transparent;
      color: #555;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      line-height: 1.4;
      white-space: nowrap;
    }

    .pill-btn:hover { background: #141414; color: #bbb; border-color: #333; }

    .pill-btn.active {
      background: #e8e8e8;
      color: #111;
      border-color: #e8e8e8;
    }

    /* ── Filter bar ── */
    .filter-bar {
      position: sticky;
      z-index: 90;
      background: #0a0a0a;
      border-bottom: 0.5px solid #1a1a1a;
      padding: 8px 20px;
    }

    .filter-bar-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-date {
      font-size: 13px;
      font-weight: 500;
      color: #e8e8e8;
      flex-shrink: 0;
    }

    .filter-pills {
      display: flex;
      gap: 5px;
      margin-left: 2px;
    }

    .filter-pills .pill-btn {
      font-size: 11px;
      padding: 3px 10px;
    }

    .filter-count {
      font-size: 12px;
      color: #333;
      flex-shrink: 0;
    }

    /* ── Page wrapper: narrow default, flex on wide ── */
    .page-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 20px 80px;
    }

    /* ── Pick card ── */
    .pick-card {
      background: #111;
      border: 0.5px solid #1e1e1e;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .card-thumbnail {
      display: block;
      width: calc(100% + 36px);
      max-height: 200px;
      object-fit: cover;
      border-radius: 9px 9px 0 0;
      margin: -16px -18px 14px -18px;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .score-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      background: #e8e8e8;
      color: #111;
      line-height: 1.5;
      flex-shrink: 0;
    }

    .card-source {
      font-size: 12px;
      color: #444;
      font-weight: 400;
    }

    .trend-sources-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 100px;
      border: 0.5px solid #252525;
      color: #444;
      line-height: 1.6;
      flex-shrink: 0;
    }

    .card-timestamp {
      margin-left: auto;
      font-size: 11px;
      color: #2e2e2e;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 500;
      color: #f0f0f0;
      line-height: 1.4;
      letter-spacing: -0.2px;
      margin-bottom: 8px;
    }

    .card-why {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* ── Angle / carousel hook box ── */
    .angle-box {
      border-left: 2px solid #252525;
      padding: 8px 12px;
      margin-bottom: 14px;
    }

    .angle-trigger {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #383838;
      margin-bottom: 5px;
    }

    .angle-text {
      font-size: 13px;
      color: #bbb;
      line-height: 1.65;
    }

    /* ── Card bottom row ── */
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .read-link {
      font-size: 13px;
      color: #e8e8e8;
      text-decoration: none;
    }

    .read-link:hover { text-decoration: underline; }

    .trend-source-label {
      font-size: 13px;
      color: #3a3a3a;
      font-style: italic;
    }

    .feedback-btns {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .feedback-btn {
      font-family: inherit;
      font-size: 13px;
      background: transparent;
      border: 0.5px solid #222;
      border-radius: 6px;
      width: 28px;
      height: 26px;
      cursor: pointer;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .feedback-btn:hover { background: #181818; color: #aaa; }
    .feedback-btn.voted-up   { background: #0d2118; color: #16a34a; border-color: #1a4a2e; }
    .feedback-btn.voted-down { background: #200d0d; color: #dc2626; border-color: #4a1a1a; }

    /* ── Archive section ── */
    .archive-section { margin-top: 40px; }

    .archive-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 12px;
    }

    .archive-list { border-top: 0.5px solid #1a1a1a; }

    .archive-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid #1a1a1a;
      text-decoration: none;
      color: inherit;
    }

    a.archive-row:hover .archive-row-title { color: #aaa; }

    .archive-row-title {
      font-size: 13px;
      color: #444;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }

    .archive-row-meta {
      font-size: 12px;
      color: #2e2e2e;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── Sidebar (hidden on narrow screens) ── */
    .sidebar {
      display: none;
      width: 240px;
      flex-shrink: 0;
    }

    .sb-section {
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 0.5px solid #161616;
    }

    .sb-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .sb-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 11px;
    }

    /* Stats row */
    .sb-stats {
      display: flex;
      gap: 16px;
    }

    .sb-stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sb-stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #e8e8e8;
      line-height: 1.1;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }

    .sb-stat-label {
      font-size: 10px;
      color: #333;
    }

    /* Quick jump buttons */
    .sb-jump-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 6px 0;
      font-size: 12px;
      color: #555;
      background: transparent;
      border: none;
      border-bottom: 0.5px solid #161616;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: color 0.1s;
    }

    .sb-jump-btn:last-child { border-bottom: none; }
    .sb-jump-btn:hover { color: #bbb; }
    .sb-jump-btn.unavailable { opacity: 0.22; cursor: default; pointer-events: none; }

    .sb-jump-arrow { color: #2e2e2e; font-size: 11px; }

    /* Trending items */
    .sb-trend-item {
      padding: 6px 0;
      border-bottom: 0.5px solid #161616;
    }

    .sb-trend-item:last-child { border-bottom: none; }

    .sb-trend-platform {
      font-size: 10px;
      color: #2e2e2e;
      margin-bottom: 2px;
    }

    .sb-trend-topic {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Top pick of the week */
    .sb-top-pick {
      display: block;
      background: #111;
      border: 0.5px solid #1e1e1e;
      border-radius: 8px;
      padding: 11px 13px;
      text-decoration: none;
    }

    .sb-top-pick-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
    }

    .sb-top-pick-title {
      font-size: 12px;
      color: #bbb;
      line-height: 1.45;
      overflow-wrap: break-word;
    }

    .sb-top-pick-meta {
      font-size: 10px;
      color: #2e2e2e;
      margin-top: 6px;
    }

    /* Source breakdown */
    .sb-source-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 0.5px solid #161616;
    }

    .sb-source-row:last-child { border-bottom: none; }

    .sb-source-name {
      font-size: 12px;
      color: #555;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-source-count {
      font-size: 11px;
      color: #2e2e2e;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .sb-empty {
      font-size: 12px;
      color: #2e2e2e;
      font-style: italic;
    }

    /* ── Wide layout: sidebar visible ── */
    @media (min-width: 1100px) {
      .header-inner,
      .filter-bar-inner {
        max-width: 944px;
      }

      .page-wrapper {
        max-width: 944px;
        display: flex;
        align-items: flex-start;
        gap: 24px;
      }

      .content {
        flex: 1;
        min-width: 0;
      }

      .sidebar {
        display: block;
        width: 240px;
        position: sticky;
        /* top set by JS */
      }
    }

    /* ── Filter hidden ── */
    .filter-hidden { display: none !important; }

    /* ── States ── */
    .state-msg {
      text-align: center;
      color: #333;
      padding: 80px 0;
      font-size: 14px;
      line-height: 1.8;
    }

    .mobile-timer-row {
      display: none;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.01em;
      padding: 5px 0 1px;
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      header { padding: 10px 16px; }
      .filter-bar { padding: 7px 16px; }
      .page-wrapper { padding: 16px 16px 80px; }
      .card-title { font-size: 15px; }
      .filter-pills .pill-btn { padding: 3px 8px; font-size: 11px; }
      .filter-count { display: none; }
      #last-updated, .run-meta-sep { display: none; }
      .mobile-timer-row { display: block; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand-group">
      <div class="brand">@boymeetsblank_</div>
      <div class="tagline">intentionally finite, culturally relevant</div>
    </div>
    <div class="header-actions">
      <button class="pill-btn active" id="btn-today">Today</button>
      <button class="pill-btn" id="btn-archive">Archive</button>
    </div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <div class="filter-bar-inner">
    <span class="filter-date" id="filter-date">—</span>
    <div class="filter-pills">
      <button class="pill-btn filter-btn" data-value="Morning">Morning</button>
      <button class="pill-btn filter-btn" data-value="Afternoon">Afternoon</button>
      <button class="pill-btn filter-btn" data-value="Evening">Evening</button>
    </div>
    <div class="filter-right">
      <span class="filter-count" id="filter-count"></span>
      <span class="run-meta" id="last-updated"></span>
      <span class="run-meta-sep">·</span>
      <span class="run-meta" id="next-run">—</span>
    </div>
  </div>
  <div class="mobile-timer-row" id="mobile-timer-row"></div>
</div>

<div class="page-wrapper">
  <div class="content">
    <div id="feed-container">
      <div class="state-msg">Loading picks…</div>
    </div>
  </div>
  <aside class="sidebar" id="sidebar"></aside>
</div>

<script>
  let filterLabel = null;

  // ── HTML escaping ──────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ── Angle / carousel hook formatting ──────────────────────
  function formatAngle(angle) {
    if (!angle) return '';
    const m = angle.match(/^\[TRIGGER:\s*([^\]]+)\]\s*([\s\S]*)/);
    if (m) {
      const trigger = esc(m[1].trim());
      const lines   = m[2].split('/').map(l => l.trim()).filter(Boolean);
      return `<div class="angle-box">
        <div class="angle-trigger">${trigger}</div>
        <div class="angle-text">${lines.map(l => esc(l)).join('<br>')}</div>
      </div>`;
    }
    return `<div class="angle-box"><div class="angle-text">${esc(angle)}</div></div>`;
  }

  // ── Trending source label ──────────────────────────────────
  function trendLabel(pick) {
    const src = (pick.source || '').toLowerCase();
    if (src.includes('twitter') || src.includes(' x ') || src.endsWith(' x') || src.startsWith('x ')) {
      return 'Trending on X right now';
    }
    if (src.includes('google')) return 'Trending on Google right now';
    return 'Trending right now';
  }

  function isTrendPick(pick) {
    return !pick.link;
  }

  function trendPlatform(pick) {
    const src = (pick.source || '').toLowerCase();
    if (src.includes('twitter') || src.includes('x (twitter)') || src === 'x (twitter) trending') return 'X';
    if (src.includes('google')) return 'Google';
    return null;
  }

  // ── Feedback vote toggle ───────────────────────────────────
  function vote(btn, dir) {
    const btns = btn.parentElement;
    const up   = btns.querySelector(':first-child');
    const dn   = btns.querySelector(':last-child');
    if (dir === 'up') {
      const was = up.classList.contains('voted-up');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) up.classList.add('voted-up');
    } else {
      const was = dn.classList.contains('voted-down');
      up.classList.remove('voted-up'); dn.classList.remove('voted-down');
      if (!was) dn.classList.add('voted-down');
    }
  }

  // ── Render a single pick card ──────────────────────────────
  function renderPickCard(pick, runDisplayTime) {
    const sourceBadge = pick.trending_across_sources
      ? `<span class="trend-sources-badge">3+ sources</span>`
      : '';

    const bottomLeft = pick.link
      ? `<a class="read-link" href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer">Read article →</a>`
      : `<span class="trend-source-label">${esc(trendLabel(pick))}</span>`;

    const thumbnail = pick.image
      ? `<img class="card-thumbnail" src="${esc(pick.image)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : '';

    return `<div class="pick-card" data-score="${pick.score}">
      ${thumbnail}
      <div class="card-top">
        <span class="score-badge">${pick.score}</span>
        <span class="card-source">${esc(pick.source)}</span>
        ${sourceBadge}
        <span class="card-timestamp">${esc(runDisplayTime)}</span>
      </div>
      <div class="card-title">${esc(pick.title)}</div>
      ${pick.why    ? `<div class="card-why">${esc(pick.why)}</div>` : ''}
      ${formatAngle(pick.angle)}
      <div class="card-bottom">
        ${bottomLeft}
        <div class="feedback-btns">
          <button class="feedback-btn" onclick="vote(this,'up')" title="Good pick">↑</button>
          <button class="feedback-btn" onclick="vote(this,'down')" title="Not for me">↓</button>
        </div>
      </div>
    </div>`;
  }

  // ── Render a run group ─────────────────────────────────────
  function renderRunGroup(run) {
    let html = `<div class="run-group" data-label="${esc(run.label)}" data-date="${esc(run.date)}">`;
    for (const pick of run.picks) html += renderPickCard(pick, run.display_time);
    html += `</div>`;
    return html;
  }

  // ── Update pick count ─────────────────────────────────────
  function updateCount() {
    const visible = document.querySelectorAll('.run-group:not(.filter-hidden) .pick-card').length;
    document.getElementById('filter-count').textContent =
      visible ? `${visible} pick${visible !== 1 ? 's' : ''}` : '';
  }

  // ── Sidebar rendering ─────────────────────────────────────
  function renderSidebar(latestRuns, allRuns) {
    const todayPicks = latestRuns.flatMap(r => r.picks);

    // ── 1. Today's stats ──
    const picksCount = todayPicks.length;
    const topScore   = todayPicks.length ? Math.max(...todayPicks.map(p => p.score)) : '—';
    const runsCount  = latestRuns.length;

    const statsHtml = `
      <div class="sb-section">
        <div class="sb-title">Today's stats</div>
        <div class="sb-stats">
          <div class="sb-stat">
            <span class="sb-stat-value">${picksCount}</span>
            <span class="sb-stat-label">picks</span>
          </div>
          <div class="sb-stat">
            <span class="sb-stat-value">${topScore}</span>
            <span class="sb-stat-label">top score</span>
          </div>
          <div class="sb-stat">
            <span class="sb-stat-value">${runsCount}</span>
            <span class="sb-stat-label">runs</span>
          </div>
        </div>
      </div>`;

    // ── 2. Quick jump ──
    const labels = ['Morning', 'Afternoon', 'Evening'];
    const existingLabels = new Set(latestRuns.map(r => r.label));
    const jumpBtns = labels.map(label => {
      const available = existingLabels.has(label);
      return `<button class="sb-jump-btn${available ? '' : ' unavailable'}"
        onclick="jumpToLabel('${label}')">${label}<span class="sb-jump-arrow">↓</span></button>`;
    }).join('');

    const jumpHtml = `
      <div class="sb-section">
        <div class="sb-title">Quick jump</div>
        ${jumpBtns}
      </div>`;

    // ── 3. Trending now ──
    const trendingPicks = todayPicks.filter(p => isTrendPick(p));
    let trendingHtml = '<div class="sb-section"><div class="sb-title">Trending now</div>';
    if (trendingPicks.length === 0) {
      trendingHtml += '<div class="sb-empty">No trend items today</div>';
    } else {
      // Group by platform, show up to 3 per platform
      const byPlatform = {};
      for (const p of trendingPicks) {
        const platform = trendPlatform(p) || 'Other';
        if (!byPlatform[platform]) byPlatform[platform] = [];
        byPlatform[platform].push(p);
      }
      for (const [platform, picks] of Object.entries(byPlatform)) {
        for (const p of picks.slice(0, 3)) {
          trendingHtml += `<div class="sb-trend-item">
            <div class="sb-trend-platform">${esc(platform)}</div>
            <div class="sb-trend-topic">${esc(p.title)}</div>
          </div>`;
        }
      }
    }
    trendingHtml += '</div>';

    // ── 4. Top pick of the week ──
    const now = new Date();
    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - 7);

    let topWeekPick = null;
    let topWeekMeta = '';
    for (const run of allRuns) {
      const runDate = new Date(run.date + 'T00:00:00');
      if (runDate < cutoff) continue;
      for (const pick of run.picks) {
        if (!topWeekPick || pick.score > topWeekPick.score) {
          topWeekPick = pick;
          topWeekMeta = run.display_date || run.date;
        }
      }
    }

    let topPickHtml = '<div class="sb-section"><div class="sb-title">Top pick of the week</div>';
    if (!topWeekPick) {
      topPickHtml += '<div class="sb-empty">No picks yet</div>';
    } else {
      const linkAttr = topWeekPick.link
        ? ` href="${esc(topWeekPick.link)}" target="_blank" rel="noopener noreferrer"`
        : '';
      const tag = topWeekPick.link ? 'a' : 'div';
      topPickHtml += `<${tag} class="sb-top-pick"${linkAttr}>
        <div class="sb-top-pick-header">
          <span class="score-badge">${topWeekPick.score}</span>
        </div>
        <div class="sb-top-pick-title">${esc(topWeekPick.title)}</div>
        <div class="sb-top-pick-meta">${esc(topWeekMeta)}</div>
      </${tag}>`;
    }
    topPickHtml += '</div>';

    // ── 5. Source breakdown ──
    const sourceCounts = {};
    for (const pick of todayPicks) {
      if (isTrendPick(pick)) continue; // exclude trend-only items
      sourceCounts[pick.source] = (sourceCounts[pick.source] || 0) + 1;
    }
    const sourcesArr = Object.entries(sourceCounts).sort((a, b) => b[1] - a[1]);

    let sourcesHtml = '<div class="sb-section"><div class="sb-title">Source breakdown</div>';
    if (sourcesArr.length === 0) {
      sourcesHtml += '<div class="sb-empty">No sources yet</div>';
    } else {
      for (const [source, count] of sourcesArr) {
        sourcesHtml += `<div class="sb-source-row">
          <span class="sb-source-name">${esc(source)}</span>
          <span class="sb-source-count">${count}</span>
        </div>`;
      }
    }
    sourcesHtml += '</div>';

    document.getElementById('sidebar').innerHTML =
      statsHtml + jumpHtml + trendingHtml + topPickHtml + sourcesHtml;
  }

  // ── Jump to run label ──────────────────────────────────────
  function jumpToLabel(label) {
    const group = document.querySelector(`.run-group[data-label="${label}"]`);
    if (group) group.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Main render ───────────────────────────────────────────
  function render(runs) {
    if (!runs || runs.length === 0) {
      document.getElementById('feed-container').innerHTML = '<div class="state-msg">No picks yet.</div>';
      return;
    }

    const latestDate = runs[0].date;
    const latestRuns = runs.filter(r => r.date === latestDate);
    const olderRuns  = runs.filter(r => r.date !== latestDate);

    document.getElementById('filter-date').textContent = latestRuns[0].display_date || latestDate;

    let html = `<div id="section-latest">`;
    for (const run of latestRuns) html += renderRunGroup(run);
    html += `</div>`;

    if (olderRuns.length > 0) {
      const byDate = {};
      for (const run of olderRuns) {
        if (!byDate[run.date]) byDate[run.date] = [];
        byDate[run.date].push(run);
      }
      const sortedDates = Object.keys(byDate).sort().reverse();

      html += `<div class="archive-section" id="archive-section">
        <div class="archive-label">Earlier</div>
        <div class="archive-list">`;

      for (const date of sortedDates) {
        for (const run of byDate[date]) {
          for (const pick of run.picks) {
            const tag  = pick.link ? 'a' : 'div';
            const href = pick.link ? ` href="${esc(pick.link)}" target="_blank" rel="noopener noreferrer"` : '';
            html += `<${tag} class="archive-row" data-label="${esc(run.label)}"${href}>
              <span class="archive-row-title">${esc(pick.title)}</span>
              <span class="archive-row-meta">${pick.score} · ${esc(run.display_date)}</span>
            </${tag}>`;
          }
        }
      }

      html += `</div></div>`;
    }

    document.getElementById('feed-container').innerHTML = html;
    updateCount();
    renderSidebar(latestRuns, runs);
  }

  // ── Apply time-of-day filter ──────────────────────────────
  function applyFilters() {
    document.querySelectorAll('.run-group').forEach(group => {
      const ok = !filterLabel || group.dataset.label === filterLabel;
      group.classList.toggle('filter-hidden', !ok);
    });
    document.querySelectorAll('.archive-row').forEach(row => {
      const ok = !filterLabel || row.dataset.label === filterLabel;
      row.classList.toggle('filter-hidden', !ok);
    });
    updateCount();
  }

  // ── Wire interactive controls ─────────────────────────────
  function wireButtons() {
    document.getElementById('btn-today').addEventListener('click', () => {
      document.getElementById('section-latest')?.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-today').classList.add('active');
      document.getElementById('btn-archive').classList.remove('active');
    });

    document.getElementById('btn-archive').addEventListener('click', () => {
      document.getElementById('archive-section')?.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-archive').classList.add('active');
      document.getElementById('btn-today').classList.remove('active');
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const value = btn.dataset.value;
        filterLabel = (filterLabel === value) ? null : value;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (filterLabel) btn.classList.add('active');
        applyFilters();
      });
    });
  }

  // ── Position sticky elements ──────────────────────────────
  function positionSticky() {
    const headerH = document.querySelector('header').offsetHeight;
    const filterBar = document.getElementById('filter-bar');
    filterBar.style.top = headerH + 'px';
    const sidebar = document.getElementById('sidebar');
    if (sidebar) {
      sidebar.style.top = (headerH + filterBar.offsetHeight + 16) + 'px';
    }
  }

  // ── Run timing ────────────────────────────────────────────
  const RUN_TIMES_UTC = [[13, 0], [18, 0], [2, 0]];

  let lastRunTime = null;

  function parseRunTime(run) {
    if (!run) return null;
    const d = run.date;                   // "YYYY-MM-DD"
    const t = run.time;                   // "HHMM" in UTC (Actions runner)
    return new Date(`${d}T${t.slice(0, 2)}:${t.slice(2, 4)}:00Z`);
  }

  function getNextRunMs() {
    const now = new Date();
    const candidates = RUN_TIMES_UTC.map(([h, m]) => {
      const t = new Date(Date.UTC(
        now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, m, 0, 0
      ));
      if (t <= now) t.setUTCDate(t.getUTCDate() + 1);
      return t;
    });
    return Math.min(...candidates.map(t => t.getTime())) - now.getTime();
  }

  function formatNextRun(ms) {
    if (ms <= 0) return 'updating now';
    const totalMin = Math.ceil(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return h > 0 ? `Next in ${h}h ${m}m` : `Next in ${m}m`;
  }

  function formatLastUpdated(ms) {
    const totalMin = Math.floor(ms / 60000);
    if (totalMin < 1)  return 'Updated just now';
    if (totalMin < 60) return `Updated ${totalMin}m ago`;
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return m > 0 ? `Updated ${h}h ${m}m ago` : `Updated ${h}h ago`;
  }

  function tickCountdown() {
    const nextEl   = document.getElementById('next-run');
    const lastEl   = document.getElementById('last-updated');
    const mobileEl = document.getElementById('mobile-timer-row');
    const nextStr  = formatNextRun(getNextRunMs());
    const lastStr  = lastRunTime ? formatLastUpdated(Date.now() - lastRunTime.getTime()) : null;
    if (nextEl) nextEl.textContent = nextStr;
    if (lastEl && lastStr) lastEl.textContent = lastStr;
    if (mobileEl) mobileEl.textContent = lastStr ? `${lastStr} · ${nextStr}` : nextStr;
  }

  // ── Bootstrap ─────────────────────────────────────────────
  async function loadFeed() {
    try {
      const res = await fetch('picks_data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.runs && data.runs.length > 0) lastRunTime = parseRunTime(data.runs[0]);
      render(data.runs);
      wireButtons();
      tickCountdown(); // refresh immediately with real last-run time
      positionSticky(); // re-run after render in case heights changed
    } catch (e) {
      document.getElementById('feed-container').innerHTML =
        `<div class="state-msg">Could not load picks.<br>
        <small style="color:#2a2a2a">If testing locally, serve with a web server (not file://).</small></div>`;
    }
  }

  positionSticky();
  window.addEventListener('resize', positionSticky);
  loadFeed();
  tickCountdown();
  setInterval(tickCountdown, 60000);
</script>

</body>
</html>
