name: Deploy Feed to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily Curator"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; don't cancel in-progress deploys
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build picks_data.json
        run: |
          mkdir -p site
          cp index.html site/index.html
          python3 - << 'PYEOF'
          import os, re, json
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          CT = ZoneInfo('America/Chicago')

          def parse_file(path):
              name = os.path.basename(path)
              m = re.match(r'picks-(\d{4}-\d{2}-\d{2})-(\d{4})\.md', name)
              if not m:
                  return None
              date_str, time_str = m.group(1), m.group(2)
              hour = int(time_str[:2])
              if hour < 12:
                  label = 'Morning'
              elif hour < 18:
                  label = 'Afternoon'
              else:
                  label = 'Evening'
              dt_utc = datetime.strptime(f'{date_str} {time_str}', '%Y-%m-%d %H%M').replace(tzinfo=timezone.utc)
              dt_ct  = dt_utc.astimezone(CT)
              hour   = dt_ct.hour
              # Format without leading-zero dependencies (all values from CT datetime)
              month  = dt_ct.strftime('%B')
              day    = str(dt_ct.day)
              year   = str(dt_ct.year)
              hour12 = dt_ct.hour % 12 or 12
              minute = dt_ct.strftime('%M')
              ampm   = 'AM' if dt_ct.hour < 12 else 'PM'
              ct_date      = dt_ct.strftime('%Y-%m-%d')
              display_date = f'{month} {day}, {year}'
              display_time = f'{hour12}:{minute} {ampm} CT'

              with open(path, encoding='utf-8') as f:
                  content = f.read()

              xm = re.search(r'\*\*X Trends:\*\*\s*(.*)', content)
              x_trends = [t.strip() for t in xm.group(1).split(' · ')] if xm else []

              picks = []
              for block in re.split(r'\n## Pick #\d+', content)[1:]:
                  sm = re.match(r' — Score: (\d+)/10', block)
                  score = int(sm.group(1)) if sm else 0

                  tm = re.search(r'\*\*([^*\n]+)\*\*\n\*([^*\n]+)\*', block)
                  title  = tm.group(1) if tm else ''
                  source = tm.group(2) if tm else ''

                  lm = re.search(r'\[Read the full article →\]\(([^)]+)\)', block)
                  link = lm.group(1) if lm else None

                  im = re.search(r'\*\*Image:\*\*\s*(\S+)', block)
                  image = im.group(1) if im else None

                  # Cluster metadata (absent in older picks files → safe defaults)
                  clm_id = re.search(r'\*\*Cluster ID:\*\*\s*(\S+)', block)
                  cluster_id = clm_id.group(1) if clm_id else None

                  clm_size = re.search(r'\*\*Cluster Size:\*\*\s*(\d+)', block)
                  cluster_size = int(clm_size.group(1)) if clm_size else 1

                  clm_primary = re.search(r'\*\*Cluster Primary:\*\*\s*(true|false)', block)
                  cluster_primary = (clm_primary.group(1) == 'true') if clm_primary else True

                  clm_sources = re.search(r'\*\*Cluster Sources:\*\*\s*(.*)', block)
                  cluster_sources = (
                      [s.strip() for s in clm_sources.group(1).split('·')]
                      if clm_sources else None
                  )

                  trend_label = None
                  if '*Trending on X right now*' in block:
                      trend_label = 'Trending on X right now'
                  elif '*Trending on Google right now*' in block:
                      trend_label = 'Trending on Google right now'

                  lvm = re.search(r'\*\*Live Pick:\*\*\s*(true|false)', block)
                  from_live = (lvm.group(1) == 'true') if lvm else False

                  wm = re.search(
                      r'\*\*Why it (?:scored high|matters):\*\*\n(.*?)(?=\n\n\*\*Hook|\n\n\*\*Suggested|\n\n---|\Z)',
                      block, re.DOTALL
                  )
                  why = wm.group(1).strip() if wm else ''

                  am = re.search(
                      r'\*\*Suggested carousel angle / hook:\*\*\n(.*?)(?=\n\n---|\n---|\Z)',
                      block, re.DOTALL
                  )
                  angle = am.group(1).strip() if am else ''

                  if title:
                      picks.append({
                          'score': score,
                          'title': title,
                          'source': source,
                          'link': link,
                          'image': image,
                          'trend_label': trend_label,
                          'why': why,
                          'angle': angle,
                          'cluster_id': cluster_id,
                          'cluster_size': cluster_size,
                          'cluster_primary': cluster_primary,
                          'cluster_sources': cluster_sources,
                          'from_live': from_live,
                      })

              return {
                  'date': date_str,
                  'time': time_str,
                  'ct_date': ct_date,
                  'label': label,
                  'display_date': display_date,
                  'display_time': display_time,
                  'x_trends': x_trends,
                  'picks': picks,
              }

          runs = []
          for name in sorted(os.listdir('picks'), reverse=True):
              if name.startswith('picks-') and name.endswith('.md'):
                  r = parse_file(os.path.join('picks', name))
                  if r and r['picks']:
                      runs.append(r)

          os.makedirs('site', exist_ok=True)
          out = {'runs': runs, 'generated_at': datetime.utcnow().isoformat() + 'Z'}
          with open('site/picks_data.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print(f'Built picks_data.json — {len(runs)} runs, '
                f'{sum(len(r["picks"]) for r in runs)} total picks')

          # ── Collect all pick URLs from picks_data so Feed never duplicates The Edit ──
          def normalize_for_dedup(url):
              """
              Normalise a URL for cross-file dedup comparison.
              Strips query string, fragment, and trailing slash.
              Lowercases host, strips www., normalises http → https.
              Mirrors the logic in daily_curator.py normalize_url().
              """
              if not url:
                  return url
              try:
                  base = url.split('?')[0].split('#')[0].rstrip('/')
                  if '://' in base:
                      _, rest = base.split('://', 1)
                      parts = rest.split('/', 1)
                      host = parts[0].lower()
                      path = ('/' + parts[1]) if len(parts) > 1 else ''
                      if host.startswith('www.'):
                          host = host[4:]
                      if host.endswith(':80') or host.endswith(':443'):
                          host = host.rsplit(':', 1)[0]
                      return f'https://{host}{path}'
                  return base.lower()
              except Exception:
                  return url.split('?')[0].rstrip('/').lower()

          pick_urls = set()
          for run in runs:
              for pick in run.get('picks', []):
                  link = pick.get('link')
                  if link:
                      pick_urls.add(normalize_for_dedup(link))

          # ── Build all_articles.json from all_articles/*.json ──────────────
          all_runs = []
          excluded_total = 0
          if os.path.isdir('all_articles'):
              for name in sorted(os.listdir('all_articles'), reverse=True):
                  if name.startswith('all-') and name.endswith('.json'):
                      try:
                          with open(os.path.join('all_articles', name), encoding='utf-8') as f:
                              run_data = json.load(f)
                          # Strip any articles whose URLs appear in The Edit
                          before = len(run_data.get('articles', []))
                          run_data['articles'] = [
                              a for a in run_data.get('articles', [])
                              if normalize_for_dedup(a.get('link')) not in pick_urls
                          ]
                          excluded_total += before - len(run_data['articles'])
                          if run_data.get('articles'):
                              all_runs.append(run_data)
                      except (json.JSONDecodeError, OSError):
                          pass

          all_articles_out = {'runs': all_runs, 'generated_at': datetime.utcnow().isoformat() + 'Z'}
          with open('site/all_articles.json', 'w', encoding='utf-8') as f:
              json.dump(all_articles_out, f, ensure_ascii=False, indent=2)
          total_arts = sum(len(r.get('articles', [])) for r in all_runs)
          print(f'Built all_articles.json — {len(all_runs)} runs, {total_arts} articles ({excluded_total} Edit picks excluded)')

          PYEOF

      - name: Copy static PWA and breaking news files
        run: |
          cp sw.js site/sw.js
          cp manifest.json site/manifest.json
          # breaking_news.json may not exist on first deploy — create an empty one
          if [ -f breaking_news.json ]; then
            cp breaking_news.json site/breaking_news.json
          else
            echo '{"items":[],"last_checked":null}' > site/breaking_news.json
          fi
          # breaking_news_state.json is internal — never deployed to Pages
          echo "Static files copied."

      - name: Inject VOTE_TOKEN and VAPID_PUBLIC_KEY into site/index.html
        env:
          VOTE_TOKEN:      ${{ secrets.VOTE_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          sed -i "s|__VOTE_TOKEN__|${VOTE_TOKEN}|g" site/index.html
          sed -i "s|__VAPID_PUBLIC_KEY__|${VAPID_PUBLIC_KEY}|g" site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
