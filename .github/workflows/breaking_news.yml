name: Breaking News Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Manual trigger for testing

concurrency:
  group: breaking-news
  cancel-in-progress: false   # Never cancel — always let the current check finish

jobs:
  check-breaking-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull latest state before running
        run: |
          git config user.name "Breaking News Bot"
          git config user.email "bot@daily-curator"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic pywebpush

      - name: Check for breaking news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
        run: python3 breaking_news_check.py

      - name: Commit and push if changed
        id: push
        run: |
          git add breaking_news.json breaking_news_state.json subscriptions.json
          git add picks/ social_trends.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "breaking: update $(date +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --repo ${{ github.repository }}
