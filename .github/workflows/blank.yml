name: Blank Engine

# Runs every 10 minutes and on manual trigger.
# Do NOT edit or delete the old daily_curator.yml workflow.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # needed to commit blank.db back to main

# Only one run at a time. If a run is already active when the next trigger
# fires, the new run queues and waits (cancel-in-progress: false) so the DB
# is never written by two jobs simultaneously.
concurrency:
  group: blank-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN; push credentials are set up automatically
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic python-dotenv requests

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_pipeline.py

      - name: Commit DB to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blank.db
          # Exit cleanly if nothing changed (happens when no new items arrived)
          git diff --staged --quiet && echo "Nothing to commit — skipping." && exit 0
          git commit -m "Engine run $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retry push up to 4 times. Track success explicitly — the loop
          # itself exits 0 even on total failure, which would hide the error.
          PUSH_OK=0
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && PUSH_OK=1 && break
            echo "Push attempt $i failed, retrying in ${i}0s..."
            sleep $((i * 10))
          done
          [ "$PUSH_OK" = "1" ] || { echo "ERROR: All 4 push attempts failed."; exit 1; }
